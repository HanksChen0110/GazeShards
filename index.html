<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>眸影碎境 GazeShards</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(8, 10, 14, 0.76);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.58);
      --accent: #7df9ff;
      --accent-strong: #ff4fd8;
      --accent-warm: #f8ff96;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      touch-action: none;
      user-select: none;
    }

    button,
    input {
      font: inherit;
    }

    #mainCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      background: #000;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 52% 42%, rgba(125, 249, 255, 0.12), transparent 26%),
        radial-gradient(circle at 42% 58%, rgba(255, 79, 216, 0.10), transparent 24%),
        rgba(0, 0, 0, 0.72);
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    #startOverlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .startPanel {
      width: min(520px, calc(100vw - 40px));
      display: grid;
      gap: 16px;
      justify-items: center;
      text-align: center;
    }

    .startPanel h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 78px);
      line-height: 0.95;
      font-weight: 760;
    }

    .startPanel p {
      max-width: 420px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .primaryButton,
    .controlButton,
    .fileControl {
      min-height: 42px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 30px var(--shadow);
    }

    .primaryButton {
      min-width: 184px;
      padding: 0 22px;
      color: #061114;
      background: linear-gradient(135deg, var(--accent), #f8ff96);
      border: 0;
      font-weight: 760;
      cursor: pointer;
    }

    .controlButton {
      min-width: 108px;
      padding: 0 14px;
      cursor: pointer;
      backdrop-filter: blur(14px);
    }

    .controlButton:disabled,
    .fileControl[aria-disabled="true"] {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .controlButton.is-active {
      color: #051014;
      background: linear-gradient(135deg, var(--accent), var(--accent-warm));
      border-color: transparent;
    }

    #controls {
      position: fixed;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      max-width: min(520px, calc(100vw - 32px));
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel-bg);
      backdrop-filter: blur(18px);
      transition: background 160ms ease, border-color 160ms ease;
    }

    body.ui-hidden #controls {
      background: transparent;
      border-color: transparent;
      padding: 0;
    }

    body.ui-hidden #controls .stageControl {
      display: none;
    }

    body.recording-mode #controls,
    body.recording-mode #debugPanel,
    body.recording-mode #toast,
    body.recording-mode #guidePanel {
      display: none;
    }

    #recordExitBtn {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      z-index: 16;
      width: 34px;
      min-width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      display: none;
      border-radius: 999px;
      font-size: 18px;
      line-height: 1;
    }

    body.recording-mode #recordExitBtn {
      display: inline-grid;
      place-items: center;
    }

    .fileControl {
      position: relative;
      width: 178px;
      padding: 10px 12px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      cursor: pointer;
      backdrop-filter: blur(14px);
    }

    .fileControl input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: max(84px, calc(env(safe-area-inset-bottom) + 84px));
      z-index: 12;
      width: min(520px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text);
      background: var(--panel-bg);
      box-shadow: 0 18px 44px var(--shadow);
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      backdrop-filter: blur(18px);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #debugPanel {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      right: max(16px, env(safe-area-inset-right));
      z-index: 10;
      min-width: 230px;
      max-width: calc(100vw - 32px);
      padding: 12px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel-bg);
      color: var(--text);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-line;
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    body.ui-hidden #debugPanel {
      display: none;
    }

    #guidePanel {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 9;
      width: min(320px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid rgba(125, 249, 255, 0.20);
      border-radius: 8px;
      background: rgba(5, 8, 12, 0.58);
      color: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      font-size: 13px;
      line-height: 1.55;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #guidePanel.hidden,
    body.ui-hidden #guidePanel {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    @media (max-width: 560px) {
      #controls {
        left: 12px;
        right: 12px;
      }

      .controlButton,
      .fileControl {
        flex: 1 1 132px;
        min-width: 0;
      }

      body.ui-hidden #controls {
        left: auto;
      }

      #toast {
        bottom: 88px;
      }

      #guidePanel {
        left: 12px;
        right: 12px;
        bottom: 112px;
        width: auto;
        font-size: 12px;
      }

      #debugPanel {
        left: 12px;
        right: 12px;
        top: 12px;
        width: auto;
        max-height: calc(100dvh - 320px);
        font-size: 11px;
        line-height: 1.42;
      }

      .controlButton,
      .fileControl {
        min-height: 46px;
      }
    }
  </style>
</head>
<body>
  <canvas id="mainCanvas"></canvas>
  <button id="recordExitBtn" class="controlButton" type="button" title="退出录屏模式">×</button>

  <div id="startOverlay">
    <div class="startPanel">
      <h1>眸影碎境</h1>
      <p>授权摄像头后，用拇指和食指捏合抓住眼睛切片，拖动甩开；眨眼会触发重组效果。</p>
      <button id="startBtn" class="primaryButton" type="button">开始体验</button>
    </div>
  </div>

  <div id="controls">
    <button id="toggleUiBtn" class="controlButton" type="button">隐藏界面</button>
    <button id="toggleDebugBtn" class="controlButton stageControl" type="button">关闭调试</button>
    <button id="recordModeBtn" class="controlButton stageControl" type="button">录屏模式</button>
    <button id="resetVisualBtn" class="controlButton stageControl" type="button">重置画面</button>
    <button id="grayscaleToggleBtn" class="controlButton stageControl is-active" type="button">黑白 开</button>
    <button id="performanceModeBtn" class="controlButton stageControl" type="button">性能 自动</button>
    <button id="flipCameraBtn" class="controlButton stageControl" type="button">切换镜头</button>
    <label class="fileControl stageControl" aria-disabled="false">
      <span id="mediaUploadLabel">上传图片/视频</span>
      <input id="mediaUpload" type="file" accept="image/*,video/*">
    </label>
  </div>

  <div id="debugPanel"></div>
  <div id="guidePanel" class="hidden">捏合抓住眼睛或脸部碎片，拖动甩开；眨眼会重组画面。按 H 隐藏界面，D 切换调试，R 重置。</div>
  <div id="toast" role="status" aria-live="polite"></div>

  <script>
    // =====================================================
    // 0. CONFIG
    // =====================================================
    const CONFIG = {
      targetFPS: 30,

      camera: {
        width: 1280,
        height: 720,
        facingMode: "user"
      },

      hand: {
        numHands: 2,
        pinchDownThreshold: 0.05,
        pinchUpThreshold: 0.08,
        handMatchRadius: 200,
        grabRadius: 150,
        keepLostHandMs: 200
      },

      face: {
        maxFaces: 1,
        eyePaddingRatio: 0.35,
        blinkThreshold: 0.22,
        blinkCooldownMs: 350
      },

      visualStyle: {
        grayscaleEnabled: true,
        backgroundBlur: 9,
        filmGrain: 0.16
      },

      topEyePreview: {
        enabled: true,
        widthRatio: 0.34,
        maxWidth: 320,
        minWidth: 168,
        aspectRatio: 2.6,
        top: 18
      },

      tarotDeck: {
        enabled: true,
        currentIndex: 0,
        switchCooldownMs: 900,
        summonDurationMs: 1800
      },

      blinkCombo: {
        requiredCount: 3,
        windowMs: 1800
      },

      eyeSlices: {
        initialCount: 8,
        minScale: 1.2,
        maxScale: 2.8,
        friction: 0.94,
        throwMultiplier: 1.0,
        maxSpeed: 40,
        floatNoiseAmount: 0.4
      },

      performance: {
        handDetectEveryNFrames: 2,
        faceDetectEveryNFrames: 6,
        maxParticles: 160,
        lowModeParticles: 60,
        lowResScale: 0.75,
        lowFpsThreshold: 22,
        lowFpsMs: 3000,
        highFpsThreshold: 28,
        highFpsMs: 5000
      },

      faceShards: {
        maxCount: 14,
        friction: 0.92,
        scatterForce: 10,
        grabRadius: 140,
        reassembleForce: 0.08
      }
    };

    // =====================================================
    // 1. DOM REFS
    // =====================================================
    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");
    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");
    const controls = document.getElementById("controls");
    const toggleUiBtn = document.getElementById("toggleUiBtn");
    const toggleDebugBtn = document.getElementById("toggleDebugBtn");
    const recordModeBtn = document.getElementById("recordModeBtn");
    const resetVisualBtn = document.getElementById("resetVisualBtn");
    const grayscaleToggleBtn = document.getElementById("grayscaleToggleBtn");
    const performanceModeBtn = document.getElementById("performanceModeBtn");
    const flipCameraBtn = document.getElementById("flipCameraBtn");
    const mediaUpload = document.getElementById("mediaUpload");
    const mediaUploadLabel = document.getElementById("mediaUploadLabel");
    const debugPanel = document.getElementById("debugPanel");
    const guidePanel = document.getElementById("guidePanel");
    const recordExitBtn = document.getElementById("recordExitBtn");
    const toast = document.getElementById("toast");

    // =====================================================
    // 2. APP STATE
    // =====================================================
    const AppState = {
      phase: "boot",
      cameraReady: false,
      mediaReady: false,
      handReady: false,
      faceReady: false,

      useFrontCamera: true,
      mirrored: true,
      uiHidden: false,
      debug: true,
      recordingMode: false,
      guideVisible: false,
      performanceMode: "auto",
      grayscaleEnabled: true,

      canvasWidth: 0,
      canvasHeight: 0,
      dpr: 1,

      lastFrameTime: 0,
      fps: 0,
      frameCount: 0,
      startedAt: performance.now(),
      lastDeltaTime: 1 / 60,

      activeMode: "eye-slice",
      inputMode: "fallback",
      lastRenderLayers: [],
      pointerActive: false,
      activePointerId: null,
      grabbedTarget: null,
      lastPinchEvent: "none",
      activePinches: 0,
      detectedHands: 0,
      detectedFaces: 0,
      faceShardCount: 0,
      faceShardsFrozen: false,
      lastBlinkTime: 0,
      blinkState: "open",
      eyeOpenRatio: 1,
      lastHandPose: "none",
      currentCardId: "fool",
      currentCardIndex: 0,
      lastOpenPalmTime: 0,
      blinkComboCount: 0,
      gameEnded: false,

      errors: []
    };

    // =====================================================
    // 3. SOURCE MANAGER
    // =====================================================
    const SourceManager = {
      videoEl: null,
      uploadedEl: null,
      uploadedType: null,
      uploadedUrl: null,
      stream: null,

      async startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          const message = "当前浏览器不支持摄像头访问，已保留鼠标/触摸 fallback。";
          AppState.errors.push(message);
          AppState.cameraReady = false;
          AppState.inputMode = "fallback";
          showToast(message);
          return false;
        }

        await this.stopCamera();

        const constraints = {
          audio: false,
          video: {
            width: { ideal: CONFIG.camera.width },
            height: { ideal: CONFIG.camera.height },
            facingMode: AppState.useFrontCamera ? "user" : "environment"
          }
        };

        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          const video = document.createElement("video");
          video.muted = true;
          video.playsInline = true;
          video.autoplay = true;
          video.srcObject = stream;

          await new Promise((resolve, reject) => {
            video.onloadedmetadata = resolve;
            video.onerror = () => reject(new Error("摄像头视频元数据加载失败。"));
          });
          await video.play();

          this.stream = stream;
          this.videoEl = video;
          AppState.cameraReady = true;
          AppState.mirrored = AppState.useFrontCamera;
          AppState.inputMode = AppState.mediaReady ? "camera+uploaded" : "camera";
          if (typeof EyeSliceManager !== "undefined") {
            EyeSliceManager.createMockSlices();
          }
          return true;
        } catch (error) {
          const message = `摄像头启动失败：${error.message || error.name || "未知错误"}`;
          AppState.errors.push(message);
          AppState.cameraReady = false;
          AppState.inputMode = AppState.mediaReady ? "uploaded" : "fallback";
          showToast("摄像头没有启动成功，但页面仍可继续使用上传素材。");
          return false;
        }
      },

      async stopCamera() {
        if (this.stream) {
          this.stream.getTracks().forEach((track) => track.stop());
        }
        this.stream = null;
        this.videoEl = null;
        AppState.cameraReady = false;
      },

      async switchCamera() {
        AppState.useFrontCamera = !AppState.useFrontCamera;
        AppState.mirrored = AppState.useFrontCamera;
        showToast(AppState.useFrontCamera ? "正在切换到前置镜头..." : "正在切换到后置镜头...");
        const ok = await this.startCamera();
        if (ok) {
          showToast(AppState.useFrontCamera ? "已切换到前置镜头。" : "已切换到后置镜头。");
        }
      },

      async handleUpload(file) {
        if (!file) return false;

        this.clearUploadedMedia();

        const url = URL.createObjectURL(file);
        this.uploadedUrl = url;

        try {
          if (file.type.startsWith("image/")) {
            const img = new Image();
            img.src = url;
            await new Promise((resolve, reject) => {
              img.onload = resolve;
              img.onerror = () => reject(new Error("图片加载失败。"));
            });
            this.uploadedEl = img;
            this.uploadedType = "image";
            AppState.mediaReady = true;
            AppState.inputMode = AppState.cameraReady ? "camera+uploaded" : "uploaded";
            mediaUploadLabel.textContent = "已上传图片";
            showToast("图片已作为背景素材载入。");
            return true;
          }

          if (file.type.startsWith("video/")) {
            const video = document.createElement("video");
            video.src = url;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.autoplay = true;
            await new Promise((resolve, reject) => {
              video.onloadedmetadata = resolve;
              video.onerror = () => reject(new Error("视频加载失败。"));
            });
            await video.play();
            this.uploadedEl = video;
            this.uploadedType = "video";
            AppState.mediaReady = true;
            AppState.inputMode = AppState.cameraReady ? "camera+uploaded" : "uploaded";
            mediaUploadLabel.textContent = "已上传视频";
            showToast("视频已静音循环播放。");
            return true;
          }

          throw new Error("只支持图片或视频文件。");
        } catch (error) {
          this.clearUploadedMedia();
          const message = `上传素材失败：${error.message || "未知错误"}`;
          AppState.errors.push(message);
          AppState.mediaReady = false;
          AppState.inputMode = AppState.cameraReady ? "camera" : "fallback";
          mediaUploadLabel.textContent = "上传图片/视频";
          showToast(message);
          return false;
        }
      },

      clearUploadedMedia() {
        if (this.uploadedEl && this.uploadedType === "video") {
          this.uploadedEl.pause();
        }
        if (this.uploadedUrl) {
          URL.revokeObjectURL(this.uploadedUrl);
        }
        this.uploadedEl = null;
        this.uploadedType = null;
        this.uploadedUrl = null;
      },

      drawCamera(targetCtx) {
        if (!AppState.cameraReady || !this.videoEl) return false;
        CameraStylePipeline.drawBackground(targetCtx, this.videoEl);
        return true;
      },

      drawUploadedMedia(targetCtx) {
        if (!AppState.mediaReady || !this.uploadedEl) return false;
        drawMediaCover(targetCtx, this.uploadedEl, false);
        return true;
      }
    };

    const CameraStylePipeline = {
      clearCanvas: document.createElement("canvas"),
      clearCtx: null,
      lastClearFrame: -1,
      lastClearMedia: null,
      lastClearGrayscale: null,

      updateClearSource(media) {
        if (!media) return null;
        const mediaSize = getMediaSize(media);
        if (!this.clearCtx) {
          this.clearCtx = this.clearCanvas.getContext("2d");
        }
        const sizeChanged = this.clearCanvas.width !== mediaSize.width || this.clearCanvas.height !== mediaSize.height;
        if (!sizeChanged && this.lastClearFrame === AppState.frameCount && this.lastClearMedia === media && this.lastClearGrayscale === AppState.grayscaleEnabled) {
          return this.clearCanvas;
        }
        if (sizeChanged) {
          this.clearCanvas.width = mediaSize.width;
          this.clearCanvas.height = mediaSize.height;
        }

        this.clearCtx.save();
        this.clearCtx.clearRect(0, 0, mediaSize.width, mediaSize.height);
        this.clearCtx.filter = AppState.grayscaleEnabled ? "grayscale(1) contrast(1.08)" : "none";
        this.clearCtx.drawImage(media, 0, 0, mediaSize.width, mediaSize.height);
        this.clearCtx.restore();
        this.lastClearFrame = AppState.frameCount;
        this.lastClearMedia = media;
        this.lastClearGrayscale = AppState.grayscaleEnabled;
        return this.clearCanvas;
      },

      getClearSource(media) {
        if (!media) return null;
        return AppState.grayscaleEnabled ? this.updateClearSource(media) : media;
      },

      drawBackground(targetCtx, media) {
        targetCtx.save();
        const filters = [];
        if (AppState.grayscaleEnabled) {
          filters.push("grayscale(1)", "contrast(1.08)");
        }
        const blurAmount = (PerformanceManager.effectiveMode === "low" || AppState.gameEnded)
          ? Math.min(CONFIG.visualStyle.backgroundBlur, 4)
          : CONFIG.visualStyle.backgroundBlur;
        if (blurAmount > 0) {
          filters.push(`blur(${blurAmount}px)`);
        }
        targetCtx.filter = filters.join(" ") || "none";
        drawMediaCover(targetCtx, media, AppState.mirrored);
        targetCtx.restore();
      },

      setGrayscale(enabled) {
        AppState.grayscaleEnabled = enabled;
        CONFIG.visualStyle.grayscaleEnabled = enabled;
        grayscaleToggleBtn.textContent = enabled ? "黑白 开" : "黑白 关";
        grayscaleToggleBtn.classList.toggle("is-active", enabled);
        grayscaleToggleBtn.setAttribute("aria-pressed", String(enabled));
      }
    };

    // =====================================================
    // 4. VISION ENGINE
    // =====================================================
    const THUMB_TIP = 4;
    const INDEX_TIP = 8;
    const WRIST = 0;
    const LEFT_EYE_INDICES = [33, 133, 160, 159, 158, 144, 145, 153];
    const RIGHT_EYE_INDICES = [362, 263, 387, 386, 385, 373, 374, 380];
    const LEFT_EYE_RATIO = { left: 33, right: 133, top: 159, bottom: 145 };
    const RIGHT_EYE_RATIO = { left: 362, right: 263, top: 386, bottom: 374 };

    const HandTracker = {
      landmarker: null,
      ready: false,
      lastResults: null,
      lastHands: [],
      lastDetectTime: 0,
      error: null,

      async init() {
        if (this.ready) return true;

        try {
          const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs");
          const resolver = await vision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
          );
          this.landmarker = await vision.HandLandmarker.createFromOptions(resolver, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
              delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: CONFIG.hand.numHands
          });
          this.ready = true;
          this.error = null;
          AppState.handReady = true;
          showToast("手势识别已准备好。");
          return true;
        } catch (error) {
          this.ready = false;
          this.error = error.message || "手势模型加载失败。";
          AppState.handReady = false;
          AppState.errors.push(`手势识别加载失败：${this.error}`);
          showToast("手势识别加载失败，仍可使用鼠标/触摸拖动。");
          return false;
        }
      },

      detect(video, timestamp) {
        if (!this.ready || !this.landmarker || !video || video.readyState < 2) {
          this.lastHands = [];
          return [];
        }

        try {
          this.lastResults = this.landmarker.detectForVideo(video, timestamp);
          this.lastDetectTime = timestamp;
          this.lastHands = this.normalizeResults(this.lastResults);
          return this.lastHands;
        } catch (error) {
          this.error = error.message || "手势检测失败。";
          AppState.errors.push(`手势检测失败：${this.error}`);
          this.lastHands = [];
          return [];
        }
      },

      normalizeResults(results) {
        const landmarks = results.landmarks || [];
        return landmarks.map((points, index) => {
          const handedness = results.handednesses?.[index]?.[0]?.categoryName
            || results.handedness?.[index]?.[0]?.categoryName
            || `hand-${index}`;
          return {
            idHint: handedness,
            handedness,
            landmarks: points,
            center: this.computeCenter(points)
          };
        });
      },

      computeCenter(points) {
        const wrist = points[WRIST] || points[0] || { x: 0.5, y: 0.5 };
        return mapNormalizedPointToCanvas(wrist.x, wrist.y);
      },

      getHands() {
        return this.lastHands;
      }
    };

    const FaceTracker = {
      landmarker: null,
      ready: false,
      lastResults: null,
      lastFace: null,
      lastEyeRects: [],
      lastFaceBox: null,
      lastDetectTime: 0,
      lastSeenTime: 0,
      error: null,

      async init() {
        if (this.ready) return true;

        try {
          const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs");
          const resolver = await vision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
          );
          this.landmarker = await vision.FaceLandmarker.createFromOptions(resolver, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
              delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: CONFIG.face.maxFaces
          });
          this.ready = true;
          this.error = null;
          AppState.faceReady = true;
          showToast("脸部识别已准备好。");
          return true;
        } catch (error) {
          this.ready = false;
          this.error = error.message || "脸部模型加载失败。";
          AppState.faceReady = false;
          AppState.errors.push(`脸部识别加载失败：${this.error}`);
          showToast("脸部识别加载失败，眼睛切片仍可用 mock 模式。");
          return false;
        }
      },

      detect(video, timestamp) {
        if (!this.ready || !this.landmarker || !video || video.readyState < 2) {
          AppState.detectedFaces = 0;
          return null;
        }

        try {
          this.lastResults = this.landmarker.detectForVideo(video, timestamp);
          this.lastDetectTime = timestamp;
          const face = this.getMainFace();
          if (!face) {
            AppState.detectedFaces = 0;
            if (timestamp - this.lastSeenTime > 1000) {
              AppState.blinkState = "no-face";
            }
            return null;
          }

          const videoSize = getMediaSize(video);
          this.processLandmarks(face, videoSize.width, videoSize.height, timestamp);
          return face;
        } catch (error) {
          this.error = error.message || "脸部检测失败。";
          AppState.errors.push(`脸部检测失败：${this.error}`);
          AppState.detectedFaces = 0;
          return null;
        }
      },

      getMainFace() {
        const faces = this.lastResults?.faceLandmarks || [];
        if (!faces.length) return null;
        return faces[0];
      },

      processLandmarks(landmarks, videoWidth, videoHeight, timestamp = performance.now()) {
        this.lastFace = landmarks;
        this.lastSeenTime = timestamp;
        AppState.detectedFaces = 1;

        const leftRect = this.computeEyeRect(landmarks, LEFT_EYE_INDICES, videoWidth, videoHeight, "left");
        const rightRect = this.computeEyeRect(landmarks, RIGHT_EYE_INDICES, videoWidth, videoHeight, "right");
        this.lastEyeRects = [leftRect, rightRect].filter(Boolean);
        this.lastFaceBox = this.computeFaceBox(landmarks, videoWidth, videoHeight);

        const leftRatio = BlinkDetector.computeEyeOpenRatio(landmarks, LEFT_EYE_RATIO);
        const rightRatio = BlinkDetector.computeEyeOpenRatio(landmarks, RIGHT_EYE_RATIO);
        const ratio = Math.min(leftRatio, rightRatio);
        BlinkDetector.update(ratio, timestamp);
        EyeSliceManager.updateEyeRects(this.lastEyeRects);
        TopEyePreview.updateFromEyeRects(this.lastEyeRects);
        FaceShardManager.updateFromFaceBox(this.lastFaceBox);
        return this.lastEyeRects;
      },

      computeFaceBox(landmarks, videoWidth, videoHeight) {
        let minX = 1;
        let minY = 1;
        let maxX = 0;
        let maxY = 0;
        landmarks.forEach((point) => {
          minX = Math.min(minX, point.x);
          minY = Math.min(minY, point.y);
          maxX = Math.max(maxX, point.x);
          maxY = Math.max(maxY, point.y);
        });
        return {
          x: minX * videoWidth,
          y: minY * videoHeight,
          w: (maxX - minX) * videoWidth,
          h: (maxY - minY) * videoHeight
        };
      },

      computeEyeRect(landmarks, indices, videoWidth, videoHeight, side) {
        const points = indices.map((index) => landmarks[index]).filter(Boolean);
        if (!points.length) return null;

        let minX = Math.min(...points.map((point) => point.x));
        let maxX = Math.max(...points.map((point) => point.x));
        let minY = Math.min(...points.map((point) => point.y));
        let maxY = Math.max(...points.map((point) => point.y));

        const width = maxX - minX;
        const height = maxY - minY;
        const padX = width * CONFIG.face.eyePaddingRatio;
        const padY = Math.max(height * CONFIG.face.eyePaddingRatio, width * 0.18);

        minX = Math.max(0, minX - padX);
        maxX = Math.min(1, maxX + padX);
        minY = Math.max(0, minY - padY);
        maxY = Math.min(1, maxY + padY);

        return {
          x: minX * videoWidth,
          y: minY * videoHeight,
          w: Math.max(1, (maxX - minX) * videoWidth),
          h: Math.max(1, (maxY - minY) * videoHeight),
          side
        };
      },

      getEyeRects() {
        return this.lastEyeRects;
      },

      getBlinkState() {
        return {
          state: AppState.blinkState,
          ratio: AppState.eyeOpenRatio,
          lastBlinkTime: AppState.lastBlinkTime
        };
      }
    };

    const BlinkDetector = {
      lastBlinkTime: 0,
      wasClosed: false,

      update(ratio, now) {
        AppState.eyeOpenRatio = ratio;

        if (ratio < CONFIG.face.blinkThreshold && !this.wasClosed) {
          this.wasClosed = true;
          AppState.blinkState = "closed";
          return false;
        }

        if (ratio >= CONFIG.face.blinkThreshold && this.wasClosed) {
          this.wasClosed = false;
          AppState.blinkState = "open";
          if (now - this.lastBlinkTime > CONFIG.face.blinkCooldownMs) {
            this.lastBlinkTime = now;
            AppState.lastBlinkTime = now;
            EyeSliceManager.triggerBlinkEffect();
            FaceShardManager.triggerReassemble();
            TarotCardManager.registerBlink(now);
            return true;
          }
        } else if (ratio >= CONFIG.face.blinkThreshold) {
          AppState.blinkState = "open";
        }

        return false;
      },

      computeEyeOpenRatio(landmarks, indices) {
        const left = landmarks[indices.left];
        const right = landmarks[indices.right];
        const top = landmarks[indices.top];
        const bottom = landmarks[indices.bottom];
        if (!left || !right || !top || !bottom) return 1;

        const horizontal = Math.hypot(left.x - right.x, left.y - right.y);
        const vertical = Math.hypot(top.x - bottom.x, top.y - bottom.y);
        if (!horizontal) return 1;
        return vertical / horizontal;
      },

      shouldTriggerBlink(ratio, now) {
        return ratio >= CONFIG.face.blinkThreshold
          && this.wasClosed
          && now - this.lastBlinkTime > CONFIG.face.blinkCooldownMs;
      }
    };

    const VisionEngine = {
      ready: false,
      handEnabled: false,
      faceEnabled: false,

      async init(options = {}) {
        this.handEnabled = Boolean(options.hand);
        this.faceEnabled = Boolean(options.face);
        if (this.handEnabled) {
          await HandTracker.init();
        }
        if (this.faceEnabled) {
          await FaceTracker.init();
        }
        this.ready = true;
        return true;
      },

      update(timestamp) {
        if (!AppState.cameraReady || !SourceManager.videoEl) {
          AppState.detectedHands = 0;
          AppState.detectedFaces = 0;
          PinchStateMachine.update([], timestamp);
          return;
        }

        if (this.handEnabled && PerformanceManager.shouldDetectHand(AppState.frameCount)) {
          const hands = HandTracker.detect(SourceManager.videoEl, timestamp);
          AppState.detectedHands = hands.length;
          PinchStateMachine.update(hands, timestamp);
          HandPoseDetector.update(hands, timestamp);
        }

        if (this.faceEnabled && PerformanceManager.shouldDetectFace(AppState.frameCount)) {
          FaceTracker.detect(SourceManager.videoEl, timestamp);
        }
      }
    };

    const PerformanceManager = {
      mode: "auto",
      effectiveMode: "high",
      lowSince: null,
      highSince: null,

      setMode(nextMode) {
        this.mode = nextMode;
        this.effectiveMode = nextMode === "low" ? "low" : "high";
        AppState.performanceMode = nextMode === "auto" ? `auto/${this.effectiveMode}` : nextMode;
        this.lowSince = null;
        this.highSince = null;
        performanceModeBtn.textContent = `性能 ${this.getLabel()}`;
        performanceModeBtn.classList.toggle("is-active", this.effectiveMode === "low");
      },

      cycleMode() {
        const nextMode = this.mode === "auto"
          ? "high"
          : this.mode === "high"
            ? "low"
            : "auto";
        this.setMode(nextMode);
        showToast(`性能模式：${this.getLabel()}`);
      },

      getLabel() {
        if (this.mode === "high") return "高";
        if (this.mode === "low") return "低";
        return "自动";
      },

      updateFPS(fps, now) {
        if (!fps) return;
        if (this.mode === "high") {
          this.effectiveMode = "high";
          AppState.performanceMode = "high";
          return;
        }
        if (this.mode === "low") {
          this.effectiveMode = "low";
          AppState.performanceMode = "low";
          return;
        }

        if (fps < CONFIG.performance.lowFpsThreshold) {
          this.lowSince = this.lowSince || now;
          this.highSince = null;
          if (now - this.lowSince > CONFIG.performance.lowFpsMs) {
            this.effectiveMode = "low";
            AppState.performanceMode = "auto/low";
            performanceModeBtn.classList.add("is-active");
            showToast("已自动切换低性能模式，优先保持流畅。");
          }
        } else if (fps > CONFIG.performance.highFpsThreshold) {
          this.highSince = this.highSince || now;
          this.lowSince = null;
          if (now - this.highSince > CONFIG.performance.highFpsMs && this.effectiveMode === "low") {
            this.effectiveMode = "high";
            AppState.performanceMode = "auto/high";
            performanceModeBtn.classList.remove("is-active");
          }
        } else {
          this.lowSince = null;
          this.highSince = null;
        }
      },

      shouldDetectHand(frameCount) {
        const interval = this.effectiveMode === "low" ? 3 : CONFIG.performance.handDetectEveryNFrames;
        return frameCount % interval === 0;
      },

      shouldDetectFace(frameCount) {
        const interval = this.effectiveMode === "low" ? 8 : CONFIG.performance.faceDetectEveryNFrames;
        return frameCount % interval === 0;
      },

      getMaxParticles() {
        return this.effectiveMode === "low"
          ? CONFIG.performance.lowModeParticles
          : CONFIG.performance.maxParticles;
      }
    };

    // =====================================================
    // 5. INTERACTION ENGINE
    // =====================================================
    let toastTimer = null;

    function setPhase(nextPhase) {
      AppState.phase = nextPhase;
    }

    function setUiHidden(hidden) {
      AppState.uiHidden = hidden;
      document.body.classList.toggle("ui-hidden", hidden);
      toggleUiBtn.textContent = hidden ? "显示界面" : "隐藏界面";
      toggleUiBtn.setAttribute("aria-pressed", String(hidden));
    }

    function setDebugEnabled(enabled) {
      AppState.debug = enabled;
      toggleDebugBtn.textContent = enabled ? "关闭调试" : "开启调试";
      toggleDebugBtn.setAttribute("aria-pressed", String(enabled));
      debugPanel.hidden = !enabled;
      if (!enabled) {
        debugPanel.textContent = "";
      }
    }

    function setRecordingMode(enabled) {
      AppState.recordingMode = enabled;
      document.body.classList.toggle("recording-mode", enabled);
      recordModeBtn.classList.toggle("is-active", enabled);
      recordModeBtn.setAttribute("aria-pressed", String(enabled));
      if (enabled) {
        guidePanel.classList.add("hidden");
        toast.classList.remove("visible");
      }
    }

    function showGuide() {
      AppState.guideVisible = true;
      guidePanel.classList.remove("hidden");
      window.setTimeout(() => {
        guidePanel.classList.add("hidden");
        AppState.guideVisible = false;
      }, 8500);
    }

    function resetVisualElements() {
      AppState.gameEnded = false;
      AppState.blinkComboCount = 0;
      EyeSliceManager.createMockSlices();
      FaceShardManager.reset();
      TarotCardManager.reset();
      ParticleManager.clear();
      showToast("视觉元素已重置。");
    }

    function showToast(message) {
      if (AppState.recordingMode) return;
      toast.textContent = message;
      toast.classList.add("visible");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("visible");
      }, 2600);
    }

    function mapNormalizedPointToCanvas(x, y) {
      return {
        x: AppState.mirrored ? (1 - x) * AppState.canvasWidth : x * AppState.canvasWidth,
        y: y * AppState.canvasHeight
      };
    }

    function onPinchDown(x, y) {
      if (AppState.gameEnded) return false;
      AppState.lastPinchEvent = "PINCH_DOWN";
      if (EyeSliceManager.grabAt(x, y)) {
        AppState.grabbedTarget = "eye";
        return true;
      }
      if (FaceShardManager.grabAt(x, y)) {
        AppState.grabbedTarget = "face";
        return true;
      }
      AppState.grabbedTarget = null;
      return false;
    }

    function onPinchDrag(x, y) {
      AppState.lastPinchEvent = "PINCH_DRAG";
      if (AppState.grabbedTarget === "face") {
        return FaceShardManager.dragTo(x, y);
      }
      return EyeSliceManager.dragTo(x, y);
    }

    function onPinchUp(vx, vy) {
      AppState.lastPinchEvent = "PINCH_UP";
      let released = false;
      if (AppState.grabbedTarget === "face") {
        released = FaceShardManager.release(vx, vy);
      } else {
        released = EyeSliceManager.release(vx, vy);
      }
      AppState.grabbedTarget = null;
      return released;
    }

    const HandPoseDetector = {
      lastPose: "none",
      lastTriggerTime: 0,
      cooldownMs: 900,

      update(hands, timestamp = performance.now()) {
        if (!hands.length) {
          AppState.lastHandPose = "none";
          return;
        }

        const pose = this.classify(hands[0].landmarks);
        AppState.lastHandPose = pose;
        if (pose === this.lastPose || timestamp - this.lastTriggerTime < this.cooldownMs) return;

        if (pose === "open") {
          OpenPalmDetector.trigger(timestamp);
          this.lastTriggerTime = timestamp;
        } else if (pose === "fist") {
          FaceShardManager.triggerFreeze();
          this.lastTriggerTime = timestamp;
        }
        this.lastPose = pose;
      },

      classify(points) {
        const wrist = points[0];
        const indexBase = points[5];
        if (!wrist || !indexBase) return "unknown";

        const palmSize = Math.max(0.001, Math.hypot(indexBase.x - wrist.x, indexBase.y - wrist.y));
        const tips = [8, 12, 16, 20].map((index) => points[index]).filter(Boolean);
        if (tips.length < 4) return "unknown";

        const openness = tips.reduce((sum, point) => {
          return sum + Math.hypot(point.x - wrist.x, point.y - wrist.y) / palmSize;
        }, 0) / tips.length;

        if (openness > 1.45) return "open";
        if (openness < 0.95) return "fist";
        return "neutral";
      }
    };

    const OpenPalmDetector = {
      trigger(timestamp = performance.now()) {
        if (timestamp - AppState.lastOpenPalmTime < CONFIG.tarotDeck.switchCooldownMs) return false;
        AppState.lastOpenPalmTime = timestamp;
        FaceShardManager.triggerScatter(0.45);
        TarotCardManager.nextCard(timestamp);
        return true;
      }
    };

    const PinchStateMachine = {
      hands: new Map(),
      lostHands: new Map(),

      update(handResults, timestamp = performance.now()) {
        const activeIds = new Set();
        const hands = handResults.map((hand) => this.resolveHand(hand));

        hands.forEach((hand) => {
          activeIds.add(hand.id);
          const previous = this.hands.get(hand.id) || {
            id: hand.id,
            isPinching: false,
            lastX: hand.center.x,
            lastY: hand.center.y,
            vx: 0,
            vy: 0,
            lastTime: timestamp
          };

          const pinch = this.computePinch(hand);
          const dt = Math.max(16, timestamp - previous.lastTime);
          const vx = ((pinch.canvasX - previous.lastX) / dt) * 16.67;
          const vy = ((pinch.canvasY - previous.lastY) / dt) * 16.67;
          const state = {
            ...previous,
            handedness: hand.handedness,
            landmarks: hand.landmarks,
            pinchDistance: pinch.distance,
            pinchX: pinch.canvasX,
            pinchY: pinch.canvasY,
            vx,
            vy,
            lastX: pinch.canvasX,
            lastY: pinch.canvasY,
            lastTime: timestamp,
            lastSeen: timestamp
          };

          if (!state.isPinching && pinch.distance < CONFIG.hand.pinchDownThreshold) {
            state.isPinching = true;
            this.emitPinchEvents("PINCH_DOWN", state);
          } else if (state.isPinching && pinch.distance > CONFIG.hand.pinchUpThreshold) {
            state.isPinching = false;
            this.emitPinchEvents("PINCH_UP", state);
          } else if (state.isPinching) {
            this.emitPinchEvents("PINCH_DRAG", state);
          }

          this.hands.set(hand.id, state);
          this.lostHands.delete(hand.id);
        });

        for (const [id, state] of this.hands.entries()) {
          if (activeIds.has(id)) continue;
          if (!this.lostHands.has(id)) {
            this.lostHands.set(id, timestamp);
          }
          if (timestamp - this.lostHands.get(id) > CONFIG.hand.keepLostHandMs) {
            if (state.isPinching) {
              state.isPinching = false;
              this.emitPinchEvents("PINCH_UP", state);
            }
            this.hands.delete(id);
            this.lostHands.delete(id);
          }
        }

        AppState.activePinches = Array.from(this.hands.values()).filter((hand) => hand.isPinching).length;
      },

      resolveHand(hand) {
        const center = hand.center || this.computeCenter(hand.landmarks);
        const handedness = hand.handedness || hand.idHint || "hand";
        let id = handedness;

        if (!this.hands.has(id)) {
          let bestId = null;
          let bestDistance = CONFIG.hand.handMatchRadius;
          for (const [candidateId, state] of this.hands.entries()) {
            const distance = Math.hypot(center.x - state.lastX, center.y - state.lastY);
            if (distance < bestDistance) {
              bestDistance = distance;
              bestId = candidateId;
            }
          }
          if (bestId && !hand.idHint) {
            id = bestId;
          }
        }

        return { ...hand, id, center, handedness };
      },

      computeCenter(points) {
        const wrist = points[WRIST] || points[0] || { x: 0.5, y: 0.5 };
        return mapNormalizedPointToCanvas(wrist.x, wrist.y);
      },

      computePinch(hand) {
        const thumb = hand.landmarks[THUMB_TIP];
        const index = hand.landmarks[INDEX_TIP];
        const dx = thumb.x - index.x;
        const dy = thumb.y - index.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const centerX = (thumb.x + index.x) / 2;
        const centerY = (thumb.y + index.y) / 2;
        const mapped = mapNormalizedPointToCanvas(centerX, centerY);
        return {
          distance,
          canvasX: mapped.x,
          canvasY: mapped.y
        };
      },

      emitPinchEvents(type, handState) {
        if (type === "PINCH_DOWN") {
          onPinchDown(handState.pinchX, handState.pinchY);
        } else if (type === "PINCH_DRAG") {
          onPinchDrag(handState.pinchX, handState.pinchY);
        } else if (type === "PINCH_UP") {
          onPinchUp(handState.vx, handState.vy);
        }
      },

      reset() {
        this.hands.clear();
        this.lostHands.clear();
        AppState.activePinches = 0;
      }
    };

    // =====================================================
    // 6. VISUAL ELEMENT ENGINE
    // =====================================================
    function drawStageZeroVisual(now) {
      const width = AppState.canvasWidth;
      const height = AppState.canvasHeight;
      const centerX = width * 0.5;
      const centerY = height * 0.5;
      const pulse = Math.sin(now * 0.0018) * 0.5 + 0.5;
      const ringRadius = Math.min(width, height) * (0.16 + pulse * 0.015);

      ctx.save();
      ctx.translate(centerX, centerY);

      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = "rgba(125, 249, 255, 0.42)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 0, ringRadius * 1.55, ringRadius * 0.52, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255, 79, 216, 0.34)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, 0, ringRadius * 0.92, ringRadius * 0.28, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "rgba(255, 255, 255, 0.76)";
      ctx.beginPath();
      ctx.arc(0, 0, 4 + pulse * 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.65)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 12; i += 1) {
        const y = ((now * 0.018) + i * 46) % (height + 60) - 30;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y + Math.sin(i + now * 0.001) * 10);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawHandDebug(targetCtx) {
      if (!AppState.debug || !PinchStateMachine.hands.size) return;

      targetCtx.save();
      for (const hand of PinchStateMachine.hands.values()) {
        const isPinching = hand.isPinching;
        targetCtx.fillStyle = isPinching ? "rgba(255, 79, 216, 0.92)" : "rgba(125, 249, 255, 0.88)";
        targetCtx.strokeStyle = isPinching ? "rgba(255, 79, 216, 0.65)" : "rgba(125, 249, 255, 0.5)";
        targetCtx.lineWidth = 2;

        hand.landmarks.forEach((point, index) => {
          const mapped = mapNormalizedPointToCanvas(point.x, point.y);
          const radius = index === THUMB_TIP || index === INDEX_TIP ? 5 : 2.5;
          targetCtx.beginPath();
          targetCtx.arc(mapped.x, mapped.y, radius, 0, Math.PI * 2);
          targetCtx.fill();
        });

        targetCtx.beginPath();
        targetCtx.arc(hand.pinchX, hand.pinchY, CONFIG.hand.grabRadius * 0.15, 0, Math.PI * 2);
        targetCtx.stroke();
      }
      targetCtx.restore();
    }

    function mapVideoRectToCanvas(rect) {
      const videoSize = SourceManager.videoEl ? getMediaSize(SourceManager.videoEl) : null;
      if (!videoSize) return null;

      const scaleX = AppState.canvasWidth / videoSize.width;
      const scaleY = AppState.canvasHeight / videoSize.height;
      const x = AppState.mirrored
        ? AppState.canvasWidth - (rect.x + rect.w) * scaleX
        : rect.x * scaleX;
      return {
        x,
        y: rect.y * scaleY,
        w: rect.w * scaleX,
        h: rect.h * scaleY
      };
    }

    function drawFaceDebug(targetCtx) {
      if (!AppState.debug) return;
      const eyeRects = FaceTracker.getEyeRects();
      if (!eyeRects.length && !FaceTracker.lastFaceBox) return;

      targetCtx.save();
      targetCtx.lineWidth = 2;
      if (FaceTracker.lastFaceBox) {
        const box = mapVideoRectToCanvas(FaceTracker.lastFaceBox);
        if (box) {
          targetCtx.strokeStyle = "rgba(255, 255, 255, 0.35)";
          targetCtx.strokeRect(box.x, box.y, box.w, box.h);
        }
      }
      eyeRects.forEach((rect) => {
        const mapped = mapVideoRectToCanvas(rect);
        if (!mapped) return;
        targetCtx.strokeStyle = rect.side === "left"
          ? "rgba(125, 249, 255, 0.9)"
          : "rgba(255, 79, 216, 0.9)";
        targetCtx.strokeRect(mapped.x, mapped.y, mapped.w, mapped.h);
      });
      targetCtx.restore();
    }

    const TopEyePreview = {
      lastRect: null,
      sourceRect: null,

      updateFromEyeRects(eyeRects) {
        if (!eyeRects || !eyeRects.length) return;
        if (eyeRects.length === 1) {
          this.lastRect = eyeRects[0];
          this.sourceRect = this.lastRect;
          return;
        }
        const minX = Math.min(...eyeRects.map((rect) => rect.x));
        const minY = Math.min(...eyeRects.map((rect) => rect.y));
        const maxX = Math.max(...eyeRects.map((rect) => rect.x + rect.w));
        const maxY = Math.max(...eyeRects.map((rect) => rect.y + rect.h));
        const w = maxX - minX;
        const h = maxY - minY;
        this.lastRect = {
          x: Math.max(0, minX - w * 0.12),
          y: Math.max(0, minY - h * 0.6),
          w: w * 1.24,
          h: h * 2.2,
          side: "both"
        };
        this.sourceRect = this.lastRect;
      },

      draw(targetCtx) {
        if (!CONFIG.topEyePreview.enabled) return;
        const width = Math.max(
          CONFIG.topEyePreview.minWidth,
          Math.min(CONFIG.topEyePreview.maxWidth, AppState.canvasWidth * CONFIG.topEyePreview.widthRatio)
        );
        const height = width / CONFIG.topEyePreview.aspectRatio;
        const x = (AppState.canvasWidth - width) * 0.5;
        const y = CONFIG.topEyePreview.top + Math.max(0, window.visualViewport?.offsetTop || 0);
        const sourceMedia = SourceManager.videoEl
          ? CameraStylePipeline.getClearSource(SourceManager.videoEl)
          : null;

        targetCtx.save();
        targetCtx.shadowColor = "rgba(0, 0, 0, 0.52)";
        targetCtx.shadowBlur = 22;
        targetCtx.fillStyle = "rgba(4, 6, 8, 0.72)";
        targetCtx.fillRect(x, y, width, height);

        if (sourceMedia && this.lastRect) {
          try {
            targetCtx.drawImage(
              sourceMedia,
              this.lastRect.x,
              this.lastRect.y,
              this.lastRect.w,
              this.lastRect.h,
              x,
              y,
              width,
              height
            );
          } catch (error) {
            this.drawPlaceholder(targetCtx, x, y, width, height);
          }
        } else {
          this.drawPlaceholder(targetCtx, x, y, width, height);
        }

        targetCtx.shadowColor = "transparent";
        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.84)";
        targetCtx.lineWidth = 1.5;
        targetCtx.strokeRect(x, y, width, height);
        targetCtx.strokeStyle = "rgba(0, 0, 0, 0.85)";
        const corner = Math.min(24, height * 0.36);
        targetCtx.lineWidth = 4;
        targetCtx.beginPath();
        targetCtx.moveTo(x, y + corner);
        targetCtx.lineTo(x, y);
        targetCtx.lineTo(x + corner, y);
        targetCtx.moveTo(x + width - corner, y);
        targetCtx.lineTo(x + width, y);
        targetCtx.lineTo(x + width, y + corner);
        targetCtx.moveTo(x + width, y + height - corner);
        targetCtx.lineTo(x + width, y + height);
        targetCtx.lineTo(x + width - corner, y + height);
        targetCtx.moveTo(x + corner, y + height);
        targetCtx.lineTo(x, y + height);
        targetCtx.lineTo(x, y + height - corner);
        targetCtx.stroke();
        targetCtx.restore();
      },

      drawPlaceholder(targetCtx, x, y, width, height) {
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.08)";
        targetCtx.fillRect(x, y, width, height);
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.55)";
        targetCtx.font = "12px sans-serif";
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.fillText("EYE SIGNAL", x + width * 0.5, y + height * 0.5);
      }
    };

    const TarotCardManager = {
      cards: [
        { id: "fool", zh: "愚者", en: "THE FOOL", colors: ["#5b3fd6", "#f6d36c"], mark: "0" },
        { id: "justice", zh: "正义", en: "JUSTICE", colors: ["#194f7a", "#f0f3ff"], mark: "XI" },
        { id: "hanged", zh: "倒吊人", en: "THE HANGED MAN", colors: ["#30323f", "#d95f50"], mark: "XII" },
        { id: "sun", zh: "太阳", en: "THE SUN", colors: ["#f6b13d", "#fff0a8"], mark: "XIX" },
        { id: "magician", zh: "魔术师", en: "THE MAGICIAN", colors: ["#7c2438", "#f4d3a1"], mark: "I" },
        { id: "hermit", zh: "隐者", en: "THE HERMIT", colors: ["#1f5a54", "#d6f0d8"], mark: "IX" },
        { id: "star", zh: "星星", en: "THE STAR", colors: ["#173a8a", "#9fd4ff"], mark: "XVII" },
        { id: "moon", zh: "月亮", en: "THE MOON", colors: ["#32205f", "#d9c6ff"], mark: "XVIII" }
      ],
      lastComboBlinkTime: 0,
      lastSwitchTime: 0,
      summonStartedAt: 0,

      reset() {
        this.lastComboBlinkTime = 0;
        this.summonStartedAt = 0;
        this.setCurrent(CONFIG.tarotDeck.currentIndex || 0);
      },

      setCurrent(index) {
        const nextIndex = ((index % this.cards.length) + this.cards.length) % this.cards.length;
        CONFIG.tarotDeck.currentIndex = nextIndex;
        AppState.currentCardIndex = nextIndex;
        AppState.currentCardId = this.cards[nextIndex].id;
      },

      nextCard(timestamp = performance.now()) {
        if (!CONFIG.tarotDeck.enabled || AppState.gameEnded) return;
        if (timestamp - this.lastSwitchTime < CONFIG.tarotDeck.switchCooldownMs) return;
        this.lastSwitchTime = timestamp;
        this.setCurrent(AppState.currentCardIndex + 1);
        showToast(`塔罗切换：${this.cards[AppState.currentCardIndex].zh}`);
      },

      registerBlink(timestamp = performance.now()) {
        if (AppState.gameEnded) return;
        if (timestamp - this.lastComboBlinkTime > CONFIG.blinkCombo.windowMs) {
          AppState.blinkComboCount = 0;
        }
        this.lastComboBlinkTime = timestamp;
        AppState.blinkComboCount += 1;
        if (AppState.blinkComboCount >= CONFIG.blinkCombo.requiredCount) {
          this.summonFool(timestamp);
        }
      },

      summonFool(timestamp = performance.now()) {
        this.setCurrent(0);
        AppState.gameEnded = true;
        AppState.blinkComboCount = CONFIG.blinkCombo.requiredCount;
        this.summonStartedAt = timestamp;
        FaceShardManager.triggerFreeze();
        ParticleManager.emit(AppState.canvasWidth * 0.5, AppState.canvasHeight * 0.5, 42, "face");
        showToast("愚者已被召唤。");
      },

      draw(targetCtx, timestamp) {
        if (!CONFIG.tarotDeck.enabled) return;
        const card = this.cards[AppState.currentCardIndex] || this.cards[0];
        const baseW = AppState.gameEnded
          ? Math.min(300, AppState.canvasWidth * 0.44)
          : Math.min(156, Math.max(104, AppState.canvasWidth * 0.15));
        const w = baseW;
        const h = w * 1.56;
        const pulse = AppState.gameEnded ? Math.sin(timestamp * 0.006) * 0.025 + 1.08 : 1;
        const x = AppState.gameEnded
          ? AppState.canvasWidth * 0.5
          : Math.max(18 + w * 0.5, AppState.canvasWidth * 0.12);
        const y = AppState.gameEnded
          ? AppState.canvasHeight * 0.52
          : AppState.canvasHeight * 0.58;
        this.drawCard(targetCtx, card, x, y, w * pulse, h * pulse, AppState.gameEnded);
      },

      drawCard(targetCtx, card, x, y, w, h, summoned) {
        targetCtx.save();
        targetCtx.translate(x, y);
        targetCtx.shadowColor = `${card.colors[0]}aa`;
        targetCtx.shadowBlur = summoned ? 42 : 20;
        targetCtx.fillStyle = "#111";
        targetCtx.fillRect(-w / 2, -h / 2, w, h);

        const gradient = targetCtx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
        gradient.addColorStop(0, card.colors[0]);
        gradient.addColorStop(0.52, "#15151f");
        gradient.addColorStop(1, card.colors[1]);
        targetCtx.fillStyle = gradient;
        targetCtx.fillRect(-w / 2 + 5, -h / 2 + 5, w - 10, h - 10);

        targetCtx.strokeStyle = "rgba(255, 236, 190, 0.9)";
        targetCtx.lineWidth = summoned ? 3 : 2;
        targetCtx.strokeRect(-w / 2 + 9, -h / 2 + 9, w - 18, h - 18);
        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.35)";
        targetCtx.strokeRect(-w / 2 + 18, -h / 2 + 18, w - 36, h - 36);

        targetCtx.fillStyle = "rgba(255, 245, 214, 0.95)";
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.font = `${Math.max(16, w * 0.22)}px Georgia, serif`;
        targetCtx.fillText(card.mark, 0, -h * 0.22);
        targetCtx.font = `${Math.max(12, w * 0.1)}px Georgia, serif`;
        targetCtx.fillText(card.en, 0, h * 0.32);
        targetCtx.font = `${Math.max(13, w * 0.12)}px sans-serif`;
        targetCtx.fillText(card.zh, 0, h * 0.42);

        targetCtx.globalAlpha = 0.9;
        targetCtx.beginPath();
        targetCtx.arc(0, 0, w * 0.18, 0, Math.PI * 2);
        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.56)";
        targetCtx.stroke();
        targetCtx.beginPath();
        targetCtx.moveTo(0, -w * 0.27);
        targetCtx.lineTo(w * 0.22, w * 0.14);
        targetCtx.lineTo(-w * 0.22, w * 0.14);
        targetCtx.closePath();
        targetCtx.stroke();

        if (summoned) {
          targetCtx.globalAlpha = 0.18;
          targetCtx.fillStyle = "#fff";
          targetCtx.fillRect(-w / 2, -h / 2, w, h);
        }
        targetCtx.restore();
      }
    };

    class EyeSlice {
      constructor(options) {
        this.id = options.id;
        this.x = options.x;
        this.y = options.y;
        this.homeX = options.homeX || options.x;
        this.homeY = options.homeY || options.y;
        this.w = options.w;
        this.h = options.h;

        this.vx = options.vx || 0;
        this.vy = options.vy || 0;
        this.rotation = options.rotation || 0;
        this.angularVelocity = options.angularVelocity || 0;
        this.scale = options.scale || 1;
        this.targetScale = 1;

        this.isGrabbed = false;
        this.grabOffsetX = 0;
        this.grabOffsetY = 0;

        this.sourceRect = options.sourceRect || null;
        this.sourceEye = options.sourceEye || null;
        this.alpha = 1;
        this.flash = 0;
        this.seed = Math.random() * 1000;
      }

      update(dt) {
        if (!this.isGrabbed) {
          const floatX = Math.sin(performance.now() * 0.001 + this.seed) * CONFIG.eyeSlices.floatNoiseAmount;
          const floatY = Math.cos(performance.now() * 0.0012 + this.seed) * CONFIG.eyeSlices.floatNoiseAmount;
          this.x += (this.vx + floatX) * dt * 60;
          this.y += (this.vy + floatY) * dt * 60;
          this.vx *= CONFIG.eyeSlices.friction;
          this.vy *= CONFIG.eyeSlices.friction;
          this.rotation += this.angularVelocity * dt * 60;
          this.angularVelocity *= CONFIG.eyeSlices.friction;
        }

        this.scale += (this.targetScale - this.scale) * Math.min(1, dt * 12);
        this.flash = Math.max(0, this.flash - dt * 3);
        this.keepInBounds();
      }

      keepInBounds() {
        const margin = Math.max(this.w, this.h) * this.scale * 0.6;
        const minX = -margin;
        const minY = -margin;
        const maxX = AppState.canvasWidth + margin;
        const maxY = AppState.canvasHeight + margin;

        if (this.x < minX || this.x > maxX) {
          this.vx *= -0.45;
          this.x = Math.max(minX, Math.min(maxX, this.x));
        }
        if (this.y < minY || this.y > maxY) {
          this.vy *= -0.45;
          this.y = Math.max(minY, Math.min(maxY, this.y));
        }
      }

      draw(targetCtx, sourceMedia) {
        const drawW = this.w * this.scale;
        const drawH = this.h * this.scale;

        targetCtx.save();
        targetCtx.translate(this.x, this.y);
        targetCtx.rotate(this.rotation);
        targetCtx.globalAlpha = this.alpha;
        targetCtx.shadowColor = "rgba(0, 0, 0, 0.45)";
        targetCtx.shadowBlur = 18;
        targetCtx.shadowOffsetY = 10;

        targetCtx.fillStyle = "rgba(0, 0, 0, 0.62)";
        targetCtx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);

        if (sourceMedia && this.sourceRect) {
          const rect = this.sourceRect;
          try {
            targetCtx.drawImage(
              sourceMedia,
              rect.x,
              rect.y,
              rect.w,
              rect.h,
              -drawW / 2,
              -drawH / 2,
              drawW,
              drawH
            );
          } catch (error) {
            this.drawPlaceholder(targetCtx, drawW, drawH);
          }
        } else {
          this.drawPlaceholder(targetCtx, drawW, drawH);
        }

        targetCtx.shadowColor = "transparent";
        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.88)";
        targetCtx.lineWidth = this.isGrabbed ? 2 : 1.2;
        targetCtx.strokeRect(-drawW / 2, -drawH / 2, drawW, drawH);

        targetCtx.globalAlpha = 0.2;
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.8)";
        for (let i = 0; i < 3; i += 1) {
          const y = -drawH / 2 + ((performance.now() * 0.03 + i * 17 + this.seed) % drawH);
          targetCtx.fillRect(-drawW / 2, y, drawW, 1);
        }

        if (this.flash > 0) {
          targetCtx.globalAlpha = Math.min(0.85, this.flash);
          targetCtx.fillStyle = "#fff";
          targetCtx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);
        }

        targetCtx.restore();
      }

      drawPlaceholder(targetCtx, drawW, drawH) {
        const gradient = targetCtx.createLinearGradient(-drawW / 2, 0, drawW / 2, 0);
        gradient.addColorStop(0, "rgba(20, 24, 30, 0.92)");
        gradient.addColorStop(0.5, "rgba(78, 92, 110, 0.86)");
        gradient.addColorStop(1, "rgba(20, 24, 30, 0.92)");
        targetCtx.fillStyle = gradient;
        targetCtx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);

        targetCtx.fillStyle = "rgba(255, 255, 255, 0.7)";
        targetCtx.font = `${Math.max(10, Math.min(15, drawH * 0.22))}px sans-serif`;
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.fillText("EYE SLICE MOCK", 0, 0);
      }

      containsPoint(x, y) {
        const cos = Math.cos(-this.rotation);
        const sin = Math.sin(-this.rotation);
        const dx = x - this.x;
        const dy = y - this.y;
        const localX = dx * cos - dy * sin;
        const localY = dx * sin + dy * cos;
        return Math.abs(localX) <= (this.w * this.scale) / 2 && Math.abs(localY) <= (this.h * this.scale) / 2;
      }

      grab(x, y) {
        this.isGrabbed = true;
        this.targetScale = 1.05;
        this.grabOffsetX = this.x - x;
        this.grabOffsetY = this.y - y;
        this.vx = 0;
        this.vy = 0;
        this.angularVelocity *= 0.2;
      }

      drag(x, y) {
        this.x = x + this.grabOffsetX;
        this.y = y + this.grabOffsetY;
      }

      release(vx, vy) {
        this.isGrabbed = false;
        this.targetScale = 1;
        const speed = Math.hypot(vx, vy);
        const maxSpeed = CONFIG.eyeSlices.maxSpeed;
        const scale = speed > maxSpeed ? maxSpeed / speed : 1;
        this.vx = vx * scale * CONFIG.eyeSlices.throwMultiplier;
        this.vy = vy * scale * CONFIG.eyeSlices.throwMultiplier;
        this.angularVelocity = Math.max(-0.08, Math.min(0.08, vx * 0.004));
      }
    }

    const EyeSliceManager = {
      slices: [],
      grabbedSlice: null,
      pointerHistory: [],

      init() {
        this.createMockSlices();
      },

      createMockSlices() {
        this.slices = [];
        const sourceMedia = this.getSourceMedia();
        const sourceSize = sourceMedia ? getMediaSize(sourceMedia) : null;
        const fallbackRects = sourceSize
          ? [
              {
                x: sourceSize.width * 0.34,
                y: sourceSize.height * 0.35,
                w: sourceSize.width * 0.16,
                h: sourceSize.height * 0.12,
                side: "left"
              },
              {
                x: sourceSize.width * 0.5,
                y: sourceSize.height * 0.35,
                w: sourceSize.width * 0.16,
                h: sourceSize.height * 0.12,
                side: "right"
              }
            ]
          : [];
        const liveRects = FaceTracker.getEyeRects();

        const count = CONFIG.eyeSlices.initialCount;
        const baseSize = Math.max(76, Math.min(142, Math.min(AppState.canvasWidth, AppState.canvasHeight) * 0.14));

        for (let i = 0; i < count; i += 1) {
          const angle = (i / count) * Math.PI * 2;
          const radiusX = AppState.canvasWidth * 0.19;
          const radiusY = AppState.canvasHeight * 0.12;
          const sourceEye = i % 2 === 0 ? "left" : "right";
          const rect = liveRects.find((eyeRect) => eyeRect.side === sourceEye)
            || fallbackRects.find((eyeRect) => eyeRect.side === sourceEye)
            || null;
          this.slices.push(new EyeSlice({
            id: `mock-${i}`,
            x: AppState.canvasWidth * 0.5 + Math.cos(angle) * radiusX,
            y: AppState.canvasHeight * 0.48 + Math.sin(angle) * radiusY,
            homeX: AppState.canvasWidth * 0.5 + Math.cos(angle) * radiusX,
            homeY: AppState.canvasHeight * 0.48 + Math.sin(angle) * radiusY,
            w: baseSize * (0.86 + (i % 3) * 0.08),
            h: baseSize * (0.86 + (i % 3) * 0.08),
            vx: Math.sin(angle) * 0.25,
            vy: Math.cos(angle) * 0.22,
            rotation: (i - count / 2) * 0.05,
            angularVelocity: (i % 2 ? 0.006 : -0.006),
            sourceEye,
            sourceRect: rect
          }));
        }
      },

      createSliceFromEyeRect(eyeRect) {
        const id = `eye-${Date.now()}-${this.slices.length}`;
        const side = Math.max(76, Math.min(156, Math.max(eyeRect.w, eyeRect.h) * 1.45));
        const slice = new EyeSlice({
          id,
          x: AppState.canvasWidth * 0.5,
          y: AppState.canvasHeight * 0.44,
          w: side,
          h: side,
          sourceEye: eyeRect.side,
          sourceRect: eyeRect
        });
        this.slices.push(slice);
        return slice;
      },

      update(dt) {
        if (!this.slices.length) {
          this.createMockSlices();
        }
        this.slices.forEach((slice) => slice.update(dt));
      },

      draw(targetCtx) {
        const sourceMedia = this.getSourceMedia();
        this.slices.forEach((slice) => slice.draw(targetCtx, sourceMedia));
      },

      updateEyeRects(eyeRects) {
        if (!eyeRects || !eyeRects.length) return;
        this.slices.forEach((slice, index) => {
          const sourceEye = slice.sourceEye || (index % 2 === 0 ? "left" : "right");
          const rect = eyeRects.find((eyeRect) => eyeRect.side === sourceEye) || eyeRects[index % eyeRects.length];
          if (rect) {
            slice.sourceEye = sourceEye;
            slice.sourceRect = rect;
          }
        });
      },

      getSourceMedia() {
        if (AppState.cameraReady && SourceManager.videoEl) {
          return CameraStylePipeline.getClearSource(SourceManager.videoEl);
        }
        return null;
      },

      findNearestSlice(x, y, radius) {
        let best = null;
        let bestDistance = radius;
        for (let i = this.slices.length - 1; i >= 0; i -= 1) {
          const slice = this.slices[i];
          const distance = Math.hypot(slice.x - x, slice.y - y);
          if ((slice.containsPoint(x, y) || distance < bestDistance) && distance <= bestDistance) {
            best = slice;
            bestDistance = distance;
          }
        }
        return best;
      },

      grabAt(x, y) {
        const slice = this.findNearestSlice(x, y, CONFIG.hand.grabRadius);
        if (!slice) return false;
        this.grabbedSlice = slice;
        this.pointerHistory = [{ x, y, time: performance.now() }];
        slice.grab(x, y);
        return true;
      },

      dragTo(x, y) {
        if (!this.grabbedSlice) return false;
        this.grabbedSlice.drag(x, y);
        this.recordPointer(x, y);
        return true;
      },

      release(vx, vy) {
        if (!this.grabbedSlice) return false;
        this.grabbedSlice.release(vx, vy);
        this.grabbedSlice = null;
        this.pointerHistory = [];
        return true;
      },

      recordPointer(x, y) {
        const now = performance.now();
        this.pointerHistory.push({ x, y, time: now });
        this.pointerHistory = this.pointerHistory.filter((point) => now - point.time <= 140).slice(-6);
      },

      getReleaseVelocity() {
        if (this.pointerHistory.length < 2) return { vx: 0, vy: 0 };
        const first = this.pointerHistory[0];
        const last = this.pointerHistory[this.pointerHistory.length - 1];
        const dt = Math.max(16, last.time - first.time);
        return {
          vx: ((last.x - first.x) / dt) * 16.67,
          vy: ((last.y - first.y) / dt) * 16.67
        };
      },

      triggerBlinkEffect() {
        this.slices.forEach((slice, index) => {
          const target = this.getRegroupTarget(slice, index);
          slice.flash = 1;
          slice.homeX = target.x;
          slice.homeY = target.y;
          slice.vx += (target.x - slice.x) * 0.05 + Math.cos(index) * 1.2;
          slice.vy += (target.y - slice.y) * 0.05 + Math.sin(index) * 1.2;
          slice.rotation *= 0.65;
          slice.angularVelocity += (index % 2 ? 0.018 : -0.018);
          slice.targetScale = 0.94 + (index % 3) * 0.04;
        });
      },

      getRegroupTarget(slice, index) {
        if (slice.sourceRect) {
          const mapped = mapVideoRectToCanvas(slice.sourceRect);
          if (mapped) {
            const localIndex = Math.floor(index / 2);
            const offsetX = (localIndex - 1.5) * mapped.w * 0.42;
            const offsetY = Math.sin(index * 1.7) * mapped.h * 0.28;
            return {
              x: mapped.x + mapped.w * 0.5 + offsetX,
              y: mapped.y + mapped.h * 0.5 + offsetY
            };
          }
        }

        const count = Math.max(1, this.slices.length);
        const angle = (index / count) * Math.PI * 2;
        return {
          x: AppState.canvasWidth * 0.5 + Math.cos(angle) * AppState.canvasWidth * 0.16,
          y: AppState.canvasHeight * 0.46 + Math.sin(angle) * AppState.canvasHeight * 0.1
        };
      }
    };

    class FaceShard {
      constructor(options) {
        this.id = options.id;
        this.sourceRect = options.sourceRect;
        this.x = options.x;
        this.y = options.y;
        this.homeX = options.homeX;
        this.homeY = options.homeY;
        this.w = options.w;
        this.h = options.h;
        this.vx = options.vx || 0;
        this.vy = options.vy || 0;
        this.rotation = options.rotation || 0;
        this.angularVelocity = options.angularVelocity || 0;
        this.alpha = 0.82;
        this.scale = options.scale || 1;
        this.targetScale = 1;
        this.isGrabbed = false;
        this.grabOffsetX = 0;
        this.grabOffsetY = 0;
        this.seed = Math.random() * 1000;
      }

      update(dt) {
        if (FaceShardManager.frozen && !this.isGrabbed) return;
        if (!this.isGrabbed) {
          this.vx += (this.homeX - this.x) * CONFIG.faceShards.reassembleForce * dt;
          this.vy += (this.homeY - this.y) * CONFIG.faceShards.reassembleForce * dt;
          this.x += this.vx * dt * 60;
          this.y += this.vy * dt * 60;
          this.vx *= CONFIG.faceShards.friction;
          this.vy *= CONFIG.faceShards.friction;
          this.rotation += this.angularVelocity * dt * 60;
          this.angularVelocity *= CONFIG.faceShards.friction;
        }
        this.scale += (this.targetScale - this.scale) * Math.min(1, dt * 10);
      }

      draw(targetCtx, sourceMedia) {
        const drawW = this.w * this.scale;
        const drawH = this.h * this.scale;
        targetCtx.save();
        targetCtx.translate(this.x, this.y);
        targetCtx.rotate(this.rotation);
        targetCtx.globalAlpha = this.alpha;
        targetCtx.shadowColor = "rgba(125, 249, 255, 0.24)";
        targetCtx.shadowBlur = 18;

        if (sourceMedia && this.sourceRect) {
          try {
            targetCtx.drawImage(
              sourceMedia,
              this.sourceRect.x,
              this.sourceRect.y,
              this.sourceRect.w,
              this.sourceRect.h,
              -drawW / 2,
              -drawH / 2,
              drawW,
              drawH
            );
          } catch (error) {
            this.drawFallback(targetCtx, drawW, drawH);
          }
        } else {
          this.drawFallback(targetCtx, drawW, drawH);
        }

        targetCtx.shadowColor = "transparent";
        targetCtx.strokeStyle = this.isGrabbed
          ? "rgba(248, 255, 150, 0.95)"
          : "rgba(255, 255, 255, 0.26)";
        targetCtx.lineWidth = this.isGrabbed ? 2 : 1;
        targetCtx.strokeRect(-drawW / 2, -drawH / 2, drawW, drawH);
        targetCtx.restore();
      }

      drawFallback(targetCtx, drawW, drawH) {
        targetCtx.fillStyle = "rgba(255, 79, 216, 0.16)";
        targetCtx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);
      }

      containsPoint(x, y) {
        const dx = x - this.x;
        const dy = y - this.y;
        return Math.abs(dx) <= (this.w * this.scale) / 2 && Math.abs(dy) <= (this.h * this.scale) / 2;
      }

      grab(x, y) {
        this.isGrabbed = true;
        this.grabOffsetX = this.x - x;
        this.grabOffsetY = this.y - y;
        this.targetScale = 1.08;
        this.vx = 0;
        this.vy = 0;
      }

      drag(x, y) {
        this.x = x + this.grabOffsetX;
        this.y = y + this.grabOffsetY;
      }

      release(vx, vy) {
        this.isGrabbed = false;
        this.targetScale = 1;
        this.vx = Math.max(-32, Math.min(32, vx));
        this.vy = Math.max(-32, Math.min(32, vy));
        this.angularVelocity = Math.max(-0.07, Math.min(0.07, vx * 0.003));
      }
    }

    const FaceShardManager = {
      shards: [],
      grabbedShard: null,
      pointerHistory: [],
      lastFaceArea: 0,
      frozen: false,

      updateFromFaceBox(faceRect) {
        if (!faceRect) return;
        if (!this.shards.length) {
          this.createFromFaceRect(faceRect);
          return;
        }

        const mapped = mapVideoRectToCanvas(faceRect);
        const faceArea = mapped ? mapped.w * mapped.h : 0;
        if (this.lastFaceArea && faceArea) {
          const ratio = faceArea / this.lastFaceArea;
          if (ratio > 1.18) this.triggerScalePulse(1.16);
          if (ratio < 0.84) this.triggerScatter(0.45);
        }
        this.lastFaceArea = faceArea || this.lastFaceArea;

        const layout = this.buildLayout(faceRect);
        this.shards.forEach((shard, index) => {
          const next = layout[index % layout.length];
          shard.sourceRect = next.sourceRect;
          shard.homeX = next.homeX;
          shard.homeY = next.homeY;
          shard.w = next.w;
          shard.h = next.h;
        });
      },

      createFromFaceRect(faceRect) {
        this.shards = this.buildLayout(faceRect).map((item, index) => new FaceShard({
          id: `face-${index}`,
          ...item,
          vx: (Math.random() - 0.5) * 1.2,
          vy: (Math.random() - 0.5) * 1.2,
          rotation: (index - 5) * 0.025,
          angularVelocity: index % 2 ? 0.005 : -0.005
        }));
        AppState.faceShardCount = this.shards.length;
      },

      buildLayout(faceRect) {
        const mapped = mapVideoRectToCanvas(faceRect);
        if (!mapped) return [];
        const mediaSize = SourceManager.videoEl ? getMediaSize(SourceManager.videoEl) : null;

        const regions = [
          { x: 0.22, y: 0.06, size: 0.22 },
          { x: 0.56, y: 0.06, size: 0.22 },
          { x: 0.26, y: 0.24, size: 0.20 },
          { x: 0.54, y: 0.24, size: 0.20 },
          { x: 0.40, y: 0.38, size: 0.22 },
          { x: 0.18, y: 0.42, size: 0.24 },
          { x: 0.58, y: 0.42, size: 0.24 },
          { x: 0.32, y: 0.64, size: 0.22 },
          { x: 0.52, y: 0.64, size: 0.22 },
          { x: 0.08, y: 0.22, size: 0.18 },
          { x: 0.74, y: 0.22, size: 0.18 },
          { x: 0.12, y: 0.70, size: 0.18 },
          { x: 0.70, y: 0.70, size: 0.18 },
          { x: 0.42, y: 0.78, size: 0.18 }
        ].slice(0, CONFIG.faceShards.maxCount);

        return regions.map((region, index) => {
          const sourceSide = Math.max(6, Math.min(faceRect.w, faceRect.h) * region.size);
          const centerX = faceRect.x + faceRect.w * region.x;
          const centerY = faceRect.y + faceRect.h * region.y;
          const maxX = mediaSize ? Math.max(0, mediaSize.width - sourceSide) : Number.POSITIVE_INFINITY;
          const maxY = mediaSize ? Math.max(0, mediaSize.height - sourceSide) : Number.POSITIVE_INFINITY;
          const sourceRect = {
            x: Math.max(0, Math.min(maxX, centerX - sourceSide * 0.5)),
            y: Math.max(0, Math.min(maxY, centerY - sourceSide * 0.5)),
            w: sourceSide,
            h: sourceSide
          };
          const homeX = mapped.x + mapped.w * region.x + Math.sin(index) * 10;
          const homeY = mapped.y + mapped.h * region.y + Math.cos(index * 1.4) * 8;
          const side = Math.max(34, Math.min(132, Math.min(mapped.w, mapped.h) * region.size * 1.35));
          return {
            sourceRect,
            homeX,
            homeY,
            x: homeX + Math.sin(index * 1.8) * 26,
            y: homeY + Math.cos(index * 1.3) * 18,
            w: side,
            h: side
          };
        });
      },

      update(dt) {
        this.shards.forEach((shard) => shard.update(dt));
        AppState.faceShardCount = this.shards.length;
      },

      draw(targetCtx) {
        const sourceMedia = SourceManager.videoEl
          ? CameraStylePipeline.getClearSource(SourceManager.videoEl)
          : null;
        this.shards.forEach((shard) => shard.draw(targetCtx, sourceMedia));
      },

      triggerScatter(intensity = 1) {
        this.frozen = false;
        AppState.faceShardsFrozen = false;
        this.shards.forEach((shard, index) => {
          const angle = index * 1.74;
          shard.vx += Math.cos(angle) * CONFIG.faceShards.scatterForce * intensity;
          shard.vy += Math.sin(angle) * CONFIG.faceShards.scatterForce * intensity;
          shard.angularVelocity += (index % 2 ? 0.035 : -0.035) * intensity;
        });
        ParticleManager.emit(AppState.canvasWidth * 0.5, AppState.canvasHeight * 0.45, 18, "face");
      },
