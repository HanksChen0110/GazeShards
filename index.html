<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>眸影碎境 GazeShards</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(3, 7, 12, 0.72);
      --panel-border: rgba(195, 158, 94, 0.42);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.58);
      --accent: #7df9ff;
      --accent-strong: #c39e5e;
      --accent-warm: #e5c06f;
      --brass: #c39e5e;
      --brass-dim: rgba(195, 158, 94, 0.34);
      --silver-blue: #9fd8ff;
      --obsidian: rgba(3, 7, 12, 0.72);
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020508;
      color: var(--text);
      font-family: Georgia, "Times New Roman", "Noto Serif SC", "Microsoft YaHei", serif;
      letter-spacing: 0;
    }

    body {
      touch-action: none;
      user-select: none;
    }

    button,
    input {
      font: inherit;
    }

    #mainCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      background: #020508;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      border: 1px solid rgba(195, 158, 94, 0.58);
      box-shadow: inset 0 0 38px rgba(159, 216, 255, 0.12);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 14px;
      z-index: 1;
      pointer-events: none;
      border: 1px solid rgba(159, 216, 255, 0.16);
      box-shadow: inset 0 0 80px rgba(3, 7, 12, 0.82);
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      background: rgba(3, 7, 12, 0.18);
      backdrop-filter: blur(12px) saturate(0.68);
      transition: opacity 260ms ease, visibility 260ms ease;
    }

    #startOverlay::before,
    #startOverlay::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 52%;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.02)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 13px),
        rgba(5, 9, 13, 0.46);
      box-shadow: inset 0 0 88px rgba(159, 216, 255, 0.18);
      transition: transform 760ms cubic-bezier(0.72, 0.02, 0.18, 1), opacity 760ms ease;
    }

    #startOverlay::before {
      left: 0;
      border-right: 1px solid rgba(229, 192, 111, 0.42);
    }

    #startOverlay::after {
      right: 0;
      transform: scaleX(-1);
      border-left: 1px solid rgba(229, 192, 111, 0.42);
    }

    #startOverlay.is-opening::before {
      transform: translateX(-102%);
      opacity: 0.24;
    }

    #startOverlay.is-opening::after {
      transform: translateX(102%) scaleX(-1);
      opacity: 0.24;
    }

    #startOverlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .startPanel {
      width: min(520px, calc(100vw - 40px));
      display: grid;
      gap: 16px;
      justify-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
      transition: opacity 420ms ease, transform 420ms ease;
    }

    #startOverlay.is-opening .startPanel {
      opacity: 0;
      transform: translateY(-18px);
    }

    .startPanel h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 78px);
      line-height: 0.95;
      font-weight: 760;
    }

    .startPanel p {
      max-width: 420px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .primaryButton,
    .controlButton,
    .fileControl {
      min-height: 42px;
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(9, 16, 23, 0.82), rgba(2, 5, 9, 0.72));
      box-shadow: 0 12px 30px var(--shadow), inset 0 0 18px rgba(159, 216, 255, 0.06);
    }

    .primaryButton {
      min-width: 184px;
      padding: 0 22px;
      color: #06090b;
      background: linear-gradient(135deg, var(--silver-blue), var(--brass));
      border: 1px solid rgba(229, 192, 111, 0.72);
      font-weight: 760;
      cursor: pointer;
    }

    .controlButton {
      min-width: 108px;
      padding: 0 14px;
      cursor: pointer;
      backdrop-filter: blur(14px);
      transition: border-color 160ms ease, box-shadow 160ms ease, color 160ms ease, background 160ms ease;
    }

    .controlButton:hover,
    .fileControl:hover {
      border-color: rgba(159, 216, 255, 0.78);
      box-shadow: 0 0 18px rgba(159, 216, 255, 0.18), inset 0 0 18px rgba(159, 216, 255, 0.08);
    }

    .controlButton:disabled,
    .fileControl[aria-disabled="true"] {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .controlButton.is-active {
      color: #051014;
      background: linear-gradient(135deg, var(--accent), var(--accent-warm));
      border-color: transparent;
    }

    #soundToggleBtn {
      width: 46px;
      min-width: 46px;
      padding: 0;
      font-size: 18px;
    }

    #controls {
      position: fixed;
      right: max(18px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      max-width: min(360px, calc(100vw - 32px));
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(5, 10, 16, 0.78), rgba(1, 3, 6, 0.72));
      box-shadow: inset 0 0 24px rgba(159, 216, 255, 0.06), 0 18px 44px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
      transition: background 160ms ease, border-color 160ms ease;
    }

    body.ui-hidden #controls {
      background: transparent;
      border-color: transparent;
      padding: 0;
    }

    body.ui-hidden #controls .stageControl {
      display: none;
    }

    body.recording-mode #controls,
    body.recording-mode #debugPanel,
    body.recording-mode #triggerHintPanel,
    body.recording-mode #toast,
    body.recording-mode #guidePanel {
      display: none;
    }

    #restartBtn {
      position: fixed;
      left: 50%;
      bottom: max(34px, calc(env(safe-area-inset-bottom) + 34px));
      z-index: 17;
      min-width: 148px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      border-color: rgba(229, 192, 111, 0.82);
      color: rgba(245, 238, 220, 0.94);
    }

    #restartBtn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    #recordExitBtn {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      z-index: 16;
      width: 34px;
      min-width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      display: none;
      border-radius: 999px;
      font-size: 18px;
      line-height: 1;
    }

    body.recording-mode #recordExitBtn {
      display: inline-grid;
      place-items: center;
    }

    .fileControl {
      position: relative;
      width: 178px;
      padding: 10px 12px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      cursor: pointer;
      backdrop-filter: blur(14px);
    }

    .fileControl input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: max(84px, calc(env(safe-area-inset-bottom) + 84px));
      z-index: 12;
      width: min(520px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text);
      background: var(--panel-bg);
      box-shadow: 0 18px 44px var(--shadow);
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      backdrop-filter: blur(18px);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #debugPanel {
      position: fixed;
      top: max(76px, calc(env(safe-area-inset-top) + 76px));
      right: max(18px, env(safe-area-inset-right));
      z-index: 10;
      min-width: 260px;
      max-width: calc(100vw - 32px);
      padding: 12px;
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(5, 10, 16, 0.76), rgba(1, 3, 6, 0.68));
      color: var(--text);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-line;
      box-shadow: inset 0 0 30px rgba(159, 216, 255, 0.08), 0 18px 54px rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    #debugCloseBtn {
      position: sticky;
      top: 0;
      float: right;
      width: 28px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      margin-left: 8px;
      border-radius: 999px;
      line-height: 1;
    }

    #debugPanelText {
      margin: 0;
      white-space: pre-line;
      font: inherit;
    }

    body.ui-hidden #debugPanel {
      display: none;
    }

    #triggerHintPanel {
      position: fixed;
      left: max(18px, env(safe-area-inset-left));
      top: max(18px, env(safe-area-inset-top));
      z-index: 11;
      width: min(260px, calc(100vw - 36px));
      padding: 12px 12px 10px;
      border: 1px solid rgba(159, 216, 255, 0.32);
      border-radius: 4px;
      background: rgba(3, 7, 12, 0.66);
      box-shadow: inset 0 0 22px rgba(159, 216, 255, 0.07), 0 12px 34px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      line-height: 1.55;
    }

    #triggerHintPanel.hidden {
      display: none;
    }

    #triggerHintPanel strong {
      display: block;
      margin-bottom: 6px;
      color: rgba(229, 192, 111, 0.92);
      font-size: 13px;
      font-weight: 700;
    }

    #triggerHintCloseBtn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      min-width: 24px;
      min-height: 24px;
      padding: 0;
      border-radius: 999px;
      line-height: 1;
    }

    #guidePanel {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 9;
      width: min(320px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid rgba(125, 249, 255, 0.20);
      border-radius: 8px;
      background: rgba(5, 8, 12, 0.58);
      color: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      font-size: 13px;
      line-height: 1.55;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #guidePanel.hidden,
    body.ui-hidden #guidePanel {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    @media (max-width: 560px) {
      #controls {
        left: 12px;
        right: 12px;
      }

      .controlButton,
      .fileControl {
        flex: 1 1 132px;
        min-width: 0;
      }

      #soundToggleBtn {
        flex: 0 0 54px;
        width: 54px;
        min-width: 54px;
      }

      body.ui-hidden #controls {
        left: auto;
      }

      #toast {
        bottom: 88px;
      }

      #guidePanel {
        left: 12px;
        right: 12px;
        bottom: 112px;
        width: auto;
        font-size: 12px;
      }

      #debugPanel {
        left: 12px;
        right: 12px;
        top: 12px;
        width: auto;
        max-height: calc(100dvh - 360px);
        font-size: 11px;
        line-height: 1.42;
      }

      #triggerHintPanel {
        left: 12px;
        top: 12px;
        width: min(220px, calc(100vw - 24px));
      }

      .controlButton,
      .fileControl {
        min-height: 46px;
      }
    }
  </style>
</head>
<body>
  <canvas id="mainCanvas"></canvas>
  <button id="recordExitBtn" class="controlButton" type="button" title="退出录屏模式">×</button>
  <button id="restartBtn" class="controlButton" type="button">重新开始</button>

  <div id="startOverlay">
    <div class="startPanel">
      <h1>灵视档案馆</h1>
      <p>交出一块脸部碎片，打开你的隐藏档案。</p>
      <button id="startBtn" class="primaryButton" type="button">开启灵视</button>
    </div>
  </div>

  <div id="controls">
    <button id="soundToggleBtn" class="controlButton stageControl" type="button" aria-pressed="true" title="声音开关">♪</button>
    <button id="toggleUiBtn" class="controlButton" type="button">隐藏界面</button>
    <button id="toggleHintBtn" class="controlButton stageControl" type="button">提示</button>
    <button id="toggleDebugBtn" class="controlButton stageControl" type="button">关闭调试</button>
    <button id="recordModeBtn" class="controlButton stageControl" type="button">录屏模式</button>
    <button id="resetVisualBtn" class="controlButton stageControl" type="button">重置画面</button>
    <button id="grayscaleToggleBtn" class="controlButton stageControl is-active" type="button">黑白 开</button>
    <button id="performanceModeBtn" class="controlButton stageControl" type="button">性能 自动</button>
    <button id="flipCameraBtn" class="controlButton stageControl" type="button">切换镜头</button>
    <label class="fileControl stageControl" aria-disabled="false">
      <span id="mediaUploadLabel">上传图片/视频</span>
      <input id="mediaUpload" type="file" accept="image/*,video/*">
    </label>
  </div>

  <div id="triggerHintPanel">
    <button id="triggerHintCloseBtn" class="controlButton" type="button" title="关闭提示">×</button>
    <strong>灵视提示</strong>
    <div id="triggerHintContent"></div>
  </div>
  <div id="debugPanel">
    <button id="debugCloseBtn" class="controlButton" type="button" title="关闭调试">×</button>
    <pre id="debugPanelText"></pre>
  </div>
  <div id="guidePanel" class="hidden">捏住一块脸部碎片，拖入左侧卡牌背面。</div>
  <div id="toast" role="status" aria-live="polite"></div>

  <script>
    // =====================================================
    // 0. CONFIG
    // =====================================================
    const CONFIG = {
      targetFPS: 30,

      camera: {
        width: 1280,
        height: 720,
        facingMode: "user"
      },

      hand: {
        numHands: 2,
        pinchDownThreshold: 0.05,
        pinchUpThreshold: 0.08,
        handMatchRadius: 200,
        grabRadius: 150,
        keepLostHandMs: 200
      },

      face: {
        maxFaces: 1,
        eyePaddingRatio: 0.35,
        blinkThreshold: 0.22,
        blinkCooldownMs: 350
      },

      visualStyle: {
        grayscaleEnabled: true,
        backgroundBlur: 9,
        filmGrain: 0.16
      },

      topEyePreview: {
        enabled: true,
        widthRatio: 0.22,
        maxWidth: 220,
        minWidth: 132,
        aspectRatio: 2.35,
        top: 22
      },

      tarotDeck: {
        enabled: true,
        currentIndex: 0,
        switchCooldownMs: 900,
        summonDurationMs: 1800,
        revealDurationMs: 1150,
        revealHoldMs: 800,
        normalCardWidthRatioDesktop: 0.18,
        normalCardWidthRatioMobile: 0.28,
        maxNormalCardWidth: 230
      },

      curtain: {
        revealDistanceRatio: 0.18,
        openDurationMs: 620,
        reboundSpeed: 7.5
      },

      blinkCombo: {
        requiredCount: 3,
        windowMs: 1800
      },

      eyeSlices: {
        initialCount: 9,
        minScale: 0.82,
        maxScale: 1.42,
        friction: 0.94,
        throwMultiplier: 1.0,
        maxSpeed: 40,
        floatNoiseAmount: 0.4
      },

      performance: {
        handDetectEveryNFrames: 2,
        faceDetectEveryNFrames: 6,
        maxParticles: 160,
        lowModeParticles: 60,
        lowResScale: 0.75,
        lowFpsThreshold: 22,
        lowFpsMs: 3000,
        highFpsThreshold: 28,
        highFpsMs: 5000
      },

      faceShards: {
        maxCount: 16,
        maxVisibleDesktop: 7,
        maxVisibleMobile: 5,
        minInteractiveSizeDesktop: 56,
        minInteractiveSizeMobile: 64,
        returnForce: 0.16,
        allowDecorativeShards: false,
        friction: 0.92,
        scatterForce: 10,
        grabRadius: 140,
        reassembleForce: 0.08
      }
    };

    // =====================================================
    // 1. DOM REFS
    // =====================================================
    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");
    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");
    const controls = document.getElementById("controls");
    const soundToggleBtn = document.getElementById("soundToggleBtn");
    const toggleUiBtn = document.getElementById("toggleUiBtn");
    const toggleHintBtn = document.getElementById("toggleHintBtn");
    const toggleDebugBtn = document.getElementById("toggleDebugBtn");
    const recordModeBtn = document.getElementById("recordModeBtn");
    const resetVisualBtn = document.getElementById("resetVisualBtn");
    const grayscaleToggleBtn = document.getElementById("grayscaleToggleBtn");
    const performanceModeBtn = document.getElementById("performanceModeBtn");
    const flipCameraBtn = document.getElementById("flipCameraBtn");
    const mediaUpload = document.getElementById("mediaUpload");
    const mediaUploadLabel = document.getElementById("mediaUploadLabel");
    const debugPanel = document.getElementById("debugPanel");
    const debugCloseBtn = document.getElementById("debugCloseBtn");
    const debugPanelText = document.getElementById("debugPanelText");
    const triggerHintPanel = document.getElementById("triggerHintPanel");
    const triggerHintCloseBtn = document.getElementById("triggerHintCloseBtn");
    const triggerHintContent = document.getElementById("triggerHintContent");
    const guidePanel = document.getElementById("guidePanel");
    const recordExitBtn = document.getElementById("recordExitBtn");
    const restartBtn = document.getElementById("restartBtn");
    const toast = document.getElementById("toast");

    // =====================================================
    // 2. APP STATE
    // =====================================================
    const AppState = {
      phase: "boot",
      experiencePhase: "curtain", // curtain | shardRitual | revealed | foolEnding
      cameraReady: false,
      mediaReady: false,
      handReady: false,
      faceReady: false,

      useFrontCamera: true,
      mirrored: true,
      uiHidden: false,
      debug: true,
      recordingMode: false,
      guideVisible: false,
      performanceMode: "auto",
      grayscaleEnabled: true,

      canvasWidth: 0,
      canvasHeight: 0,
      dpr: 1,

      lastFrameTime: 0,
      fps: 0,
      frameCount: 0,
      startedAt: performance.now(),
      lastDeltaTime: 1 / 60,

      activeMode: "eye-slice",
      inputMode: "fallback",
      lastRenderLayers: [],
      pointerActive: false,
      activePointerId: null,
      grabbedTarget: null,
      lastPinchEvent: "none",
      activePinches: 0,
      detectedHands: 0,
      detectedFaces: 0,
      faceShardCount: 0,
      faceShardsFrozen: false,
      lastBlinkTime: 0,
      blinkState: "open",
      eyeOpenRatio: 1,
      lastHandPose: "none",
      currentCardId: "fool",
      currentCardIndex: 0,
      cardState: "faceDown",
      tarotAssetsReady: false,
      tarotAssetsFailed: false,
      hasRevealedArchive: false,
      selectedRegionType: "unknown",
      archiveVerdictTitle: "",
      archiveVerdictBody: "",
      archiveReading: false,
      archiveGenerated: false,
      spiritArchive: "V0.6",
      lastCurtainEvent: "",
      curtainHint: true,
      audioReady: false,
      audioEnabled: true,
      audioBlocked: false,
      lastOpenPalmTime: 0,
      blinkComboCount: 0,
      gameEnded: false,
      screenFlash: 0,

      errors: []
    };

    const RitualState = {
      selectedShardId: null,
      hoverStartAt: 0,
      targetCardId: "justice",
      revealStartedAt: 0
    };

    const AudioManager = {
      audio: null,
      ready: false,
      enabled: true,
      volume: 0.35,
      src: "assets/Harry_Potter_-_Theme_Song_Hedwig_s_Theme_(mp3.pm).mp3",

      init() {
        if (this.audio) return;
        this.audio = new Audio(this.src);
        this.audio.loop = true;
        this.audio.preload = "auto";
        this.audio.volume = this.volume;
        this.audio.onplaying = () => {
          this.ready = true;
          AppState.audioReady = true;
          AppState.audioBlocked = false;
          this.updateButton();
        };
        this.audio.onerror = () => {
          AppState.audioBlocked = true;
          this.updateButton();
        };
        AppState.audioEnabled = this.enabled;
      },

      async start() {
        this.init();
        if (!this.enabled || !this.audio) return false;
        try {
          this.audio.volume = this.volume;
          const result = await Promise.race([
            this.audio.play().then(() => "playing"),
            new Promise((resolve) => window.setTimeout(() => resolve("timeout"), 1200))
          ]);
          if (result === "timeout") {
            AppState.audioBlocked = true;
            this.updateButton();
            showToast("声音被浏览器拦截，可点击声音按钮开启。");
            return false;
          }
          this.ready = true;
          AppState.audioReady = true;
          AppState.audioBlocked = false;
          this.updateButton();
          return true;
        } catch (error) {
          AppState.audioBlocked = true;
          AppState.errors.push(`BGM 播放失败：${error.message || "未知错误"}`);
          showToast("声音被浏览器拦截，可点击声音按钮开启。");
          this.updateButton();
          return false;
        }
      },

      toggle() {
        this.init();
        this.enabled = !this.enabled;
        AppState.audioEnabled = this.enabled;
        if (!this.enabled) {
          this.audio.pause();
          this.updateButton();
          showToast("声音已关闭。");
          return;
        }
        this.start();
      },

      setVolume(value) {

      },

      updateButton() {

    const TriggerHintPanel = {

    const DebugPanelController = {

      show() {

        setDebugEnabled(true);
      },

      hide() {

        setDebugEnabled(false);
      },

    const ControlDockController = {
      ensureVisible() {
        controls.style.maxHeight = "calc(100dvh - 28px)";
        controls.style.overflow = "auto";
      },

      applySafeAreaLayout() {
        this.ensureVisible();
      }
    };

    const RippleManager = {
      ripples: [],

      emit(x, y, strength = 1, type = "curtain") {
        const maxRipples = PerformanceManager?.effectiveMode === "low" ? 10 : 24;
        this.ripples.push({
          x,
          y,
          strength,
          type,
          life: type === "curtain" ? 1.15 : 0.72,
          maxLife: type === "curtain" ? 1.15 : 0.72,
          radius: 8
        });
        this.ripples = this.ripples.slice(-maxRipples);
      },

      update(dt) {
        this.ripples.forEach((ripple) => {
          ripple.life -= dt;
          ripple.radius += dt * (ripple.type === "curtain" ? 86 : 138) * ripple.strength;
        });
        this.ripples = this.ripples.filter((ripple) => ripple.life > 0);
      },

      draw(targetCtx) {
        targetCtx.save();
        this.ripples.forEach((ripple) => {
          const t = Math.max(0, ripple.life / ripple.maxLife);
          const alpha = (ripple.type === "curtain" ? 0.46 : 0.24) * t;
          targetCtx.strokeStyle = `rgba(159, 216, 255, ${alpha})`;
          targetCtx.lineWidth = 1 + ripple.strength * 1.4;
          targetCtx.beginPath();
          targetCtx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
          targetCtx.stroke();
          targetCtx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.16})`;
          targetCtx.beginPath();
          targetCtx.arc(ripple.x, ripple.y, ripple.radius * 0.28, 0, Math.PI * 2);
          targetCtx.fill();
        });
        targetCtx.restore();
      },

      reset() {
        this.ripples = [];
      }
    };

    const CurtainRevealManager = {
      state: "idle",
      grabStart: null,
      dragOffset: { x: 0, y: 0 },
      revealProgress: 0,

      update(timestamp, dt) {
        if (AppState.experiencePhase !== "curtain") return;
        if (this.state === "opening") {
          this.revealProgress = Math.min(1, this.revealProgress + dt * 1.9);
          if (this.revealProgress >= 1) {
            this.state = "revealed";
            AppState.lastCurtainEvent = "CURTAIN_REVEALED";
            setExperiencePhase("shardRitual");
          }
        } else if (this.state === "idle") {
          this.dragOffset.x *= Math.max(0, 1 - dt * CONFIG.curtain.reboundSpeed);
          this.dragOffset.y *= Math.max(0, 1 - dt * CONFIG.curtain.reboundSpeed);
          this.revealProgress = Math.max(0, Math.hypot(this.dragOffset.x, this.dragOffset.y) / this.threshold());
        }
      },

      draw(targetCtx, timestamp) {
        if (AppState.experiencePhase !== "curtain") return;
        const width = AppState.canvasWidth;
        const height = AppState.canvasHeight;
        const openY = -height * 0.92 * this.revealProgress;
        targetCtx.save();
        targetCtx.translate(this.dragOffset.x * 0.28, this.dragOffset.y * 0.28 + openY);
        const membrane = targetCtx.createLinearGradient(0, 0, width, height);
        membrane.addColorStop(0, "rgba(255, 255, 255, 0.13)");
        membrane.addColorStop(0.46, "rgba(159, 216, 255, 0.18)");
        membrane.addColorStop(1, "rgba(229, 192, 111, 0.08)");
        targetCtx.fillStyle = membrane;
        targetCtx.fillRect(0, 0, width, height);
        targetCtx.globalAlpha = 0.48;
        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.24)";
        targetCtx.lineWidth = 1;
        const wave = Math.sin(timestamp * 0.002) * 12;
        for (let y = 36 + wave; y < height; y += 46) {
          targetCtx.beginPath();
          for (let x = 0; x <= width; x += 24) {
            const py = y + Math.sin(x * 0.018 + timestamp * 0.003) * 5;
            if (x === 0) targetCtx.moveTo(x, py);
            else targetCtx.lineTo(x, py);
          }
          targetCtx.stroke();
        }
        targetCtx.globalAlpha = 1;
        targetCtx.strokeStyle = "rgba(229, 192, 111, 0.68)";
        targetCtx.lineWidth = 2;
        targetCtx.strokeRect(26, 26, width - 52, height - 52);
        targetCtx.fillStyle = "rgba(255,255,255,0.82)";
        targetCtx.font = "16px Georgia, 'Microsoft YaHei', serif";
        targetCtx.textAlign = "center";
        targetCtx.fillText("拖开水膜，进入档案", width * 0.5, height * 0.52);
        targetCtx.restore();
      },

      grabAt(x, y) {
        if (AppState.experiencePhase !== "curtain") return false;
        this.state = "grabbing";
        this.grabStart = { x, y };
        RippleManager.emit(x, y, 1.2, "curtain");
        return true;
      },

      dragTo(x, y) {
        if (this.state !== "grabbing" || !this.grabStart) return false;
        this.dragOffset = { x: x - this.grabStart.x, y: y - this.grabStart.y };
        this.revealProgress = Math.min(1, Math.hypot(this.dragOffset.x, this.dragOffset.y) / this.threshold());
        RippleManager.emit(x, y, 1.1, "curtain");
        return true;
      },

      release() {
        if (this.state !== "grabbing") return false;
        if (this.revealProgress >= 1) {
          this.state = "opening";
        } else {
          this.state = "idle";
          this.grabStart = null;
        }
        return true;
      },

      threshold() {
        return Math.max(42, Math.min(AppState.canvasWidth, AppState.canvasHeight) * CONFIG.curtain.revealDistanceRatio);
      },

      reset() {
        this.state = "idle";
        this.grabStart = null;
        this.dragOffset = { x: 0, y: 0 };
        this.revealProgress = 0;
      }
    };

    // =====================================================
    // 3. SOURCE MANAGER
    // =====================================================
    const SourceManager = {
      videoEl: null,
      uploadedEl: null,
      uploadedType: null,
      uploadedUrl: null,
      stream: null,

      async startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          const message = "当前浏览器不支持摄像头访问，已保留鼠标/触摸 fallback。";
          AppState.errors.push(message);
          AppState.cameraReady = false;
          AppState.inputMode = "fallback";
          showToast(message);
          return false;
        }

        await this.stopCamera();

        const constraints = {
          audio: false,
          video: {
            width: { ideal: CONFIG.camera.width },
            height: { ideal: CONFIG.camera.height },
            facingMode: AppState.useFrontCamera ? "user" : "environment"
          }
        };

        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          const video = document.createElement("video");
          video.muted = true;
          video.playsInline = true;
          video.autoplay = true;
          video.srcObject = stream;

          await new Promise((resolve, reject) => {
            video.onloadedmetadata = resolve;
            video.onerror = () => reject(new Error("摄像头视频元数据加载失败。"));
          });
          await video.play();

          this.stream = stream;
          this.videoEl = video;
          AppState.cameraReady = true;
          AppState.mirrored = AppState.useFrontCamera;
          AppState.inputMode = AppState.mediaReady ? "camera+uploaded" : "camera";
          if (typeof EyeSliceManager !== "undefined") {
            EyeSliceManager.createMockSlices();
          }
          return true;
        } catch (error) {
          const message = `摄像头启动失败：${error.message || error.name || "未知错误"}`;
          AppState.errors.push(message);
          AppState.cameraReady = false;
          AppState.inputMode = AppState.mediaReady ? "uploaded" : "fallback";
          showToast("摄像头没有启动成功，但页面仍可继续使用上传素材。");
          return false;
        }
      },

      async stopCamera() {
        if (this.stream) {
          this.stream.getTracks().forEach((track) => track.stop());
        }
        this.stream = null;
        this.videoEl = null;
        AppState.cameraReady = false;
      },

      async switchCamera() {
        AppState.useFrontCamera = !AppState.useFrontCamera;
        AppState.mirrored = AppState.useFrontCamera;
        showToast(AppState.useFrontCamera ? "正在切换到前置镜头..." : "正在切换到后置镜头...");
        const ok = await this.startCamera();
        if (ok) {
          showToast(AppState.useFrontCamera ? "已切换到前置镜头。" : "已切换到后置镜头。");
        }
      },

      async handleUpload(file) {
        if (!file) return false;

        this.clearUploadedMedia();

        const url = URL.createObjectURL(file);
        this.uploadedUrl = url;

        try {
          if (file.type.startsWith("image/")) {
            const img = new Image();
            img.src = url;
            await new Promise((resolve, reject) => {
              img.onload = resolve;
              img.onerror = () => reject(new Error("图片加载失败。"));
            });
            this.uploadedEl = img;
            this.uploadedType = "image";
            AppState.mediaReady = true;
            AppState.inputMode = AppState.cameraReady ? "camera+uploaded" : "uploaded";
            mediaUploadLabel.textContent = "已上传图片";
            showToast("图片已作为背景素材载入。");
            return true;
          }

          if (file.type.startsWith("video/")) {
            const video = document.createElement("video");
            video.src = url;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.autoplay = true;
            await new Promise((resolve, reject) => {
              video.onloadedmetadata = resolve;
              video.onerror = () => reject(new Error("视频加载失败。"));
            });
            await video.play();
            this.uploadedEl = video;
            this.uploadedType = "video";
            AppState.mediaReady = true;
            AppState.inputMode = AppState.cameraReady ? "camera+uploaded" : "uploaded";
            mediaUploadLabel.textContent = "已上传视频";
            showToast("视频已静音循环播放。");
            return true;
          }

          throw new Error("只支持图片或视频文件。");
        } catch (error) {
          this.clearUploadedMedia();
          const message = `上传素材失败：${error.message || "未知错误"}`;
          AppState.errors.push(message);
          AppState.mediaReady = false;
          AppState.inputMode = AppState.cameraReady ? "camera" : "fallback";
          mediaUploadLabel.textContent = "上传图片/视频";
          showToast(message);
          return false;
        }
      },

      clearUploadedMedia() {
        if (this.uploadedEl && this.uploadedType === "video") {
          this.uploadedEl.pause();
        }
        if (this.uploadedUrl) {
          URL.revokeObjectURL(this.uploadedUrl);
        }
        this.uploadedEl = null;
        this.uploadedType = null;
        this.uploadedUrl = null;
      },

      drawCamera(targetCtx) {
        if (!AppState.cameraReady || !this.videoEl) return false;
        CameraStylePipeline.drawBackground(targetCtx, this.videoEl);
        return true;
      },

      drawUploadedMedia(targetCtx) {
        if (!AppState.mediaReady || !this.uploadedEl) return false;
        drawMediaCover(targetCtx, this.uploadedEl, false);
        return true;
      }
    };

    const CameraStylePipeline = {
      clearCanvas: document.createElement("canvas"),
      clearCtx: null,
      lastClearFrame: -1,
      lastClearMedia: null,
      lastClearGrayscale: null,

      updateClearSource(media) {
        if (!media) return null;
        const mediaSize = getMediaSize(media);
        if (!this.clearCtx) {
          this.clearCtx = this.clearCanvas.getContext("2d");
        }
        const sizeChanged = this.clearCanvas.width !== mediaSize.width || this.clearCanvas.height !== mediaSize.height;
        if (!sizeChanged && this.lastClearFrame === AppState.frameCount && this.lastClearMedia === media && this.lastClearGrayscale === AppState.grayscaleEnabled) {
          return this.clearCanvas;
        }
        if (sizeChanged) {
          this.clearCanvas.width = mediaSize.width;
          this.clearCanvas.height = mediaSize.height;
        }

        this.clearCtx.save();
        this.clearCtx.clearRect(0, 0, mediaSize.width, mediaSize.height);
        this.clearCtx.filter = AppState.grayscaleEnabled ? "grayscale(1) contrast(1.08)" : "none";
        this.clearCtx.drawImage(media, 0, 0, mediaSize.width, mediaSize.height);
        this.clearCtx.restore();
        this.lastClearFrame = AppState.frameCount;
        this.lastClearMedia = media;
        this.lastClearGrayscale = AppState.grayscaleEnabled;
        return this.clearCanvas;
      },

      getClearSource(media) {
        if (!media) return null;
        return AppState.grayscaleEnabled ? this.updateClearSource(media) : media;
      },

      drawBackground(targetCtx, media) {
        targetCtx.save();
        const filters = [];
        if (AppState.grayscaleEnabled) {
          filters.push("grayscale(1)", "contrast(1.08)");
        }
        const blurAmount = (PerformanceManager.effectiveMode === "low" || AppState.gameEnded)
          ? Math.min(CONFIG.visualStyle.backgroundBlur, 4)
          : CONFIG.visualStyle.backgroundBlur;
        if (blurAmount > 0) {
          filters.push(`blur(${blurAmount}px)`);
        }
        targetCtx.filter = filters.join(" ") || "none";
        drawMediaCover(targetCtx, media, AppState.mirrored);
        targetCtx.restore();
      },

      setGrayscale(enabled) {
        AppState.grayscaleEnabled = enabled;
        CONFIG.visualStyle.grayscaleEnabled = enabled;
        grayscaleToggleBtn.textContent = enabled ? "黑白 开" : "黑白 关";
        grayscaleToggleBtn.classList.toggle("is-active", enabled);
        grayscaleToggleBtn.setAttribute("aria-pressed", String(enabled));
      }
    };

    // =====================================================
    // 4. VISION ENGINE
    // =====================================================
    const THUMB_TIP = 4;
    const INDEX_TIP = 8;
    const WRIST = 0;
    const LEFT_EYE_INDICES = [33, 133, 160, 159, 158, 144, 145, 153];
    const RIGHT_EYE_INDICES = [362, 263, 387, 386, 385, 373, 374, 380];
    const LEFT_EYE_RATIO = { left: 33, right: 133, top: 159, bottom: 145 };
    const RIGHT_EYE_RATIO = { left: 362, right: 263, top: 386, bottom: 374 };

    const HandTracker = {
      landmarker: null,
      ready: false,
      lastResults: null,
      lastHands: [],
      lastDetectTime: 0,
      error: null,

      async init() {
        if (this.ready) return true;

        try {
          const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs");
          const resolver = await vision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
          );
          this.landmarker = await vision.HandLandmarker.createFromOptions(resolver, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
              delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: CONFIG.hand.numHands
          });
          this.ready = true;
          this.error = null;
          AppState.handReady = true;
          showToast("手势识别已准备好。");
          return true;
        } catch (error) {
          this.ready = false;
          this.error = error.message || "手势模型加载失败。";
          AppState.handReady = false;
          AppState.errors.push(`手势识别加载失败：${this.error}`);
          showToast("手势识别加载失败，仍可使用鼠标/触摸拖动。");
          return false;
        }
      },

      detect(video, timestamp) {
        if (!this.ready || !this.landmarker || !video || video.readyState < 2) {
          this.lastHands = [];
          return [];
        }

        try {
          this.lastResults = this.landmarker.detectForVideo(video, timestamp);
          this.lastDetectTime = timestamp;
          this.lastHands = this.normalizeResults(this.lastResults);
          return this.lastHands;
        } catch (error) {
          this.error = error.message || "手势检测失败。";
          AppState.errors.push(`手势检测失败：${this.error}`);
          this.lastHands = [];
          return [];
        }
      },

      normalizeResults(results) {
        const landmarks = results.landmarks || [];
        return landmarks.map((points, index) => {
          const handedness = results.handednesses?.[index]?.[0]?.categoryName
            || results.handedness?.[index]?.[0]?.categoryName
            || `hand-${index}`;
          return {
            idHint: handedness,
            handedness,
            landmarks: points,
            center: this.computeCenter(points)
          };
        });
      },

      computeCenter(points) {
        const wrist = points[WRIST] || points[0] || { x: 0.5, y: 0.5 };
        return mapNormalizedPointToCanvas(wrist.x, wrist.y);
      },

      getHands() {
        return this.lastHands;
      }
    };

    const FaceTracker = {
      landmarker: null,
      ready: false,
      lastResults: null,
      lastFace: null,
      lastEyeRects: [],
      lastFaceBox: null,
      lastDetectTime: 0,
      lastSeenTime: 0,
      error: null,

      async init() {
        if (this.ready) return true;

        try {
          const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs");
          const resolver = await vision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
          );
          this.landmarker = await vision.FaceLandmarker.createFromOptions(resolver, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
              delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: CONFIG.face.maxFaces
          });
          this.ready = true;
          this.error = null;
          AppState.faceReady = true;
          showToast("脸部识别已准备好。");
          return true;
        } catch (error) {
          this.ready = false;
          this.error = error.message || "脸部模型加载失败。";
          AppState.faceReady = false;
          AppState.errors.push(`脸部识别加载失败：${this.error}`);
          showToast("脸部识别加载失败，眼睛切片仍可用 mock 模式。");
          return false;
        }
      },

      detect(video, timestamp) {
        if (!this.ready || !this.landmarker || !video || video.readyState < 2) {
          AppState.detectedFaces = 0;
          return null;
        }

        try {
          this.lastResults = this.landmarker.detectForVideo(video, timestamp);
          this.lastDetectTime = timestamp;
          const face = this.getMainFace();
          if (!face) {
            AppState.detectedFaces = 0;
            if (timestamp - this.lastSeenTime > 1000) {
              AppState.blinkState = "no-face";
            }
            return null;
          }

          const videoSize = getMediaSize(video);
          this.processLandmarks(face, videoSize.width, videoSize.height, timestamp);
          return face;
        } catch (error) {
          this.error = error.message || "脸部检测失败。";
          AppState.errors.push(`脸部检测失败：${this.error}`);
          AppState.detectedFaces = 0;
          return null;
        }
      },

      getMainFace() {
        const faces = this.lastResults?.faceLandmarks || [];
        if (!faces.length) return null;
        return faces[0];
      },

      processLandmarks(landmarks, videoWidth, videoHeight, timestamp = performance.now()) {
        this.lastFace = landmarks;
        this.lastSeenTime = timestamp;
        AppState.detectedFaces = 1;

        const leftRect = this.computeEyeRect(landmarks, LEFT_EYE_INDICES, videoWidth, videoHeight, "left");
        const rightRect = this.computeEyeRect(landmarks, RIGHT_EYE_INDICES, videoWidth, videoHeight, "right");
        this.lastEyeRects = [leftRect, rightRect].filter(Boolean);
        this.lastFaceBox = this.computeFaceBox(landmarks, videoWidth, videoHeight);

        const leftRatio = BlinkDetector.computeEyeOpenRatio(landmarks, LEFT_EYE_RATIO);
        const rightRatio = BlinkDetector.computeEyeOpenRatio(landmarks, RIGHT_EYE_RATIO);
        const ratio = Math.min(leftRatio, rightRatio);
        BlinkDetector.update(ratio, timestamp);
        FaceRegionSampler.update(this.lastFaceBox, this.lastEyeRects);
        EyeSliceManager.updateEyeRects(this.lastEyeRects);
        TopEyePreview.updateFromEyeRects(this.lastEyeRects);
        FaceShardManager.updateFromFaceBox(this.lastFaceBox);
        return this.lastEyeRects;
      },

      computeFaceBox(landmarks, videoWidth, videoHeight) {
        let minX = 1;
        let minY = 1;
        let maxX = 0;
        let maxY = 0;
        landmarks.forEach((point) => {
          minX = Math.min(minX, point.x);
          minY = Math.min(minY, point.y);
          maxX = Math.max(maxX, point.x);
          maxY = Math.max(maxY, point.y);
        });
        return {
          x: minX * videoWidth,
          y: minY * videoHeight,
          w: (maxX - minX) * videoWidth,
          h: (maxY - minY) * videoHeight
        };
      },

      computeEyeRect(landmarks, indices, videoWidth, videoHeight, side) {
        const points = indices.map((index) => landmarks[index]).filter(Boolean);
        if (!points.length) return null;

        let minX = Math.min(...points.map((point) => point.x));
        let maxX = Math.max(...points.map((point) => point.x));
        let minY = Math.min(...points.map((point) => point.y));
        let maxY = Math.max(...points.map((point) => point.y));

        const width = maxX - minX;
        const height = maxY - minY;
        const padX = width * CONFIG.face.eyePaddingRatio;
        const padY = Math.max(height * CONFIG.face.eyePaddingRatio, width * 0.18);

        minX = Math.max(0, minX - padX);
        maxX = Math.min(1, maxX + padX);
        minY = Math.max(0, minY - padY);
        maxY = Math.min(1, maxY + padY);

        return {
          x: minX * videoWidth,
          y: minY * videoHeight,
          w: Math.max(1, (maxX - minX) * videoWidth),
          h: Math.max(1, (maxY - minY) * videoHeight),
          side
        };
      },

      getEyeRects() {
        return this.lastEyeRects;
      },

      getBlinkState() {
        return {
          state: AppState.blinkState,
          ratio: AppState.eyeOpenRatio,
          lastBlinkTime: AppState.lastBlinkTime
        };
      }
    };


    const FaceRegionSampler = {
      regions: [],

      update(faceRect, eyeRects = []) {
        if (!faceRect) return;
        const candidates = [];
        eyeRects.forEach((rect) => {
          candidates.push({ ...rect, kind: rect.side === "left" ? "left-eye" : "right-eye", weight: 1.0 });
        });
        const specs = [
          { kind: "brow", x: 0.34, y: 0.20, w: 0.34, h: 0.16 },
          { kind: "nose", x: 0.50, y: 0.46, w: 0.22, h: 0.24 },
          { kind: "mouth", x: 0.50, y: 0.72, w: 0.34, h: 0.18 },
          { kind: "left-cheek", x: 0.28, y: 0.54, w: 0.26, h: 0.24 },
          { kind: "right-cheek", x: 0.70, y: 0.54, w: 0.26, h: 0.24 },
          { kind: "forehead", x: 0.50, y: 0.10, w: 0.34, h: 0.18 },
          { kind: "jaw", x: 0.50, y: 0.86, w: 0.30, h: 0.18 }
        ];
        specs.forEach((spec) => candidates.push(this.rectFromSpec(faceRect, spec)));
        this.regions = candidates.filter(Boolean);
      },

      rectFromSpec(faceRect, spec) {
        const w = Math.max(4, faceRect.w * spec.w);
        const h = Math.max(4, faceRect.h * spec.h);
        return {
          x: Math.max(0, faceRect.x + faceRect.w * spec.x - w * 0.5),
          y: Math.max(0, faceRect.y + faceRect.h * spec.y - h * 0.5),
          w,
          h,
          side: spec.kind,
          kind: spec.kind,
          weight: 0.8
        };
      },

      getRegion(index, fallbackRects = []) {
        const pool = this.regions.length ? this.regions : fallbackRects;
        if (!pool || !pool.length) return null;
        return pool[index % pool.length];
      }
    };

    const BlinkDetector = {
      lastBlinkTime: 0,
      wasClosed: false,

      update(ratio, now) {
        AppState.eyeOpenRatio = ratio;

        if (ratio < CONFIG.face.blinkThreshold && !this.wasClosed) {
          this.wasClosed = true;
          AppState.blinkState = "closed";
          return false;
        }

        if (ratio >= CONFIG.face.blinkThreshold && this.wasClosed) {
          this.wasClosed = false;
          AppState.blinkState = "open";
          if (now - this.lastBlinkTime > CONFIG.face.blinkCooldownMs) {
            this.lastBlinkTime = now;
            AppState.lastBlinkTime = now;
            EyeSliceManager.triggerBlinkEffect();
            FaceShardManager.reflowStableLayout("blink");
            MysticEffectManager.blink(now);
            TarotCardManager.registerBlink(now);
            return true;
          }
        } else if (ratio >= CONFIG.face.blinkThreshold) {
          AppState.blinkState = "open";
        }

        return false;
      },

      computeEyeOpenRatio(landmarks, indices) {
        const left = landmarks[indices.left];
        const right = landmarks[indices.right];
        const top = landmarks[indices.top];
        const bottom = landmarks[indices.bottom];
        if (!left || !right || !top || !bottom) return 1;

        const horizontal = Math.hypot(left.x - right.x, left.y - right.y);
        const vertical = Math.hypot(top.x - bottom.x, top.y - bottom.y);
        if (!horizontal) return 1;
        return vertical / horizontal;
      },

      shouldTriggerBlink(ratio, now) {
        return ratio >= CONFIG.face.blinkThreshold
          && this.wasClosed
          && now - this.lastBlinkTime > CONFIG.face.blinkCooldownMs;
      }
    };

    const VisionEngine = {
      ready: false,
      handEnabled: false,
      faceEnabled: false,

      async init(options = {}) {
        this.handEnabled = Boolean(options.hand);
        this.faceEnabled = Boolean(options.face);
        if (this.handEnabled) {
          await HandTracker.init();
        }
        if (this.faceEnabled) {
          await FaceTracker.init();
        }
        this.ready = true;
        return true;
      },

      update(timestamp) {
        if (!AppState.cameraReady || !SourceManager.videoEl) {
          AppState.detectedHands = 0;
          AppState.detectedFaces = 0;
          PinchStateMachine.update([], timestamp);
          return;
        }

        if (this.handEnabled && PerformanceManager.shouldDetectHand(AppState.frameCount)) {
          const hands = HandTracker.detect(SourceManager.videoEl, timestamp);
          AppState.detectedHands = hands.length;
          PinchStateMachine.update(hands, timestamp);
          HandPoseDetector.update(hands, timestamp);
        }

        if (this.faceEnabled && PerformanceManager.shouldDetectFace(AppState.frameCount)) {
          FaceTracker.detect(SourceManager.videoEl, timestamp);
        }
      }
    };

    const PerformanceManager = {
      mode: "auto",
      effectiveMode: "high",
      lowSince: null,
      highSince: null,

      setMode(nextMode) {
        this.mode = nextMode;
        this.effectiveMode = nextMode === "low" ? "low" : "high";
        AppState.performanceMode = nextMode === "auto" ? `auto/${this.effectiveMode}` : nextMode;
        this.lowSince = null;
        this.highSince = null;
        performanceModeBtn.textContent = `性能 ${this.getLabel()}`;
        performanceModeBtn.classList.toggle("is-active", this.effectiveMode === "low");
      },

      cycleMode() {
        const nextMode = this.mode === "auto"
          ? "high"
          : this.mode === "high"
            ? "low"
            : "auto";
        this.setMode(nextMode);
        showToast(`性能模式：${this.getLabel()}`);
      },

      getLabel() {
        if (this.mode === "high") return "高";
        if (this.mode === "low") return "低";
        return "自动";
      },

      updateFPS(fps, now) {
        if (!fps) return;
        if (this.mode === "high") {
          this.effectiveMode = "high";
          AppState.performanceMode = "high";
          return;
        }
        if (this.mode === "low") {
          this.effectiveMode = "low";
          AppState.performanceMode = "low";
          return;
        }

        if (fps < CONFIG.performance.lowFpsThreshold) {
          this.lowSince = this.lowSince || now;
          this.highSince = null;
          if (now - this.lowSince > CONFIG.performance.lowFpsMs) {
            this.effectiveMode = "low";
            AppState.performanceMode = "auto/low";
            performanceModeBtn.classList.add("is-active");
            showToast("已自动切换低性能模式，优先保持流畅。");
          }
        } else if (fps > CONFIG.performance.highFpsThreshold) {
          this.highSince = this.highSince || now;
          this.lowSince = null;
          if (now - this.highSince > CONFIG.performance.highFpsMs && this.effectiveMode === "low") {
            this.effectiveMode = "high";
            AppState.performanceMode = "auto/high";
            performanceModeBtn.classList.remove("is-active");
          }
        } else {
          this.lowSince = null;
          this.highSince = null;
        }
      },

      shouldDetectHand(frameCount) {
        const interval = this.effectiveMode === "low" ? 3 : CONFIG.performance.handDetectEveryNFrames;
        return frameCount % interval === 0;
      },

      shouldDetectFace(frameCount) {
        const interval = this.effectiveMode === "low" ? 8 : CONFIG.performance.faceDetectEveryNFrames;
        return frameCount % interval === 0;
      },

      getMaxParticles() {
        return this.effectiveMode === "low"
          ? CONFIG.performance.lowModeParticles
          : CONFIG.performance.maxParticles;
      }
    };

    // =====================================================
    // 5. INTERACTION ENGINE
    // =====================================================
    let toastTimer = null;

    function setPhase(nextPhase) {
      AppState.phase = nextPhase;
    }

    function setExperiencePhase(nextPhase) {
      AppState.experiencePhase = nextPhase;
      if (nextPhase === "revealed") AppState.archiveGenerated = true;
      if (nextPhase === "foolEnding") AppState.gameEnded = true;
      TriggerHintPanel.updateForPhase(nextPhase);
      TriggerHintPanel.setVisible(TriggerHintPanel.visible);
    }

    function setUiHidden(hidden) {
      AppState.uiHidden = hidden;
      document.body.classList.toggle("ui-hidden", hidden);
      toggleUiBtn.textContent = hidden ? "显示界面" : "隐藏界面";
      toggleUiBtn.setAttribute("aria-pressed", String(hidden));
    }

    function setDebugEnabled(enabled) {
      AppState.debug = enabled;
      DebugPanelController.visible = enabled;
      toggleDebugBtn.textContent = enabled ? "关闭调试" : "开启调试";
      toggleDebugBtn.setAttribute("aria-pressed", String(enabled));
      debugPanel.hidden = !enabled;

        debugPanelText.textContent = "";
      }
    }

    function setRecordingMode(enabled) {

      recordModeBtn.classList.toggle("is-active", enabled);
      recordModeBtn.setAttribute("aria-pressed", String(enabled));
      if (enabled) {
        guidePanel.classList.add("hidden");

        TriggerHintPanel.setVisible(TriggerHintPanel.visible);

    }

    function showGuide() {
      AppState.guideVisible = true;
      guidePanel.classList.remove("hidden");
      window.setTimeout(() => {
        guidePanel.classList.add("hidden");
        AppState.guideVisible = false;
      }, 8500);
    }

    function resetVisualElements() {
      AppState.gameEnded = false;
      setExperiencePhase("curtain");
      AppState.blinkComboCount = 0;
      AppState.screenFlash = 0;
      restartBtn.classList.remove("visible");
      EyeSliceManager.createMockSlices();
      FaceShardManager.reset();
      TarotCardManager.reset();
      CardRevealController.reset();
      CurtainRevealManager.reset();
      RippleManager.reset();
      ParticleManager.clear();
      MysticEffectManager.clear();
      showToast("视觉元素已重置。");
    }

    function showToast(message) {
      if (AppState.recordingMode) return;
      toast.textContent = message;
      toast.classList.add("visible");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("visible");
      }, 2600);
    }

    function mapNormalizedPointToCanvas(x, y) {
      return {
        x: AppState.mirrored ? (1 - x) * AppState.canvasWidth : x * AppState.canvasWidth,
        y: y * AppState.canvasHeight
      };
    }

    function onPinchDown(x, y) {
      if (AppState.gameEnded) return false;
      AppState.lastPinchEvent = "PINCH_DOWN";
      RippleManager.emit(x, y, 1, AppState.experiencePhase === "curtain" ? "curtain" : "shardRitual");
      if (AppState.experiencePhase === "curtain") {
        AppState.grabbedTarget = "curtain";
        return CurtainRevealManager.grabAt(x, y);
      }
      MysticEffectManager.pinchDown(x, y);
      if (FaceShardManager.grabAt(x, y)) {
        AppState.grabbedTarget = "face";
        return true;
      }
      if (EyeSliceManager.grabAt(x, y)) {
        AppState.grabbedTarget = "eye";
        return true;
      }
      AppState.grabbedTarget = null;
      return false;
    }

    function onPinchDrag(x, y) {
      AppState.lastPinchEvent = "PINCH_DRAG";
      RippleManager.emit(x, y, 0.8, AppState.experiencePhase === "curtain" ? "curtain" : "shardRitual");
      if (AppState.grabbedTarget === "curtain") {
        return CurtainRevealManager.dragTo(x, y);
      }
      MysticEffectManager.pinchDrag(x, y);
      if (AppState.grabbedTarget === "face") {
        return FaceShardManager.dragTo(x, y);
      }
      return EyeSliceManager.dragTo(x, y);
    }

    function onPinchUp(vx, vy) {
      AppState.lastPinchEvent = "PINCH_UP";
      if (AppState.grabbedTarget === "curtain") {
        const releasedCurtain = CurtainRevealManager.release(vx, vy);
        AppState.grabbedTarget = null;
        return releasedCurtain;
      }
      MysticEffectManager.pinchUp(vx, vy);
      let released = false;
      if (AppState.grabbedTarget === "face") {
        released = FaceShardManager.release(vx, vy);
      } else {
        released = EyeSliceManager.release(vx, vy);
      }
      CardRevealController.resetHover();
      AppState.grabbedTarget = null;
      return released;
    }

    const HandPoseDetector = {
      lastPose: "none",
      lastTriggerTime: 0,
      cooldownMs: 900,

      update(hands, timestamp = performance.now()) {
        if (!hands.length) {
          AppState.lastHandPose = "none";
          return;
        }

        const pose = this.classify(hands[0].landmarks);
        AppState.lastHandPose = pose;
        if (pose === this.lastPose || timestamp - this.lastTriggerTime < this.cooldownMs) return;

        if (pose === "open") {
          OpenPalmDetector.trigger(timestamp);
          this.lastTriggerTime = timestamp;
        } else if (pose === "fist") {
          FaceShardManager.triggerFreeze();
          this.lastTriggerTime = timestamp;
        }
        this.lastPose = pose;
      },

      classify(points) {
        const wrist = points[0];
        const indexBase = points[5];
        if (!wrist || !indexBase) return "unknown";

        const palmSize = Math.max(0.001, Math.hypot(indexBase.x - wrist.x, indexBase.y - wrist.y));
        const tips = [8, 12, 16, 20].map((index) => points[index]).filter(Boolean);
        if (tips.length < 4) return "unknown";

        const openness = tips.reduce((sum, point) => {
          return sum + Math.hypot(point.x - wrist.x, point.y - wrist.y) / palmSize;
        }, 0) / tips.length;

        if (openness > 1.45) return "open";
        if (openness < 0.95) return "fist";
        return "neutral";
      }
    };

    const OpenPalmDetector = {
      trigger(timestamp = performance.now()) {
        if (AppState.experiencePhase !== "shardRitual") return false;
        if (timestamp - AppState.lastOpenPalmTime < CONFIG.tarotDeck.switchCooldownMs) return false;
        AppState.lastOpenPalmTime = timestamp;
        FaceShardManager.triggerScatter(0.45);
        MysticEffectManager.openPalm(timestamp);
        TarotCardManager.nextCard(timestamp);
        return true;
      }
    };

    const PinchStateMachine = {
      hands: new Map(),
      lostHands: new Map(),

      update(handResults, timestamp = performance.now()) {
        const activeIds = new Set();
        const hands = handResults.map((hand) => this.resolveHand(hand));

        hands.forEach((hand) => {
          activeIds.add(hand.id);
          const previous = this.hands.get(hand.id) || {
            id: hand.id,
            isPinching: false,
            lastX: hand.center.x,
            lastY: hand.center.y,
            vx: 0,
            vy: 0,
            lastTime: timestamp
          };

          const pinch = this.computePinch(hand);
          const dt = Math.max(16, timestamp - previous.lastTime);
          const vx = ((pinch.canvasX - previous.lastX) / dt) * 16.67;
          const vy = ((pinch.canvasY - previous.lastY) / dt) * 16.67;
          const state = {
            ...previous,
            handedness: hand.handedness,
            landmarks: hand.landmarks,
            pinchDistance: pinch.distance,
            pinchX: pinch.canvasX,
            pinchY: pinch.canvasY,
            vx,
            vy,
            lastX: pinch.canvasX,
            lastY: pinch.canvasY,
            lastTime: timestamp,
            lastSeen: timestamp
          };

          if (!state.isPinching && pinch.distance < CONFIG.hand.pinchDownThreshold) {
            state.isPinching = true;
            this.emitPinchEvents("PINCH_DOWN", state);
          } else if (state.isPinching && pinch.distance > CONFIG.hand.pinchUpThreshold) {
            state.isPinching = false;
            this.emitPinchEvents("PINCH_UP", state);
          } else if (state.isPinching) {
            this.emitPinchEvents("PINCH_DRAG", state);
          }

          this.hands.set(hand.id, state);
          this.lostHands.delete(hand.id);
        });

        for (const [id, state] of this.hands.entries()) {
          if (activeIds.has(id)) continue;
          if (!this.lostHands.has(id)) {
            this.lostHands.set(id, timestamp);
          }
          if (timestamp - this.lostHands.get(id) > CONFIG.hand.keepLostHandMs) {
            if (state.isPinching) {
              state.isPinching = false;
              this.emitPinchEvents("PINCH_UP", state);
            }
            this.hands.delete(id);
            this.lostHands.delete(id);
          }
        }

        AppState.activePinches = Array.from(this.hands.values()).filter((hand) => hand.isPinching).length;
      },

      resolveHand(hand) {
        const center = hand.center || this.computeCenter(hand.landmarks);
        const handedness = hand.handedness || hand.idHint || "hand";
        let id = handedness;

        if (!this.hands.has(id)) {
          let bestId = null;
          let bestDistance = CONFIG.hand.handMatchRadius;
          for (const [candidateId, state] of this.hands.entries()) {
            const distance = Math.hypot(center.x - state.lastX, center.y - state.lastY);
            if (distance < bestDistance) {
              bestDistance = distance;
              bestId = candidateId;
            }
          }
          if (bestId && !hand.idHint) {
            id = bestId;
          }
        }

        return { ...hand, id, center, handedness };
      },

      computeCenter(points) {
        const wrist = points[WRIST] || points[0] || { x: 0.5, y: 0.5 };
        return mapNormalizedPointToCanvas(wrist.x, wrist.y);
      },

      computePinch(hand) {
        const thumb = hand.landmarks[THUMB_TIP];
        const index = hand.landmarks[INDEX_TIP];
        const dx = thumb.x - index.x;
        const dy = thumb.y - index.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const centerX = (thumb.x + index.x) / 2;
        const centerY = (thumb.y + index.y) / 2;
        const mapped = mapNormalizedPointToCanvas(centerX, centerY);
        return {
          distance,
          canvasX: mapped.x,
          canvasY: mapped.y
        };
      },

      emitPinchEvents(type, handState) {
        if (type === "PINCH_DOWN") {
          onPinchDown(handState.pinchX, handState.pinchY);
        } else if (type === "PINCH_DRAG") {
          onPinchDrag(handState.pinchX, handState.pinchY);
        } else if (type === "PINCH_UP") {
          onPinchUp(handState.vx, handState.vy);
        }
      },

      reset() {
        this.hands.clear();
        this.lostHands.clear();
        AppState.activePinches = 0;
      }
    };

    // =====================================================
    // 6. VISUAL ELEMENT ENGINE
    // =====================================================
    function drawStageZeroVisual(now) {
      const width = AppState.canvasWidth;
      const height = AppState.canvasHeight;
      const centerX = width * 0.5;
      const centerY = height * 0.5;
      const pulse = Math.sin(now * 0.0018) * 0.5 + 0.5;
      const ringRadius = Math.min(width, height) * (0.16 + pulse * 0.015);

      ctx.save();
      ctx.translate(centerX, centerY);

      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = "rgba(125, 249, 255, 0.42)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 0, ringRadius * 1.55, ringRadius * 0.52, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255, 79, 216, 0.34)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, 0, ringRadius * 0.92, ringRadius * 0.28, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "rgba(255, 255, 255, 0.76)";
      ctx.beginPath();
      ctx.arc(0, 0, 4 + pulse * 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.65)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 12; i += 1) {
        const y = ((now * 0.018) + i * 46) % (height + 60) - 30;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y + Math.sin(i + now * 0.001) * 10);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawHandDebug(targetCtx) {
      if (!AppState.debug || !PinchStateMachine.hands.size) return;

      targetCtx.save();
      for (const hand of PinchStateMachine.hands.values()) {
        const isPinching = hand.isPinching;
        targetCtx.fillStyle = isPinching ? "rgba(255, 79, 216, 0.92)" : "rgba(125, 249, 255, 0.88)";
        targetCtx.strokeStyle = isPinching ? "rgba(255, 79, 216, 0.65)" : "rgba(125, 249, 255, 0.5)";
        targetCtx.lineWidth = 2;

        hand.landmarks.forEach((point, index) => {
          const mapped = mapNormalizedPointToCanvas(point.x, point.y);
          const radius = index === THUMB_TIP || index === INDEX_TIP ? 5 : 2.5;
          targetCtx.beginPath();
          targetCtx.arc(mapped.x, mapped.y, radius, 0, Math.PI * 2);
          targetCtx.fill();
        });

        targetCtx.beginPath();
        targetCtx.arc(hand.pinchX, hand.pinchY, CONFIG.hand.grabRadius * 0.15, 0, Math.PI * 2);
        targetCtx.stroke();
      }
      targetCtx.restore();
    }

    function mapVideoRectToCanvas(rect) {
      const videoSize = SourceManager.videoEl ? getMediaSize(SourceManager.videoEl) : null;
      if (!videoSize) return null;

      const scaleX = AppState.canvasWidth / videoSize.width;
      const scaleY = AppState.canvasHeight / videoSize.height;
      const x = AppState.mirrored
        ? AppState.canvasWidth - (rect.x + rect.w) * scaleX
        : rect.x * scaleX;
      return {
        x,
        y: rect.y * scaleY,
        w: rect.w * scaleX,
        h: rect.h * scaleY
      };
    }

    function drawFaceDebug(targetCtx) {
      if (!AppState.debug) return;
      const eyeRects = FaceTracker.getEyeRects();
      if (!eyeRects.length && !FaceTracker.lastFaceBox) return;

      targetCtx.save();
      targetCtx.lineWidth = 2;
      if (FaceTracker.lastFaceBox) {
        const box = mapVideoRectToCanvas(FaceTracker.lastFaceBox);
        if (box) {
          targetCtx.strokeStyle = "rgba(255, 255, 255, 0.35)";
          targetCtx.strokeRect(box.x, box.y, box.w, box.h);
        }
      }
      eyeRects.forEach((rect) => {
        const mapped = mapVideoRectToCanvas(rect);
        if (!mapped) return;
        targetCtx.strokeStyle = rect.side === "left"
          ? "rgba(125, 249, 255, 0.9)"
          : "rgba(255, 79, 216, 0.9)";
        targetCtx.strokeRect(mapped.x, mapped.y, mapped.w, mapped.h);
      });
      targetCtx.restore();
    }

    const TopEyePreview = {
      lastRect: null,
      sourceRect: null,

      updateFromEyeRects(eyeRects) {
        if (!eyeRects || !eyeRects.length) return;
        const preferred = eyeRects.find((rect) => rect.side === "left") || eyeRects[0];
        const padX = preferred.w * 0.18;
        const padY = preferred.h * 0.55;
        this.lastRect = {
          x: Math.max(0, preferred.x - padX),
          y: Math.max(0, preferred.y - padY),
          w: preferred.w + padX * 2,
          h: preferred.h + padY * 2,
          side: preferred.side
        };
        this.sourceRect = this.lastRect;
      },

      draw(targetCtx) {
        if (!CONFIG.topEyePreview.enabled) return;
        const width = Math.max(
          CONFIG.topEyePreview.minWidth,
          Math.min(CONFIG.topEyePreview.maxWidth, AppState.canvasWidth * CONFIG.topEyePreview.widthRatio)
        );
        const height = width / CONFIG.topEyePreview.aspectRatio;
        const x = (AppState.canvasWidth - width) * 0.5;
        const y = CONFIG.topEyePreview.top + Math.max(0, window.visualViewport?.offsetTop || 0);
        const sourceMedia = SourceManager.videoEl
          ? CameraStylePipeline.getClearSource(SourceManager.videoEl)
          : null;

        drawObservatoryFrame(targetCtx, x, y, width, height, () => {
          if (sourceMedia && this.lastRect) {
            try {
              targetCtx.drawImage(sourceMedia, this.lastRect.x, this.lastRect.y, this.lastRect.w, this.lastRect.h, x + 10, y + 8, width - 20, height - 16);
            } catch (error) {
              this.drawPlaceholder(targetCtx, x + 10, y + 8, width - 20, height - 16);
            }
          } else {
            this.drawPlaceholder(targetCtx, x + 10, y + 8, width - 20, height - 16);
          }
        });
      },

      drawPlaceholder(targetCtx, x, y, width, height) {
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.08)";
        targetCtx.fillRect(x, y, width, height);
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.55)";
        targetCtx.font = "12px sans-serif";
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.fillText("EYE SIGNAL", x + width * 0.5, y + height * 0.5);
      }
    };

    const TarotCardManager = {
      cards: [
        { id: "justice", zh: "正义", en: "JUSTICE", imageSrc: "assets/justice_character.png", fallbackColors: ["#194f7a", "#f0f3ff"], mark: "XI" },
        { id: "hanged", zh: "倒吊人", en: "THE HANGED MAN", imageSrc: "assets/thehangedman_character.png", fallbackColors: ["#30323f", "#d95f50"], mark: "XII" },
        { id: "sun", zh: "太阳", en: "THE SUN", imageSrc: "assets/sun_character.png", fallbackColors: ["#f6b13d", "#fff0a8"], mark: "XIX" },
        { id: "magician", zh: "魔术师", en: "THE MAGICIAN", imageSrc: "assets/themagician_character.png", fallbackColors: ["#7c2438", "#f4d3a1"], mark: "I" },
        { id: "hermit", zh: "隐者", en: "THE HERMIT", imageSrc: "assets/thehermit_character.png", fallbackColors: ["#1f5a54", "#d6f0d8"], mark: "IX" },
        { id: "star", zh: "星星", en: "THE STAR", imageSrc: "assets/star__character.png", fallbackColors: ["#173a8a", "#9fd4ff"], mark: "XVII" },
        { id: "moon", zh: "月亮", en: "THE MOON", imageSrc: "assets/moon_character.png", fallbackColors: ["#32205f", "#d9c6ff"], mark: "XVIII" }
      ],
      foolCard: { id: "fool", zh: "愚者", en: "THE FOOL", imageSrc: "assets/thefool_character.png", fallbackColors: ["#5b3fd6", "#f6d36c"], mark: "0" },
      backImageSrc: "assets/card_back.png",
      assetImages: new Map(),
      assetLoadPromise: null,
      assetsReady: false,
      assetsFailed: false,
      cardState: "faceDown", // faceDown | revealing | revealed | summoned
      lastComboBlinkTime: 0,
      lastSwitchTime: 0,
      summonStartedAt: 0,
      revealStartedAt: 0,

      reset() {
        this.lastComboBlinkTime = 0;
        this.summonStartedAt = 0;
        this.revealStartedAt = 0;
        this.cardState = "faceDown";
        AppState.cardState = this.cardState;
        RitualState.hoverStartAt = 0;
        RitualState.selectedShardId = null;
        RitualState.revealStartedAt = 0;
        AppState.hasRevealedArchive = false;
        AppState.selectedRegionType = "unknown";
        AppState.archiveReading = false;
        AppState.archiveGenerated = false;
        ArchiveVerdictManager.reset();
        FoolEasterEgg.reset();
        this.setCurrent(CONFIG.tarotDeck.currentIndex || 0);
      },

      preloadTarotAssets() {
        if (this.assetLoadPromise) return this.assetLoadPromise;
        const sources = [this.backImageSrc, this.foolCard.imageSrc, ...this.cards.map((card) => card.imageSrc)];
        this.assetLoadPromise = Promise.all(sources.map((src) => new Promise((resolve) => {
          const image = new Image();
          image.onload = () => {
            this.assetImages.set(src, image);
            resolve({ src, ok: true });
          };
          image.onerror = () => {
            const message = `塔罗资产加载失败：${src}`;
            AppState.errors.push(message);
            resolve({ src, ok: false });
          };
          image.src = src;
        }))).then((results) => {
          this.assetsFailed = results.some((result) => !result.ok);
          this.assetsReady = !this.assetsFailed;
          AppState.tarotAssetsReady = this.assetsReady;
          AppState.tarotAssetsFailed = this.assetsFailed;
          if (this.assetsFailed) {
            showToast("塔罗图片加载不完整，已回退到程序化卡牌。");
          }
          return this.assetsReady;
        }).catch((error) => {
          this.assetsFailed = true;
          this.assetsReady = false;
          AppState.tarotAssetsReady = false;
          AppState.tarotAssetsFailed = true;
          AppState.errors.push(`塔罗资产预加载中断：${error.message || "未知错误"}`);
          return false;
        });
        return this.assetLoadPromise;
      },

      setCurrent(index, options = {}) {
        const nextIndex = ((index % this.cards.length) + this.cards.length) % this.cards.length;
        CONFIG.tarotDeck.currentIndex = nextIndex;
        AppState.currentCardIndex = nextIndex;
        AppState.currentCardId = this.cards[nextIndex].id;
        RitualState.targetCardId = AppState.currentCardId;
        if (!options.keepState) {
          this.cardState = "faceDown";
          this.revealStartedAt = 0;
          AppState.cardState = this.cardState;
          AppState.hasRevealedArchive = false;
          AppState.archiveGenerated = false;
          RitualState.revealStartedAt = 0;
        }
      },

      nextCard(timestamp = performance.now()) {
        if (!CONFIG.tarotDeck.enabled || AppState.gameEnded) return;
        if (this.cardState === "revealing") return;
        if (timestamp - this.lastSwitchTime < CONFIG.tarotDeck.switchCooldownMs) return;
        this.lastSwitchTime = timestamp;
        this.setCurrent(AppState.currentCardIndex + 1);
        CardRevealController.reset();
        ArchiveVerdictManager.reset();
        FoolEasterEgg.reset();
        showToast(`待揭示牌：${this.cards[AppState.currentCardIndex].zh}`);
      },

      registerBlink(timestamp = performance.now()) {
        return FoolEasterEgg.registerBlink(timestamp);
      },

      summonFool(timestamp = performance.now()) {
        this.cardState = "summoned";
        AppState.cardState = this.cardState;
        AppState.currentCardId = this.foolCard.id;
        AppState.gameEnded = true;
        setExperiencePhase("foolEnding");
        AppState.blinkComboCount = CONFIG.blinkCombo.requiredCount;
        this.summonStartedAt = timestamp;
        ArchiveVerdictManager.setResult(this.foolCard, AppState.selectedRegionType || "unknown");
        FaceShardManager.triggerFreeze();
        MysticEffectManager.tripleBlink(timestamp);
        restartBtn.classList.add("visible");
        ParticleManager.emit(AppState.canvasWidth * 0.5, AppState.canvasHeight * 0.5, 42, "face");
        showToast("异常档案：愚者已注视你。");
      },

      startReveal(timestamp = performance.now(), shard = null) {
        if (AppState.gameEnded || this.cardState !== "faceDown") return false;
        const regionType = shard?.regionType || "unknown";
        this.selectCardForRegion(regionType);
        AppState.selectedRegionType = regionType;
        this.cardState = "revealing";
        this.revealStartedAt = timestamp;
        AppState.cardState = this.cardState;
        AppState.archiveReading = false;
        RitualState.revealStartedAt = timestamp;
        MysticEffectManager.openPalm(timestamp);
        ParticleManager.emit(AppState.canvasWidth * 0.115, AppState.canvasHeight * 0.56, 24, "face");
        showToast(`档案正在读取：${this.cards[AppState.currentCardIndex].zh}`);
        return true;
      },

      selectCardForRegion(regionType) {
        const preference = {
          eye: ["moon", "star", "hermit"],
          mouth: ["magician", "sun"],
          forehead: ["justice", "hanged"],
          brow: ["justice", "hermit"],
          nose: ["moon", "hermit"],
          jaw: ["hanged", "justice"],
          cheek: ["star", "sun"]
        };
        const candidates = preference[regionType] || [];
        if (!candidates.length) return;
        const offset = AppState.currentCardIndex % candidates.length;
        const targetId = candidates[offset];
        const nextIndex = this.cards.findIndex((card) => card.id === targetId);
        if (nextIndex >= 0) this.setCurrent(nextIndex, { keepState: true });
      },

      update(timestamp = performance.now()) {
        if (this.cardState !== "revealing") return;
        if (timestamp - this.revealStartedAt >= CONFIG.tarotDeck.revealDurationMs) {
          this.cardState = "revealed";
          AppState.cardState = this.cardState;
          AppState.hasRevealedArchive = true;
          AppState.archiveGenerated = true;
          ArchiveVerdictManager.registerOrdinaryReveal(this.cards[AppState.currentCardIndex], AppState.selectedRegionType);
          FoolEasterEgg.enabled = true;
          FoolEasterEgg.canUseFallback = true;
          setExperiencePhase("revealed");
          CardRevealController.reset();
          showToast("身份档案已生成。");
        }
      },

      getRevealProgress(timestamp = performance.now()) {
        if (this.cardState === "revealed" || this.cardState === "summoned") return 1;
        if (this.cardState !== "revealing") return 0;
        return easeOutCubic((timestamp - this.revealStartedAt) / CONFIG.tarotDeck.revealDurationMs);
      },

      getLayout() {
        const cardRatio = 1920 / 1088;
        const mobile = AppState.canvasWidth < 600;
        const baseW = AppState.gameEnded
          ? Math.min(310, AppState.canvasWidth * 0.42, AppState.canvasHeight * 0.34)
          : mobile
            ? Math.min(CONFIG.tarotDeck.maxNormalCardWidth, Math.max(112, AppState.canvasWidth * CONFIG.tarotDeck.normalCardWidthRatioMobile))
            : Math.min(CONFIG.tarotDeck.maxNormalCardWidth, Math.max(132, AppState.canvasWidth * CONFIG.tarotDeck.normalCardWidthRatioDesktop));
        const w = baseW;
        const h = w * cardRatio;
        const x = AppState.gameEnded
          ? AppState.canvasWidth * 0.5
          : mobile
            ? Math.max(30 + w * 0.5, AppState.canvasWidth * 0.22)
            : Math.max(42 + w * 0.5, AppState.canvasWidth * 0.115);
        const y = AppState.gameEnded
          ? AppState.canvasHeight * 0.52
          : mobile
            ? AppState.canvasHeight * 0.44
            : AppState.canvasHeight * 0.56;
        return { x, y, w, h, rect: { x: x - w / 2, y: y - h / 2, w, h } };
      },

      draw(targetCtx, timestamp) {
        if (!CONFIG.tarotDeck.enabled) return;
        const card = this.getCurrentCard();
        const layout = this.getLayout();
        const w = layout.w;
        const h = layout.h;
        const pulse = AppState.gameEnded ? Math.sin(timestamp * 0.006) * 0.025 + 1.08 : 1;
        CardRevealController.slotRect = layout.rect;
        drawSummoningSlot(targetCtx, layout.x, layout.y, w, h, timestamp, AppState.gameEnded);
        this.drawCard(targetCtx, card, layout.x, layout.y, w * pulse, h * pulse, timestamp);
      },

      getCurrentCard() {
        if (this.cardState === "summoned" || AppState.currentCardId === this.foolCard.id) return this.foolCard;
