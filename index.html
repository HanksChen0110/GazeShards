        return this.cards[AppState.currentCardIndex] || this.cards[0];
      },

      drawCard(targetCtx, card, x, y, w, h, timestamp) {
        const state = AppState.gameEnded ? "summoned" : this.cardState;
        const summoned = state === "summoned";
        const colors = card.fallbackColors || ["#5b3fd6", "#f6d36c"];
        targetCtx.save();
        targetCtx.translate(x, y);
        const revealProgress = this.getRevealProgress(timestamp);
        const breathe = state === "faceDown" ? 1 + Math.sin(timestamp * 0.0024) * 0.012 : 1;
        targetCtx.scale(breathe, breathe);
        targetCtx.shadowColor = summoned ? "rgba(229, 192, 111, 0.72)" : `${colors[0]}aa`;
        targetCtx.shadowBlur = summoned ? 42 : state === "faceDown" ? 28 : 20;
        targetCtx.fillStyle = "#111";
        targetCtx.fillRect(-w / 2, -h / 2, w, h);

        if (state === "faceDown") {
          this.drawBack(targetCtx, w, h, timestamp);
        } else if (state === "revealing") {
          this.drawBack(targetCtx, w, h, timestamp);
          targetCtx.save();
          targetCtx.beginPath();
          targetCtx.rect(-w / 2, -h / 2, w, h * revealProgress);
          targetCtx.clip();
          this.drawFront(targetCtx, card, w, h, summoned);
          targetCtx.restore();

          const curtainY = -h / 2 + h * revealProgress;
          targetCtx.shadowColor = "rgba(255, 255, 255, 0.78)";
          targetCtx.shadowBlur = 18;
          targetCtx.strokeStyle = "rgba(255, 255, 255, 0.84)";
          targetCtx.lineWidth = 2;
          targetCtx.beginPath();
          targetCtx.moveTo(-w / 2 + 8, curtainY);
          targetCtx.lineTo(w / 2 - 8, curtainY);
          targetCtx.stroke();
        } else {
          this.drawFront(targetCtx, card, w, h, summoned);
        }

        targetCtx.shadowColor = "transparent";
        targetCtx.strokeStyle = summoned ? "rgba(255, 236, 190, 0.96)" : "rgba(255, 236, 190, 0.78)";
        targetCtx.lineWidth = summoned ? 3 : 2;
        targetCtx.strokeRect(-w / 2 + 7, -h / 2 + 7, w - 14, h - 14);
        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.28)";
        targetCtx.strokeRect(-w / 2 + 17, -h / 2 + 17, w - 34, h - 34);

        if (state === "revealed") {
          targetCtx.globalAlpha = 0.16;
          targetCtx.fillStyle = "#fff";
          targetCtx.fillRect(-w / 2, -h / 2, w, h);
        }
        targetCtx.restore();
      },

      drawBack(targetCtx, w, h, timestamp) {
        const image = this.assetsReady ? this.assetImages.get(this.backImageSrc) : null;
        if (image) {
          drawImageContain(targetCtx, image, -w / 2 + 4, -h / 2 + 4, w - 8, h - 8);
          return;
        }
        const gradient = targetCtx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
        gradient.addColorStop(0, "#101820");
        gradient.addColorStop(0.52, "#03070c");
        gradient.addColorStop(1, "#2b213b");
        targetCtx.fillStyle = gradient;
        targetCtx.fillRect(-w / 2 + 5, -h / 2 + 5, w - 10, h - 10);
        targetCtx.strokeStyle = "rgba(229, 192, 111, 0.52)";
        targetCtx.lineWidth = 1;
        for (let i = 0; i < 5; i += 1) {
          const inset = 18 + i * 10;
          targetCtx.strokeRect(-w / 2 + inset, -h / 2 + inset, w - inset * 2, h - inset * 2);
        }
        targetCtx.fillStyle = "rgba(255, 245, 214, 0.82)";
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.font = `${Math.max(12, w * 0.09)}px Georgia, serif`;
        targetCtx.fillText("GAZESHARDS", 0, h * 0.32);
        targetCtx.globalAlpha = 0.45 + Math.sin(timestamp * 0.004) * 0.18;
        targetCtx.beginPath();
        targetCtx.arc(0, -h * 0.08, w * 0.2, 0, Math.PI * 2);
        targetCtx.strokeStyle = "rgba(159, 216, 255, 0.72)";
        targetCtx.stroke();
        targetCtx.globalAlpha = 1;
      },

      drawFront(targetCtx, card, w, h, summoned) {
        const image = this.assetsReady ? this.assetImages.get(card.imageSrc) : null;
        if (image) {
          const inset = summoned ? 2 : 5;
          const draw = summoned ? drawImageCover : drawImageContain;
          draw(targetCtx, image, -w / 2 + inset, -h / 2 + inset, w - inset * 2, h - inset * 2);
          return;
        }

        const colors = card.fallbackColors || ["#5b3fd6", "#f6d36c"];
        const gradient = targetCtx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
        gradient.addColorStop(0, colors[0]);
        gradient.addColorStop(0.52, "#101820");
        gradient.addColorStop(1, colors[1]);
        targetCtx.fillStyle = gradient;
        targetCtx.fillRect(-w / 2 + 5, -h / 2 + 5, w - 10, h - 10);

        targetCtx.fillStyle = "rgba(255, 245, 214, 0.95)";
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.font = `${Math.max(16, w * 0.22)}px Georgia, serif`;
        targetCtx.fillText(card.mark, 0, -h * 0.22);
        targetCtx.font = `${Math.max(12, w * 0.1)}px Georgia, serif`;
        targetCtx.fillText(card.en, 0, h * 0.32);
        targetCtx.font = `${Math.max(13, w * 0.12)}px sans-serif`;
        targetCtx.fillText(card.zh, 0, h * 0.42);

        targetCtx.globalAlpha = 0.9;
        targetCtx.beginPath();
        targetCtx.arc(0, 0, w * 0.18, 0, Math.PI * 2);
        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.56)";
        targetCtx.stroke();
        targetCtx.beginPath();
        targetCtx.moveTo(0, -w * 0.27);
        targetCtx.lineTo(w * 0.22, w * 0.14);
        targetCtx.lineTo(-w * 0.22, w * 0.14);
        targetCtx.closePath();
        targetCtx.stroke();

        if (summoned) {
          targetCtx.globalAlpha = 0.18;
          targetCtx.fillStyle = "#fff";
          targetCtx.fillRect(-w / 2, -h / 2, w, h);
        }
      }
    };

    const ArchiveVerdictManager = {
      verdicts: {
        justice: "你寻找的不是公平，而是可执行的秩序。",
        hanged: "你不是停在原地，而是在换一种角度等待。",
        sun: "你把光带给别人，也把阴影留给自己。",
        magician: "你擅长制造入口，也擅长隐藏代价。",
        hermit: "你退后一步，不是逃离，而是为了看清。",
        star: "你相信远处的光，所以还能继续走。",
        moon: "你害怕的不是黑夜，而是黑夜里的自己。",
        fool: "你没有被归档，你正在改写档案。"
      },
      regionCopy: {
        eye: "观察证据",
        mouth: "表达证据",
        forehead: "秩序证据",
        cheek: "面具证据",
        brow: "边界证据",
        nose: "直觉证据",
        jaw: "意志证据",
        unknown: "未知证据"
      },

      registerOrdinaryReveal(card, regionType = "unknown") {
        this.setResult(card, regionType);
        FoolEasterEgg.enabled = true;
      },

      setResult(card, regionType = "unknown") {
        AppState.archiveVerdictTitle = `你的灵视档案：${card.zh}`;
        AppState.archiveVerdictBody = this.verdicts[card.id] || "";
        AppState.selectedRegionType = regionType;
      },

      reset() {
        AppState.archiveVerdictTitle = "";
        AppState.archiveVerdictBody = "";
        AppState.archiveGenerated = false;
        AppState.archiveReading = false;
      },

      draw(targetCtx, timestamp) {
        if (!AppState.archiveVerdictTitle && !AppState.archiveReading) return;
        const layout = TarotCardManager.getLayout();
        const mobile = AppState.canvasWidth < 600;
        const width = mobile ? Math.min(330, AppState.canvasWidth - 48) : Math.min(390, AppState.canvasWidth * 0.32);
        const height = AppState.archiveVerdictBody ? 92 : 54;
        const x = mobile ? (AppState.canvasWidth - width) * 0.5 : Math.min(AppState.canvasWidth - width - 28, layout.rect.x + layout.rect.w + 32);
        const y = mobile ? layout.rect.y + layout.rect.h + 14 : layout.rect.y + Math.max(10, layout.rect.h * 0.12);

        targetCtx.save();
        targetCtx.globalAlpha = AppState.gameEnded ? 0.96 : 0.9;
        targetCtx.shadowColor = AppState.gameEnded ? "rgba(229, 192, 111, 0.45)" : "rgba(0, 0, 0, 0.48)";
        targetCtx.shadowBlur = 22;
        targetCtx.fillStyle = "rgba(3, 7, 12, 0.78)";
        targetCtx.fillRect(x, y, width, height);
        targetCtx.shadowColor = "transparent";
        targetCtx.strokeStyle = AppState.gameEnded ? "rgba(229, 192, 111, 0.86)" : "rgba(159, 216, 255, 0.58)";
        targetCtx.strokeRect(x + 0.5, y + 0.5, width - 1, height - 1);

        targetCtx.fillStyle = "rgba(229, 192, 111, 0.92)";
        targetCtx.font = "13px Georgia, 'Microsoft YaHei', serif";
        targetCtx.textAlign = "left";
        targetCtx.textBaseline = "top";
        const title = AppState.archiveReading ? "档案正在读取..." : AppState.archiveVerdictTitle;
        targetCtx.fillText(title, x + 16, y + 13);

        if (AppState.archiveVerdictBody) {
          targetCtx.fillStyle = "rgba(255, 255, 255, 0.88)";
          targetCtx.font = "14px 'Microsoft YaHei', sans-serif";
          this.drawWrappedText(targetCtx, AppState.archiveVerdictBody, x + 16, y + 40, width - 32, 22);
          targetCtx.fillStyle = "rgba(159, 216, 255, 0.72)";
          targetCtx.font = "11px 'Microsoft YaHei', sans-serif";
          targetCtx.fillText(this.regionCopy[AppState.selectedRegionType] || this.regionCopy.unknown, x + 16, y + height - 20);
        } else {
          const pulse = 0.45 + Math.sin(timestamp * 0.008) * 0.25;
          targetCtx.fillStyle = `rgba(159, 216, 255, ${pulse})`;
          targetCtx.fillRect(x + 16, y + 37, width - 32, 1);
        }
        targetCtx.restore();
      },

      drawWrappedText(targetCtx, text, x, y, maxWidth, lineHeight) {
        let line = "";
        let lineCount = 0;
        for (const char of text) {
          const test = line + char;
          if (targetCtx.measureText(test).width > maxWidth && line) {
            targetCtx.fillText(line, x, y + lineCount * lineHeight);
            line = char;
            lineCount += 1;
          } else {
            line = test;
          }
          if (lineCount >= 1) break;
        }
        if (line) targetCtx.fillText(line, x, y + lineCount * lineHeight);
      }
    };

    const FoolEasterEgg = {
      enabled: false,
      blinkCount: 0,
      windowStartedAt: 0,
      fallbackTapCount: 0,
      fallbackWindowStartedAt: 0,
      canUseFallback: false,

      registerBlink(timestamp = performance.now()) {
        if (!this.enabled || !AppState.hasRevealedArchive || TarotCardManager.cardState !== "revealed" || AppState.gameEnded) return false;
        if (!this.windowStartedAt || timestamp - this.windowStartedAt > 2000) {
          this.windowStartedAt = timestamp;
          this.blinkCount = 0;
        }
        this.blinkCount += 1;
        AppState.blinkComboCount = this.blinkCount;
        if (this.blinkCount >= CONFIG.blinkCombo.requiredCount) {
          this.enabled = false;
          TarotCardManager.summonFool(timestamp);
          return true;
        }
        return false;
      },

      registerCardTap(timestamp = performance.now(), x = 0, y = 0) {
        if (!this.enabled || !this.canUseFallback || !AppState.hasRevealedArchive || TarotCardManager.cardState !== "revealed" || AppState.gameEnded) return false;
        const rect = TarotCardManager.getLayout().rect;
        const hit = x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
        if (!hit) return false;
        if (!this.fallbackWindowStartedAt || timestamp - this.fallbackWindowStartedAt > 2000) {
          this.fallbackWindowStartedAt = timestamp;
          this.fallbackTapCount = 0;
        }
        this.fallbackTapCount += 1;
        if (this.fallbackTapCount >= CONFIG.blinkCombo.requiredCount) {
          this.enabled = false;
          TarotCardManager.summonFool(timestamp);
          return true;
        }
        return false;
      },

      reset() {
        this.enabled = false;
        this.blinkCount = 0;
        this.windowStartedAt = 0;
        this.fallbackTapCount = 0;
        this.fallbackWindowStartedAt = 0;
        this.canUseFallback = false;
        AppState.blinkComboCount = 0;
      }
    };

    class EyeSlice {
      constructor(options) {
        this.id = options.id;
        this.x = options.x;
        this.y = options.y;
        this.homeX = options.homeX || options.x;
        this.homeY = options.homeY || options.y;
        this.w = options.w;
        this.h = options.h;
        this.regionType = options.regionType || "unknown";

        this.vx = options.vx || 0;
        this.vy = options.vy || 0;
        this.rotation = options.rotation || 0;
        this.angularVelocity = options.angularVelocity || 0;
        this.scale = options.scale || 1;
        this.targetScale = 1;

        this.isGrabbed = false;
        this.grabOffsetX = 0;
        this.grabOffsetY = 0;

        this.sourceRect = options.sourceRect || null;
        this.sourceEye = options.sourceEye || null;
        this.alpha = 1;
        this.flash = 0;
        this.seed = Math.random() * 1000;
      }

      update(dt) {
        if (!this.isGrabbed) {
          const floatX = Math.sin(performance.now() * 0.001 + this.seed) * CONFIG.eyeSlices.floatNoiseAmount;
          const floatY = Math.cos(performance.now() * 0.0012 + this.seed) * CONFIG.eyeSlices.floatNoiseAmount;
          this.x += (this.vx + floatX) * dt * 60;
          this.y += (this.vy + floatY) * dt * 60;
          this.vx *= CONFIG.eyeSlices.friction;
          this.vy *= CONFIG.eyeSlices.friction;
          this.rotation += this.angularVelocity * dt * 60;
          this.angularVelocity *= CONFIG.eyeSlices.friction;
        }

        this.scale += (this.targetScale - this.scale) * Math.min(1, dt * 12);
        this.flash = Math.max(0, this.flash - dt * 3);
        this.keepInBounds();
      }

      keepInBounds() {
        const margin = Math.max(this.w, this.h) * this.scale * 0.6;
        const minX = -margin;
        const minY = -margin;
        const maxX = AppState.canvasWidth + margin;
        const maxY = AppState.canvasHeight + margin;

        if (this.x < minX || this.x > maxX) {
          this.vx *= -0.45;
          this.x = Math.max(minX, Math.min(maxX, this.x));
        }
        if (this.y < minY || this.y > maxY) {
          this.vy *= -0.45;
          this.y = Math.max(minY, Math.min(maxY, this.y));
        }
      }

      draw(targetCtx, sourceMedia) {
        const drawW = this.w * this.scale;
        const drawH = this.h * this.scale;

        targetCtx.save();
        targetCtx.translate(this.x, this.y);
        targetCtx.rotate(this.rotation);
        targetCtx.globalAlpha = this.alpha;
        targetCtx.shadowColor = "rgba(159, 216, 255, 0.20)";
        targetCtx.shadowBlur = this.isGrabbed ? 26 : 16;
        targetCtx.shadowOffsetY = 8;

        if (Math.hypot(this.vx, this.vy) > 8) {
          MysticEffectManager.throwTrail(this.x, this.y, this.vx, this.vy);
        }

        targetCtx.fillStyle = "rgba(0, 0, 0, 0.62)";
        targetCtx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);

        if (sourceMedia && this.sourceRect) {
          const rect = this.sourceRect;
          try {
            targetCtx.drawImage(
              sourceMedia,
              rect.x,
              rect.y,
              rect.w,
              rect.h,
              -drawW / 2,
              -drawH / 2,
              drawW,
              drawH
            );
          } catch (error) {
            this.drawPlaceholder(targetCtx, drawW, drawH);
          }
        } else {
          this.drawPlaceholder(targetCtx, drawW, drawH);
        }

        targetCtx.shadowColor = "transparent";
        targetCtx.strokeStyle = this.isGrabbed ? "rgba(229, 192, 111, 0.98)" : "rgba(159, 216, 255, 0.78)";
        targetCtx.lineWidth = this.isGrabbed ? 2 : 1.15;
        targetCtx.strokeRect(-drawW / 2, -drawH / 2, drawW, drawH);

        targetCtx.globalAlpha = 0.2;
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.8)";
        for (let i = 0; i < 3; i += 1) {
          const y = -drawH / 2 + ((performance.now() * 0.03 + i * 17 + this.seed) % drawH);
          targetCtx.fillRect(-drawW / 2, y, drawW, 1);
        }

        if (this.flash > 0) {
          targetCtx.globalAlpha = Math.min(0.85, this.flash);
          targetCtx.fillStyle = "#fff";
          targetCtx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);
        }

        targetCtx.restore();
      }

      drawPlaceholder(targetCtx, drawW, drawH) {
        const gradient = targetCtx.createLinearGradient(-drawW / 2, 0, drawW / 2, 0);
        gradient.addColorStop(0, "rgba(20, 24, 30, 0.92)");
        gradient.addColorStop(0.5, "rgba(78, 92, 110, 0.86)");
        gradient.addColorStop(1, "rgba(20, 24, 30, 0.92)");
        targetCtx.fillStyle = gradient;
        targetCtx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);

        targetCtx.fillStyle = "rgba(255, 255, 255, 0.7)";
        targetCtx.font = `${Math.max(10, Math.min(15, drawH * 0.22))}px sans-serif`;
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.fillText("EYE SLICE MOCK", 0, 0);
      }

      containsPoint(x, y) {
        const cos = Math.cos(-this.rotation);
        const sin = Math.sin(-this.rotation);
        const dx = x - this.x;
        const dy = y - this.y;
        const localX = dx * cos - dy * sin;
        const localY = dx * sin + dy * cos;
        return Math.abs(localX) <= (this.w * this.scale) / 2 && Math.abs(localY) <= (this.h * this.scale) / 2;
      }

      grab(x, y) {
        this.isGrabbed = true;
        this.targetScale = 1.05;
        this.grabOffsetX = this.x - x;
        this.grabOffsetY = this.y - y;
        this.vx = 0;
        this.vy = 0;
        this.angularVelocity *= 0.2;
      }

      drag(x, y) {
        this.x = x + this.grabOffsetX;
        this.y = y + this.grabOffsetY;
      }

      release(vx, vy) {
        this.isGrabbed = false;
        this.targetScale = 1;
        const speed = Math.hypot(vx, vy);
        const maxSpeed = CONFIG.eyeSlices.maxSpeed;
        const scale = speed > maxSpeed ? maxSpeed / speed : 1;
        this.vx = vx * scale * CONFIG.eyeSlices.throwMultiplier;
        this.vy = vy * scale * CONFIG.eyeSlices.throwMultiplier;
        this.angularVelocity = Math.max(-0.08, Math.min(0.08, vx * 0.004));
      }
    }

    const EyeSliceManager = {
      slices: [],
      grabbedSlice: null,
      pointerHistory: [],

      init() {
        this.createMockSlices();
      },

      createMockSlices() {
        this.slices = [];
        const sourceMedia = this.getSourceMedia();
        const sourceSize = sourceMedia ? getMediaSize(sourceMedia) : null;
        const fallbackRects = sourceSize
          ? [
              {
                x: sourceSize.width * 0.34,
                y: sourceSize.height * 0.35,
                w: sourceSize.width * 0.16,
                h: sourceSize.height * 0.12,
                side: "left"
              },
              {
                x: sourceSize.width * 0.5,
                y: sourceSize.height * 0.35,
                w: sourceSize.width * 0.16,
                h: sourceSize.height * 0.12,
                side: "right"
              }
            ]
          : [];
        const liveRects = FaceTracker.getEyeRects();

        const count = CONFIG.eyeSlices.initialCount;
        const baseSize = Math.max(62, Math.min(132, Math.min(AppState.canvasWidth, AppState.canvasHeight) * 0.12));

        for (let i = 0; i < count; i += 1) {
          const angle = (i / count) * Math.PI * 2;
          const radiusX = AppState.canvasWidth * 0.19;
          const radiusY = AppState.canvasHeight * 0.12;
          const sourceEye = i % 2 === 0 ? "left" : "right";
          const rect = FaceRegionSampler.getRegion(i, liveRects)
            || liveRects.find((eyeRect) => eyeRect.side === sourceEye)
            || fallbackRects.find((eyeRect) => eyeRect.side === sourceEye)
            || null;
          const sizeTier = [0.74, 0.92, 1.18, 0.82, 1.34][i % 5];
          const aspect = [1.42, 1.0, 0.78, 1.18][i % 4];
          this.slices.push(new EyeSlice({
            id: `mock-${i}`,
            x: AppState.canvasWidth * 0.5 + Math.cos(angle) * radiusX,
            y: AppState.canvasHeight * 0.48 + Math.sin(angle) * radiusY,
            homeX: AppState.canvasWidth * 0.5 + Math.cos(angle) * radiusX,
            homeY: AppState.canvasHeight * 0.48 + Math.sin(angle) * radiusY,
            w: baseSize * sizeTier * aspect,
            h: baseSize * sizeTier / Math.sqrt(aspect),
            vx: Math.sin(angle) * 0.25,
            vy: Math.cos(angle) * 0.22,
            rotation: (i - count / 2) * 0.05,
            angularVelocity: (i % 2 ? 0.006 : -0.006),
            sourceEye: rect?.side || sourceEye,
            sourceRect: rect
          }));
        }
      },

      createSliceFromEyeRect(eyeRect) {
        const id = `eye-${Date.now()}-${this.slices.length}`;
        const side = Math.max(68, Math.min(148, Math.max(eyeRect.w, eyeRect.h) * 1.25));
        const slice = new EyeSlice({
          id,
          x: AppState.canvasWidth * 0.5,
          y: AppState.canvasHeight * 0.44,
          w: side,
          h: side,
          sourceEye: eyeRect.side,
          sourceRect: eyeRect
        });
        this.slices.push(slice);
        return slice;
      },

      update(dt) {
        if (!this.slices.length) {
          this.createMockSlices();
        }
        this.slices.forEach((slice) => slice.update(dt));
      },

      draw(targetCtx) {
        const sourceMedia = this.getSourceMedia();
        this.slices.forEach((slice) => slice.draw(targetCtx, sourceMedia));
      },

      updateEyeRects(eyeRects) {
        if (!eyeRects || !eyeRects.length) return;
        this.slices.forEach((slice, index) => {
          const sourceEye = slice.sourceEye || (index % 2 === 0 ? "left" : "right");
          const rect = FaceRegionSampler.getRegion(index, eyeRects) || eyeRects.find((eyeRect) => eyeRect.side === sourceEye) || eyeRects[index % eyeRects.length];
          if (rect) {
            slice.sourceEye = rect.side || sourceEye;
            slice.sourceRect = rect;
          }
        });
      },

      getSourceMedia() {
        if (AppState.cameraReady && SourceManager.videoEl) {
          return CameraStylePipeline.getClearSource(SourceManager.videoEl);
        }
        return null;
      },

      findNearestSlice(x, y, radius) {
        let best = null;
        let bestDistance = radius;
        for (let i = this.slices.length - 1; i >= 0; i -= 1) {
          const slice = this.slices[i];
          const distance = Math.hypot(slice.x - x, slice.y - y);
          if ((slice.containsPoint(x, y) || distance < bestDistance) && distance <= bestDistance) {
            best = slice;
            bestDistance = distance;
          }
        }
        return best;
      },

      grabAt(x, y) {
        const slice = this.findNearestSlice(x, y, CONFIG.hand.grabRadius);
        if (!slice) return false;
        this.grabbedSlice = slice;
        this.pointerHistory = [{ x, y, time: performance.now() }];
        slice.grab(x, y);
        return true;
      },

      dragTo(x, y) {
        if (!this.grabbedSlice) return false;
        this.grabbedSlice.drag(x, y);
        this.recordPointer(x, y);
        return true;
      },

      release(vx, vy) {
        if (!this.grabbedSlice) return false;
        this.grabbedSlice.release(vx, vy);
        this.grabbedSlice = null;
        this.pointerHistory = [];
        return true;
      },

      recordPointer(x, y) {
        const now = performance.now();
        this.pointerHistory.push({ x, y, time: now });
        this.pointerHistory = this.pointerHistory.filter((point) => now - point.time <= 140).slice(-6);
      },

      getReleaseVelocity() {
        if (this.pointerHistory.length < 2) return { vx: 0, vy: 0 };
        const first = this.pointerHistory[0];
        const last = this.pointerHistory[this.pointerHistory.length - 1];
        const dt = Math.max(16, last.time - first.time);
        return {
          vx: ((last.x - first.x) / dt) * 16.67,
          vy: ((last.y - first.y) / dt) * 16.67
        };
      },

      triggerBlinkEffect() {
        this.slices.forEach((slice, index) => {
          const target = this.getRegroupTarget(slice, index);
          slice.flash = 1;
          slice.homeX = target.x;
          slice.homeY = target.y;
          slice.vx += (target.x - slice.x) * 0.05 + Math.cos(index) * 1.2;
          slice.vy += (target.y - slice.y) * 0.05 + Math.sin(index) * 1.2;
          slice.rotation *= 0.65;
          slice.angularVelocity += (index % 2 ? 0.018 : -0.018);
          slice.targetScale = 0.94 + (index % 3) * 0.04;
        });
      },

      getRegroupTarget(slice, index) {
        if (slice.sourceRect) {
          const mapped = mapVideoRectToCanvas(slice.sourceRect);
          if (mapped) {
            const localIndex = Math.floor(index / 2);
            const offsetX = (localIndex - 1.5) * mapped.w * 0.42;
            const offsetY = Math.sin(index * 1.7) * mapped.h * 0.28;
            return {
              x: mapped.x + mapped.w * 0.5 + offsetX,
              y: mapped.y + mapped.h * 0.5 + offsetY
            };
          }
        }

        const count = Math.max(1, this.slices.length);
        const angle = (index / count) * Math.PI * 2;
        return {
          x: AppState.canvasWidth * 0.5 + Math.cos(angle) * AppState.canvasWidth * 0.16,
          y: AppState.canvasHeight * 0.46 + Math.sin(angle) * AppState.canvasHeight * 0.1
        };
      }
    };

    const ShardLabelRenderer = {
      labels: {
        eye: "眼",
        mouth: "口",
        forehead: "额",
        cheek: "颊",
        brow: "眉",
        nose: "鼻",
        jaw: "颌",
        unknown: "未知"
      },

      getLabel(regionType) {
        return this.labels[regionType] || this.labels.unknown;
      },

      draw(targetCtx, shard) {
        const label = this.getLabel(shard.regionType);
        const x = shard.x + shard.w * shard.scale * 0.32;
        const y = shard.y - shard.h * shard.scale * 0.44;
        targetCtx.save();
        targetCtx.font = "12px 'Microsoft YaHei', sans-serif";
        const labelW = Math.max(24, targetCtx.measureText(label).width + 12);
        targetCtx.fillStyle = "rgba(3, 7, 12, 0.72)";
        targetCtx.fillRect(x, y, labelW, 20);
        targetCtx.strokeStyle = shard.isGrabbed ? "rgba(229, 192, 111, 0.92)" : "rgba(159, 216, 255, 0.52)";
        targetCtx.strokeRect(x + 0.5, y + 0.5, labelW - 1, 19);
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.9)";
        targetCtx.textAlign = "center";
        targetCtx.textBaseline = "middle";
        targetCtx.fillText(label, x + labelW * 0.5, y + 10);
        targetCtx.restore();
      }
    };

    class FaceShard {
      constructor(options) {
        this.id = options.id;
        this.sourceRect = options.sourceRect;
        this.x = options.x;
        this.y = options.y;
        this.homeX = options.homeX;
        this.homeY = options.homeY;
        this.w = options.w;
        this.h = options.h;
        this.vx = options.vx || 0;
        this.vy = options.vy || 0;
        this.rotation = options.rotation || 0;
        this.angularVelocity = options.angularVelocity || 0;
        this.alpha = 0.82;
        this.scale = options.scale || 1;
        this.targetScale = 1;
        this.isGrabbed = false;
        this.grabOffsetX = 0;
        this.grabOffsetY = 0;
        this.regionType = options.regionType || "unknown";
        this.interactive = options.interactive !== false;
        this.canTriggerCard = true;
        this.seed = Math.random() * 1000;
      }

      update(dt) {
        if (FaceShardManager.frozen && !this.isGrabbed) return;
        if (!this.isGrabbed) {
          this.vx += (this.homeX - this.x) * CONFIG.faceShards.returnForce * dt;
          this.vy += (this.homeY - this.y) * CONFIG.faceShards.returnForce * dt;
          this.x += this.vx * dt * 60;
          this.y += this.vy * dt * 60;
          this.vx *= 0.78;
          this.vy *= 0.78;
          this.angularVelocity = 0;
          if (Math.hypot(this.homeX - this.x, this.homeY - this.y) < 1.5) {
            this.x = this.homeX;
            this.y = this.homeY;
            this.vx = 0;
            this.vy = 0;
          }
        }
        this.scale += (this.targetScale - this.scale) * Math.min(1, dt * 10);
      }

      draw(targetCtx, sourceMedia) {
        const drawW = this.w * this.scale;
        const drawH = this.h * this.scale;
        targetCtx.save();
        targetCtx.translate(this.x, this.y);
        targetCtx.rotate(this.rotation);
        targetCtx.globalAlpha = this.alpha;
        targetCtx.shadowColor = "rgba(125, 249, 255, 0.24)";
        targetCtx.shadowBlur = 18;

        if (sourceMedia && this.sourceRect) {
          try {
            targetCtx.drawImage(
              sourceMedia,
              this.sourceRect.x,
              this.sourceRect.y,
              this.sourceRect.w,
              this.sourceRect.h,
              -drawW / 2,
              -drawH / 2,
              drawW,
              drawH
            );
          } catch (error) {
            this.drawFallback(targetCtx, drawW, drawH);
          }
        } else {
          this.drawFallback(targetCtx, drawW, drawH);
        }

        targetCtx.shadowColor = "transparent";
        targetCtx.strokeStyle = this.isGrabbed
          ? "rgba(229, 192, 111, 0.95)"
          : "rgba(159, 216, 255, 0.42)";
        targetCtx.lineWidth = this.isGrabbed ? 2 : 1;
        targetCtx.strokeRect(-drawW / 2, -drawH / 2, drawW, drawH);
        targetCtx.restore();
        ShardLabelRenderer.draw(targetCtx, this);
      }

      drawFallback(targetCtx, drawW, drawH) {
        targetCtx.fillStyle = "rgba(255, 79, 216, 0.16)";
        targetCtx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);
      }

      containsPoint(x, y) {
        const dx = x - this.x;
        const dy = y - this.y;
        return Math.abs(dx) <= (this.w * this.scale) / 2 && Math.abs(dy) <= (this.h * this.scale) / 2;
      }

      grab(x, y) {
        this.isGrabbed = true;
        this.grabOffsetX = this.x - x;
        this.grabOffsetY = this.y - y;
        this.targetScale = 1.08;
        this.vx = 0;
        this.vy = 0;
      }

      drag(x, y) {
        this.x = x + this.grabOffsetX;
        this.y = y + this.grabOffsetY;
      }

      release(vx, vy) {
        this.isGrabbed = false;
        this.targetScale = 1;
        this.vx = 0;
        this.vy = 0;
        this.angularVelocity = 0;
      }
    }

    const FaceShardManager = {
      shards: [],
      grabbedShard: null,
      pointerHistory: [],
      lastFaceArea: 0,
      frozen: false,

      updateFromFaceBox(faceRect) {
        if (!faceRect) return;
        if (!this.shards.length) {
          this.createFromFaceRect(faceRect);
          return;
        }

        const mapped = mapVideoRectToCanvas(faceRect);
        const faceArea = mapped ? mapped.w * mapped.h : 0;
        if (this.lastFaceArea && faceArea) {
          const ratio = faceArea / this.lastFaceArea;
          if (ratio > 1.18) this.triggerScalePulse(1.16);
          if (ratio < 0.84) this.triggerScatter(0.45);
        }
        this.lastFaceArea = faceArea || this.lastFaceArea;

        const layout = this.buildLayout(faceRect);
        this.shards.forEach((shard, index) => {
          const next = layout[index % layout.length];
          shard.sourceRect = next.sourceRect;
          shard.homeX = next.homeX;
          shard.homeY = next.homeY;
          shard.w = next.w;
          shard.h = next.h;
          shard.regionType = next.regionType;
        });
      },

      createFromFaceRect(faceRect) {
        this.shards = this.buildLayout(faceRect).map((item, index) => new FaceShard({
          id: `face-${index}`,
          ...item,
          vx: (Math.random() - 0.5) * 1.2,
          vy: (Math.random() - 0.5) * 1.2,
          rotation: (index - 5) * 0.025,
          angularVelocity: index % 2 ? 0.005 : -0.005
        }));
        AppState.faceShardCount = this.shards.length;
      },

      buildLayout(faceRect) {
        const mapped = mapVideoRectToCanvas(faceRect);
        if (!mapped) return [];
        const mediaSize = SourceManager.videoEl ? getMediaSize(SourceManager.videoEl) : null;

        const regions = [
          { x: 0.28, y: 0.18, w: 0.34, h: 0.16, scale: 1.10, regionType: "eye" },
          { x: 0.62, y: 0.20, w: 0.30, h: 0.18, scale: 0.86, regionType: "eye" },
          { x: 0.50, y: 0.42, w: 0.22, h: 0.26, scale: 0.78, regionType: "nose" },
          { x: 0.30, y: 0.52, w: 0.28, h: 0.24, scale: 1.22, regionType: "cheek" },
          { x: 0.70, y: 0.52, w: 0.26, h: 0.24, scale: 0.96, regionType: "cheek" },
          { x: 0.48, y: 0.72, w: 0.34, h: 0.18, scale: 1.16, regionType: "mouth" },
          { x: 0.48, y: 0.09, w: 0.36, h: 0.16, scale: 0.72, regionType: "forehead" },
          { x: 0.22, y: 0.74, w: 0.20, h: 0.20, scale: 0.66, regionType: "jaw" },
          { x: 0.74, y: 0.74, w: 0.20, h: 0.20, scale: 0.82, regionType: "jaw" },
          { x: 0.18, y: 0.34, w: 0.22, h: 0.18, scale: 0.74, regionType: "brow" },
          { x: 0.80, y: 0.34, w: 0.22, h: 0.18, scale: 0.88, regionType: "brow" },
          { x: 0.40, y: 0.58, w: 0.24, h: 0.24, scale: 0.92, regionType: "cheek" },
          { x: 0.60, y: 0.62, w: 0.22, h: 0.22, scale: 0.70, regionType: "cheek" },
          { x: 0.42, y: 0.86, w: 0.26, h: 0.16, scale: 0.64, regionType: "jaw" },
          { x: 0.58, y: 0.30, w: 0.20, h: 0.18, scale: 0.76, regionType: "brow" },
          { x: 0.34, y: 0.34, w: 0.20, h: 0.18, scale: 0.84, regionType: "brow" }
        ].slice(0, this.getMaxVisibleCount());

        return regions.map((region, index) => {
          const sourceW = Math.max(6, faceRect.w * region.w);
          const sourceH = Math.max(6, faceRect.h * region.h);
          const centerX = faceRect.x + faceRect.w * region.x;
          const centerY = faceRect.y + faceRect.h * region.y;
          const maxX = mediaSize ? Math.max(0, mediaSize.width - sourceW) : Number.POSITIVE_INFINITY;
          const maxY = mediaSize ? Math.max(0, mediaSize.height - sourceH) : Number.POSITIVE_INFINITY;
          const sourceRect = {
            x: Math.max(0, Math.min(maxX, centerX - sourceW * 0.5)),
            y: Math.max(0, Math.min(maxY, centerY - sourceH * 0.5)),
            w: sourceW,
            h: sourceH,
            side: `face-${index}`
          };
          const homeX = mapped.x + mapped.w * region.x + Math.sin(index) * 10;
          const homeY = mapped.y + mapped.h * region.y + Math.cos(index * 1.4) * 8;
          const side = Math.max(34, Math.min(138, Math.min(mapped.w, mapped.h) * 0.20 * region.scale));
          const aspect = Math.max(0.72, Math.min(1.55, region.w / region.h));
          return {
            sourceRect,
            homeX,
            homeY,
            x: homeX + Math.sin(index * 1.8) * 26,
            y: homeY + Math.cos(index * 1.3) * 18,
            w: side * Math.sqrt(aspect),
            h: side / Math.sqrt(aspect),
            regionType: region.regionType || "unknown",
            interactive: true,
            canTriggerCard: true
          };
        });
      },

      update(dt) {
        if (!this.shards.length && AppState.phase === "running" && !AppState.cameraReady) {
          this.createMockShards();
        }
        this.shards.forEach((shard) => shard.update(dt));
        AppState.faceShardCount = this.shards.length;
      },

      createMockShards() {
        const regionTypes = ["eye", "mouth", "forehead", "cheek", "brow", "nose", "jaw"];
        const count = this.getMaxVisibleCount();
        this.shards = Array.from({ length: count }, (_, index) => {
          const angle = (index / count) * Math.PI * 2;
          const x = AppState.canvasWidth * 0.56 + Math.cos(angle) * AppState.canvasWidth * 0.16;
          const y = AppState.canvasHeight * 0.48 + Math.sin(angle) * AppState.canvasHeight * 0.10;
          const minSize = AppState.canvasWidth < 600 ? CONFIG.faceShards.minInteractiveSizeMobile : CONFIG.faceShards.minInteractiveSizeDesktop;
          const side = Math.max(minSize, Math.min(96, AppState.canvasWidth * 0.12));
          return new FaceShard({
            id: `archive-mock-${index}`,
            sourceRect: null,
            regionType: regionTypes[index % regionTypes.length],
            interactive: true,
            canTriggerCard: true,
            x,
            y,
            homeX: x,
            homeY: y,
            w: side * (index % 2 ? 1.15 : 0.92),
            h: side,
            vx: 0,
            vy: 0,
            rotation: (index - 3) * 0.04,
            angularVelocity: 0
          });
        });
        AppState.faceShardCount = this.shards.length;
      },

      getMaxVisibleCount() {
        return AppState.canvasWidth < 600
          ? CONFIG.faceShards.maxVisibleMobile
          : CONFIG.faceShards.maxVisibleDesktop;
      },

      reflowStableLayout(reason = "blink") {
        const count = this.shards.length;
        if (!count) return;
        this.shards.forEach((shard, index) => {
          const angle = ((index + (reason === "blink" ? 1 : 0.35)) / count) * Math.PI * 2;
          shard.homeX = AppState.canvasWidth * 0.55 + Math.cos(angle) * AppState.canvasWidth * 0.16;
          shard.homeY = AppState.canvasHeight * 0.48 + Math.sin(angle) * AppState.canvasHeight * 0.10;
          shard.vx = (shard.homeX - shard.x) * 0.018;
          shard.vy = (shard.homeY - shard.y) * 0.018;
          shard.angularVelocity = 0;
          shard.targetScale = 1;
        });
        ParticleManager.emit(AppState.canvasWidth * 0.5, AppState.canvasHeight * 0.45, 8, "blink");
      },

      draw(targetCtx) {
        const sourceMedia = SourceManager.videoEl
          ? CameraStylePipeline.getClearSource(SourceManager.videoEl)
          : null;
        this.shards.forEach((shard) => shard.draw(targetCtx, sourceMedia));
      },

      triggerScatter(intensity = 1) {
        this.frozen = false;
        AppState.faceShardsFrozen = false;
        this.shards.forEach((shard, index) => {
          const angle = index * 1.74;
          shard.vx += Math.cos(angle) * CONFIG.faceShards.scatterForce * intensity;
          shard.vy += Math.sin(angle) * CONFIG.faceShards.scatterForce * intensity;
          shard.angularVelocity += (index % 2 ? 0.035 : -0.035) * intensity;
        });
        ParticleManager.emit(AppState.canvasWidth * 0.5, AppState.canvasHeight * 0.45, 18, "face");
      },

      triggerReassemble() {
        this.frozen = false;
        AppState.faceShardsFrozen = false;
        this.shards.forEach((shard) => {
          shard.vx += (shard.homeX - shard.x) * 0.08;
          shard.vy += (shard.homeY - shard.y) * 0.08;
          shard.targetScale = 0.96;
        });
        ParticleManager.emit(AppState.canvasWidth * 0.5, AppState.canvasHeight * 0.42, 24, "blink");
      },

      triggerScalePulse(scale = 1.12) {
        this.frozen = false;
        AppState.faceShardsFrozen = false;
        this.shards.forEach((shard) => {
          shard.targetScale = scale;
          shard.vx += (shard.x - AppState.canvasWidth * 0.5) * 0.008;
          shard.vy += (shard.y - AppState.canvasHeight * 0.45) * 0.008;
        });
        ParticleManager.emit(AppState.canvasWidth * 0.5, AppState.canvasHeight * 0.42, 12, "face");
      },

      triggerFreeze() {
        if (!this.shards.length) return;
        this.frozen = true;
        AppState.faceShardsFrozen = true;
        this.shards.forEach((shard) => {
          shard.vx = 0;
          shard.vy = 0;
          shard.angularVelocity = 0;
          shard.targetScale = 1.02;
        });
        ParticleManager.emit(AppState.canvasWidth * 0.5, AppState.canvasHeight * 0.42, 10, "blink");
      },

      grabAt(x, y) {
        let best = null;
        let bestDistance = CONFIG.faceShards.grabRadius;
        for (let i = this.shards.length - 1; i >= 0; i -= 1) {
          const shard = this.shards[i];
          const distance = Math.hypot(shard.x - x, shard.y - y);
          if ((shard.containsPoint(x, y) || distance < bestDistance) && distance <= bestDistance) {
            best = shard;
            bestDistance = distance;
          }
        }
        if (!best) return false;
        this.grabbedShard = best;
        this.pointerHistory = [{ x, y, time: performance.now() }];
        best.grab(x, y);
        return true;
      },

      dragTo(x, y) {
        if (!this.grabbedShard) return false;
        this.grabbedShard.drag(x, y);
        this.recordPointer(x, y);
        return true;
      },

      release(vx, vy) {
        if (!this.grabbedShard) return false;
        this.grabbedShard.release(vx, vy);
        this.grabbedShard = null;
        this.pointerHistory = [];
        return true;
      },

      recordPointer(x, y) {
        const now = performance.now();
        this.pointerHistory.push({ x, y, time: now });
        this.pointerHistory = this.pointerHistory.filter((point) => now - point.time <= 140).slice(-6);
      },

      getReleaseVelocity() {
        if (this.pointerHistory.length < 2) return { vx: 0, vy: 0 };
        const first = this.pointerHistory[0];
        const last = this.pointerHistory[this.pointerHistory.length - 1];
        const dt = Math.max(16, last.time - first.time);
        return {
          vx: ((last.x - first.x) / dt) * 16.67,
          vy: ((last.y - first.y) / dt) * 16.67
        };
      },

      getGrabbedShard() {
        if (!this.grabbedShard) return null;
        return {
          id: this.grabbedShard.id,
          x: this.grabbedShard.x,
          y: this.grabbedShard.y,
          w: this.grabbedShard.w * this.grabbedShard.scale,
          h: this.grabbedShard.h * this.grabbedShard.scale,
          isGrabbed: this.grabbedShard.isGrabbed,
          regionType: this.grabbedShard.regionType || "unknown"
        };
      },

      reset() {
        this.shards = [];
        this.grabbedShard = null;
        this.pointerHistory = [];
        this.lastFaceArea = 0;
        this.frozen = false;
        AppState.faceShardCount = 0;
        AppState.faceShardsFrozen = false;
      }
    };

    const CardRevealController = {
      slotRect: null,

      update(timestamp = performance.now()) {
        if (AppState.gameEnded || TarotCardManager.cardState !== "faceDown") return;
        const shard = FaceShardManager.getGrabbedShard();
        if (!shard || !shard.isGrabbed) {
          this.resetHover();
          return;
        }

        if (!this.isShardInSlot(shard)) {
          this.resetHover();
          return;
        }

        RitualState.selectedShardId = shard.id;
        RitualState.targetCardId = AppState.currentCardId;
        if (!RitualState.hoverStartAt) {
          RitualState.hoverStartAt = timestamp;
          AppState.archiveReading = true;
          showToast("档案正在读取...");
          return;
        }

        if (timestamp - RitualState.hoverStartAt >= CONFIG.tarotDeck.revealHoldMs) {
          this.triggerReveal(timestamp);
        }
      },

      isShardInSlot(shard) {
        const rect = this.slotRect || TarotCardManager.getLayout().rect;
        if (!rect || !shard) return false;
        const padding = Math.min(rect.w, rect.h) * 0.12;
        const expanded = {
          x: rect.x - padding,
          y: rect.y - padding,
          w: rect.w + padding * 2,
          h: rect.h + padding * 2
        };
        return shard.x >= expanded.x
          && shard.x <= expanded.x + expanded.w
          && shard.y >= expanded.y
          && shard.y <= expanded.y + expanded.h;
      },

      triggerReveal(timestamp = performance.now()) {
        const shard = FaceShardManager.getGrabbedShard();
        if (!TarotCardManager.startReveal(timestamp, shard)) return false;
        FaceShardManager.triggerFreeze();
        return true;
      },

      resetHover() {
        RitualState.selectedShardId = null;
        RitualState.hoverStartAt = 0;
        if (TarotCardManager.cardState === "faceDown") {
          AppState.archiveReading = false;
        }
      },

      reset() {
        this.resetHover();
        RitualState.revealStartedAt = 0;
      }
    };

    const ParticleManager = {
      particles: [],

      emit(x, y, count, type = "blink") {
        const maxParticles = PerformanceManager.getMaxParticles();
        for (let i = 0; i < count && this.particles.length < maxParticles; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1.2 + Math.random() * 5;
          this.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.8 + Math.random() * 0.7,
            maxLife: 1.2,
            size: 1.5 + Math.random() * 3,
            color: type === "face" ? "rgba(255, 79, 216," : "rgba(125, 249, 255,"
          });
        }
      },

      update(dt) {
        this.particles.forEach((particle) => {
          particle.x += particle.vx * dt * 60;
          particle.y += particle.vy * dt * 60;
          particle.vx *= 0.96;
          particle.vy *= 0.96;
          particle.life -= dt;
        });
        this.particles = this.particles
          .filter((particle) => particle.life > 0)
          .slice(-PerformanceManager.getMaxParticles());
      },

      draw(targetCtx) {
        targetCtx.save();
        this.particles.forEach((particle) => {
          const alpha = Math.max(0, particle.life / particle.maxLife);
          targetCtx.fillStyle = `${particle.color}${alpha})`;
          targetCtx.beginPath();
          targetCtx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          targetCtx.fill();
        });
        targetCtx.restore();
      },

      clear() {
        this.particles = [];
      }
    };

    // =====================================================
    // 7. PHYSICS ENGINE
    // =====================================================
    function updateFPS(timestamp) {
      if (!AppState.lastFrameTime) {
        AppState.lastFrameTime = timestamp;
        return AppState.lastDeltaTime;
      }

      const delta = timestamp - AppState.lastFrameTime;
      AppState.lastFrameTime = timestamp;
      AppState.lastDeltaTime = Math.min(0.05, Math.max(0.001, delta / 1000));

      if (delta > 0) {
        const instantFPS = 1000 / delta;
        AppState.fps = AppState.fps
          ? AppState.fps * 0.9 + instantFPS * 0.1
          : instantFPS;
        PerformanceManager.updateFPS(AppState.fps, timestamp);
      }
      return AppState.lastDeltaTime;
    }

    // =====================================================
    // 8. RENDER ENGINE
    // =====================================================
    function getMediaSize(media) {
      return {
        width: media.videoWidth || media.naturalWidth || media.width || 1,
        height: media.videoHeight || media.naturalHeight || media.height || 1
      };
    }

    function drawMediaCover(targetCtx, media, mirrored) {
      const mediaSize = getMediaSize(media);
      const canvasRatio = AppState.canvasWidth / AppState.canvasHeight;
      const mediaRatio = mediaSize.width / mediaSize.height;
      let sx = 0;
      let sy = 0;
      let sw = mediaSize.width;
      let sh = mediaSize.height;

      if (mediaRatio > canvasRatio) {
        sw = mediaSize.height * canvasRatio;
        sx = (mediaSize.width - sw) * 0.5;
      } else {
        sh = mediaSize.width / canvasRatio;
        sy = (mediaSize.height - sh) * 0.5;
      }

      targetCtx.save();
      if (mirrored) {
        targetCtx.translate(AppState.canvasWidth, 0);
        targetCtx.scale(-1, 1);
      }
      targetCtx.drawImage(
        media,
        sx,
        sy,
        sw,
        sh,
        0,
        0,
        AppState.canvasWidth,
        AppState.canvasHeight
      );
      targetCtx.restore();
    }


    function drawMysticFrame(targetCtx, timestamp) {
      const width = AppState.canvasWidth;
      const height = AppState.canvasHeight;
      const pad = Math.max(14, Math.min(width, height) * 0.018);
      targetCtx.save();
      targetCtx.strokeStyle = "rgba(195, 158, 94, 0.62)";
      targetCtx.lineWidth = 1;
      targetCtx.strokeRect(pad, pad, width - pad * 2, height - pad * 2);
      targetCtx.strokeStyle = "rgba(159, 216, 255, 0.16)";
      targetCtx.strokeRect(pad + 8, pad + 8, width - (pad + 8) * 2, height - (pad + 8) * 2);

      targetCtx.globalAlpha = 0.15;
      targetCtx.strokeStyle = "rgba(159, 216, 255, 0.34)";
      const grid = 72;
      for (let x = pad + ((timestamp * 0.006) % grid); x < width - pad; x += grid) {
        targetCtx.beginPath();
        targetCtx.moveTo(x, pad + 8);
        targetCtx.lineTo(x, height - pad - 8);
        targetCtx.stroke();
      }
      for (let y = pad; y < height - pad; y += grid) {
        targetCtx.beginPath();
        targetCtx.moveTo(pad + 8, y);
        targetCtx.lineTo(width - pad - 8, y);
        targetCtx.stroke();
      }
      targetCtx.globalAlpha = 1;
      const c = Math.min(70, Math.max(34, Math.min(width, height) * 0.07));
      [[pad, pad, 1, 1], [width - pad, pad, -1, 1], [width - pad, height - pad, -1, -1], [pad, height - pad, 1, -1]].forEach(([x, y, sx, sy]) => {
        targetCtx.strokeStyle = "rgba(229, 192, 111, 0.78)";
        targetCtx.beginPath();
        targetCtx.moveTo(x, y + sy * c);
        targetCtx.lineTo(x, y);
        targetCtx.lineTo(x + sx * c, y);
        targetCtx.stroke();
        targetCtx.beginPath();
        targetCtx.arc(x + sx * c * 0.56, y + sy * c * 0.56, c * 0.22, 0, Math.PI * 2);
        targetCtx.stroke();
      });
      targetCtx.restore();
    }

    function clamp01(value) {
      return Math.max(0, Math.min(1, value));
    }

    function easeOutCubic(value) {
      const t = clamp01(value);
      return 1 - Math.pow(1 - t, 3);
    }

    function drawImageContain(targetCtx, image, x, y, width, height) {
      if (!image || !image.naturalWidth || !image.naturalHeight) return false;
      const scale = Math.min(width / image.naturalWidth, height / image.naturalHeight);
      const drawW = image.naturalWidth * scale;
      const drawH = image.naturalHeight * scale;
      const drawX = x + (width - drawW) * 0.5;
      const drawY = y + (height - drawH) * 0.5;
      targetCtx.drawImage(image, drawX, drawY, drawW, drawH);
      return true;
    }

    function drawImageCover(targetCtx, image, x, y, width, height) {
      if (!image || !image.naturalWidth || !image.naturalHeight) return false;
      const scale = Math.max(width / image.naturalWidth, height / image.naturalHeight);
      const sourceW = width / scale;
      const sourceH = height / scale;
      const sourceX = (image.naturalWidth - sourceW) * 0.5;
      const sourceY = (image.naturalHeight - sourceH) * 0.5;
      targetCtx.drawImage(image, sourceX, sourceY, sourceW, sourceH, x, y, width, height);
      return true;
    }

    function drawObservatoryFrame(targetCtx, x, y, width, height, drawContent) {
      targetCtx.save();
      targetCtx.shadowColor = "rgba(0, 0, 0, 0.62)";
      targetCtx.shadowBlur = 28;
      targetCtx.fillStyle = "rgba(3, 7, 12, 0.82)";
      targetCtx.fillRect(x - 14, y - 12, width + 28, height + 24);
      targetCtx.strokeStyle = "rgba(195, 158, 94, 0.72)";
      targetCtx.lineWidth = 1.2;
      targetCtx.strokeRect(x - 14, y - 12, width + 28, height + 24);
      targetCtx.fillStyle = "rgba(159, 216, 255, 0.05)";
      targetCtx.fillRect(x, y, width, height);
      drawContent();
      targetCtx.shadowColor = "transparent";
      targetCtx.strokeStyle = "rgba(159, 216, 255, 0.66)";
      targetCtx.strokeRect(x + 8, y + 6, width - 16, height - 12);
      targetCtx.globalAlpha = 0.22;
      targetCtx.fillStyle = "#fff";
      for (let row = y + 8; row < y + height - 8; row += 4) {
        targetCtx.fillRect(x + 8, row, width - 16, 1);
      }
      targetCtx.globalAlpha = 1;
      targetCtx.strokeStyle = "rgba(229, 192, 111, 0.74)";
      targetCtx.beginPath();
      targetCtx.moveTo(x - 38, y + height * 0.5);
      targetCtx.lineTo(x - 14, y + height * 0.5);
      targetCtx.moveTo(x + width + 14, y + height * 0.5);
      targetCtx.lineTo(x + width + 38, y + height * 0.5);
      targetCtx.stroke();
      targetCtx.restore();
    }

    function drawSummoningSlot(targetCtx, x, y, w, h, timestamp, summoned) {
      targetCtx.save();
      targetCtx.translate(x, y);
      const r = Math.max(w, h) * (summoned ? 0.82 : 0.72);
      targetCtx.globalAlpha = summoned ? 0.72 : 0.42;
      targetCtx.strokeStyle = "rgba(229, 192, 111, 0.56)";
      targetCtx.lineWidth = 1;
      for (let i = 0; i < 4; i += 1) {
        targetCtx.beginPath();
        targetCtx.arc(0, 0, r * (0.46 + i * 0.16), 0, Math.PI * 2);
        targetCtx.stroke();
      }
      const count = summoned ? 16 : 10;
      for (let i = 0; i < count; i += 1) {
        const angle = timestamp * 0.00035 + (i / count) * Math.PI * 2;
        const px = Math.cos(angle) * r * 0.74;
        const py = Math.sin(angle) * r * 0.74;
        targetCtx.fillStyle = i % 2 ? "rgba(159, 216, 255, 0.72)" : "rgba(229, 192, 111, 0.82)";
        targetCtx.beginPath();
        targetCtx.arc(px, py, i % 3 === 0 ? 2.2 : 1.4, 0, Math.PI * 2);
        targetCtx.fill();
      }
      targetCtx.globalAlpha = summoned ? 0.24 : 0.14;
      const glow = targetCtx.createRadialGradient(0, h * 0.43, 4, 0, h * 0.43, w * 0.72);
      glow.addColorStop(0, "rgba(229, 192, 111, 0.74)");
      glow.addColorStop(1, "rgba(229, 192, 111, 0)");
      targetCtx.fillStyle = glow;
      targetCtx.fillRect(-w, h * 0.18, w * 2, h * 0.55);
      targetCtx.restore();
    }

    const MysticEffectManager = {
      sparks: [],
      threads: [],
      waves: [],

      pinchDown(x, y) {
        this.sparks.push({ x, y, life: 0.42, maxLife: 0.42, size: 18, type: "knot" });
        ParticleManager.emit(x, y, 10, "blink");
      },

      pinchDrag(x, y) {
        const last = this.threads[this.threads.length - 1];
        if (!last || Math.hypot(last.x - x, last.y - y) > 8) {
          this.threads.push({ x, y, life: 0.55, maxLife: 0.55 });
        }
      },

      pinchUp(vx, vy) {
        const speed = Math.hypot(vx, vy);
        const x = this.threads.length ? this.threads[this.threads.length - 1].x : AppState.canvasWidth * 0.5;
        const y = this.threads.length ? this.threads[this.threads.length - 1].y : AppState.canvasHeight * 0.5;
        ParticleManager.emit(x, y, speed > 10 ? 22 : 12, "blink");
      },

      throwTrail(x, y, vx, vy) {
        if (Math.random() > 0.35) return;
        this.threads.push({ x: x - vx * 1.6, y: y - vy * 1.6, life: 0.32, maxLife: 0.32 });
      },

      openPalm() {
        this.waves.push({ x: AppState.canvasWidth * 0.5, y: AppState.canvasHeight * 0.52, r: 40, life: 0.9, maxLife: 0.9, type: "tarot" });
      },

      blink() {
        AppState.screenFlash = Math.max(AppState.screenFlash, 0.55);
        this.sparks.push({ x: AppState.canvasWidth * 0.5, y: AppState.canvasHeight * 0.44, life: 0.28, maxLife: 0.28, size: 90, type: "flash" });
      },

      tripleBlink() {
        AppState.screenFlash = 1;
        this.waves.push({ x: AppState.canvasWidth * 0.5, y: AppState.canvasHeight * 0.5, r: 80, life: 1.4, maxLife: 1.4, type: "fool" });
      },

      update(dt) {
        this.sparks.forEach((spark) => { spark.life -= dt; spark.size += dt * 34; });
        this.threads.forEach((thread) => { thread.life -= dt; });
        this.waves.forEach((wave) => { wave.life -= dt; wave.r += dt * (wave.type === "fool" ? 230 : 170); });
        this.sparks = this.sparks.filter((spark) => spark.life > 0).slice(-50);
        this.threads = this.threads.filter((thread) => thread.life > 0).slice(-120);
        this.waves = this.waves.filter((wave) => wave.life > 0).slice(-8);
        AppState.screenFlash = Math.max(0, AppState.screenFlash - dt * 2.8);
      },

      draw(targetCtx) {
        targetCtx.save();
        this.threads.forEach((thread, index) => {
          const alpha = Math.max(0, thread.life / thread.maxLife);
          const prev = this.threads[index - 1];
          if (!prev) return;
          targetCtx.strokeStyle = `rgba(159, 216, 255, ${alpha * 0.42})`;
          targetCtx.lineWidth = 1;
          targetCtx.beginPath();
          targetCtx.moveTo(prev.x, prev.y);
          targetCtx.lineTo(thread.x, thread.y);
          targetCtx.stroke();
        });
        this.waves.forEach((wave) => {
          const alpha = Math.max(0, wave.life / wave.maxLife);
          targetCtx.strokeStyle = wave.type === "fool" ? `rgba(229, 192, 111, ${alpha * 0.72})` : `rgba(159, 216, 255, ${alpha * 0.46})`;
          targetCtx.lineWidth = wave.type === "fool" ? 2 : 1;
          for (let i = 0; i < 3; i += 1) {
            targetCtx.beginPath();
            targetCtx.arc(wave.x, wave.y, wave.r + i * 22, 0, Math.PI * 2);
            targetCtx.stroke();
          }
        });
        this.sparks.forEach((spark) => {
          const alpha = Math.max(0, spark.life / spark.maxLife);
          targetCtx.strokeStyle = spark.type === "flash" ? `rgba(255, 255, 255, ${alpha * 0.62})` : `rgba(159, 216, 255, ${alpha})`;
          targetCtx.lineWidth = 1;
          targetCtx.beginPath();
          targetCtx.arc(spark.x, spark.y, spark.size * (1 - alpha * 0.4), 0, Math.PI * 2);
          targetCtx.stroke();
          targetCtx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.88})`;
          targetCtx.beginPath();
          targetCtx.arc(spark.x, spark.y, 2 + alpha * 3, 0, Math.PI * 2);
          targetCtx.fill();
        });
        if (AppState.screenFlash > 0) {
          targetCtx.globalAlpha = Math.min(0.85, AppState.screenFlash);
          targetCtx.fillStyle = "#fff";
          targetCtx.fillRect(0, 0, AppState.canvasWidth, AppState.canvasHeight);
        }
        targetCtx.restore();
      },

      clear() {
        this.sparks = [];
        this.threads = [];
        this.waves = [];
      }
    };

    function resizeCanvas() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      AppState.canvasWidth = width;
      AppState.canvasHeight = height;
      AppState.dpr = dpr;

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (EyeSliceManager && EyeSliceManager.slices.length) {
        EyeSliceManager.createMockSlices();
      }
      if (typeof FaceShardManager !== "undefined") {
        FaceShardManager.reset();
      }
      if (typeof ControlDockController !== "undefined") {
        ControlDockController.applySafeAreaLayout();
      }
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, AppState.canvasWidth, AppState.canvasHeight);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, AppState.canvasWidth, AppState.canvasHeight);
    }

    function drawVisualAtmosphere(targetCtx, timestamp) {
      const width = AppState.canvasWidth;
      const height = AppState.canvasHeight;
      targetCtx.save();
      const glow = targetCtx.createRadialGradient(
        width * 0.5,
        height * 0.44,
        Math.min(width, height) * 0.08,
        width * 0.5,
        height * 0.44,
        Math.max(width, height) * 0.62
      );
      glow.addColorStop(0, "rgba(125, 249, 255, 0.05)");
      glow.addColorStop(0.55, "rgba(255, 79, 216, 0.035)");
      glow.addColorStop(1, "rgba(0, 0, 0, 0.28)");
      targetCtx.fillStyle = glow;
      targetCtx.fillRect(0, 0, width, height);

      targetCtx.globalAlpha = PerformanceManager.effectiveMode === "low" ? 0.08 : 0.14;
      targetCtx.fillStyle = "rgba(255, 255, 255, 0.55)";
      const offset = Math.floor(timestamp * 0.04) % 18;
      for (let y = offset; y < height; y += 18) {
        targetCtx.fillRect(0, y, width, 1);
      }

      if (AppState.grayscaleEnabled && CONFIG.visualStyle.filmGrain > 0) {
        targetCtx.globalAlpha = CONFIG.visualStyle.filmGrain;
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.42)";
        const grainCount = PerformanceManager.effectiveMode === "low" ? 80 : 150;
        for (let i = 0; i < grainCount; i += 1) {
          const gx = (Math.sin(timestamp * 0.013 + i * 91.7) * 0.5 + 0.5) * width;
          const gy = (Math.cos(timestamp * 0.017 + i * 57.3) * 0.5 + 0.5) * height;
          targetCtx.fillRect(gx, gy, 1, 1);
        }
      }
      targetCtx.restore();
    }

    function render(timestamp, dt) {
      clearCanvas();

      const drewUploaded = SourceManager.drawUploadedMedia(ctx);
      let drewCamera = false;

      if (drewUploaded && AppState.cameraReady) {
        ctx.save();
        ctx.globalAlpha = 0.82;
        drewCamera = SourceManager.drawCamera(ctx);
        ctx.restore();
      } else {
        drewCamera = SourceManager.drawCamera(ctx);
      }

      AppState.lastRenderLayers = [];
      if (drewUploaded) AppState.lastRenderLayers.push("uploaded");
      if (drewCamera) AppState.lastRenderLayers.push("camera");

      if (!drewUploaded && !drewCamera) {
        drawStageZeroVisual(timestamp);
        AppState.lastRenderLayers.push("fallback");
      }
      VisionEngine.update(timestamp);
      RippleManager.update(dt);
      CurtainRevealManager.update(timestamp, dt);
      if (AppState.experiencePhase !== "curtain") {
        FaceShardManager.update(dt);
      }
      EyeSliceManager.update(dt);
      ParticleManager.update(dt);
      MysticEffectManager.update(dt);
      if (AppState.experiencePhase !== "curtain") {
        CardRevealController.update(timestamp);
      }
      TarotCardManager.update(timestamp);
      if (AppState.experiencePhase !== "curtain") {
        FaceShardManager.draw(ctx);
        AppState.lastRenderLayers.push("face-shards");
        EyeSliceManager.draw(ctx);
        AppState.lastRenderLayers.push("slices");
      }
      ParticleManager.draw(ctx);
      MysticEffectManager.draw(ctx);
      drawVisualAtmosphere(ctx, timestamp);
      drawMysticFrame(ctx, timestamp);
      if (AppState.experiencePhase === "curtain") {
        CurtainRevealManager.draw(ctx, timestamp);
        AppState.lastRenderLayers.push("curtain");
      } else {
        TarotCardManager.draw(ctx, timestamp);
        ArchiveVerdictManager.draw(ctx, timestamp);
        AppState.lastRenderLayers.push("tarot");
      }
      RippleManager.draw(ctx);
      TopEyePreview.draw(ctx);
      AppState.lastRenderLayers.push("top-eye");
      drawFaceDebug(ctx);
      drawHandDebug(ctx);
    }

    function animationLoop(timestamp) {
      AppState.frameCount += 1;
      const dt = updateFPS(timestamp);
      render(timestamp, dt);
      updateDebugPanel();
      requestAnimationFrame(animationLoop);
    }

    // =====================================================
    // 9. UI EVENTS
    // =====================================================
    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function onPointerDown(event) {
      if (startOverlay && !startOverlay.classList.contains("hidden")) return;
      const point = getCanvasPoint(event);
      if (FoolEasterEgg.registerCardTap(performance.now(), point.x, point.y)) {
        event.preventDefault();
        return;
      }
      const grabbed = AppState.experiencePhase === "curtain"
        ? CurtainRevealManager.grabAt(point.x, point.y)
        : onPinchDown(point.x, point.y);
      if (!grabbed) return;
      AppState.pointerActive = true;
      AppState.activePointerId = event.pointerId;
      canvas.setPointerCapture(event.pointerId);
      event.preventDefault();
    }

    function onPointerMove(event) {
      const point = getCanvasPoint(event);
      RippleManager.emit(point.x, point.y, 0.6, AppState.experiencePhase === "curtain" ? "curtain" : "shardRitual");
      if (!AppState.pointerActive || AppState.activePointerId !== event.pointerId) return;
      if (AppState.experiencePhase === "curtain") {
        CurtainRevealManager.dragTo(point.x, point.y);
      } else {
        onPinchDrag(point.x, point.y);
      }
      event.preventDefault();
    }

    function onPointerUp(event) {
      if (!AppState.pointerActive || AppState.activePointerId !== event.pointerId) return;
      if (AppState.experiencePhase === "curtain") {
        CurtainRevealManager.release();
      } else {
        let velocity = EyeSliceManager.getReleaseVelocity();
        if (AppState.grabbedTarget === "face") {
          velocity = FaceShardManager.getReleaseVelocity();
        }
        onPinchUp(velocity.vx, velocity.vy);
      }
      AppState.pointerActive = false;
      AppState.activePointerId = null;
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
      event.preventDefault();
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    async function startExperience() {
      startBtn.disabled = true;
      startBtn.textContent = "正在开启...";
      setPhase("loading");
      startOverlay.classList.add("is-opening");
      startBtn.blur();
      AppState.startedAt = performance.now();

      const curtainOpening = wait(760);
      await SourceManager.startCamera();
      await curtainOpening;
      startOverlay.classList.add("hidden");
      VisionEngine.init({ hand: true, face: true }).catch((error) => {
        const message = `识别模型后台加载失败：${error.message || "未知错误"}`;
        AppState.errors.push(message);
        showToast("识别模型加载较慢，已先进入可玩的基础模式。");
      });

      setPhase("running");
      setExperiencePhase("curtain");
      CurtainRevealManager.reset();
      RippleManager.reset();
      showGuide();
      showToast("拖开水膜：进入档案。");
      startBtn.textContent = "开启灵视";
      startBtn.disabled = false;
    }

    startBtn.addEventListener("click", async () => {
      await AudioManager.start();
      await startExperience();
    });

    soundToggleBtn.addEventListener("click", () => {
      AudioManager.toggle();
      soundToggleBtn.blur();
    });

    toggleUiBtn.addEventListener("click", () => {
      setUiHidden(!AppState.uiHidden);
      toggleUiBtn.blur();
    });

    toggleHintBtn.addEventListener("click", () => {
      TriggerHintPanel.toggle();
      toggleHintBtn.blur();
    });

    triggerHintCloseBtn.addEventListener("click", () => {
      TriggerHintPanel.setVisible(false);
      triggerHintCloseBtn.blur();
    });

    toggleDebugBtn.addEventListener("click", () => {
      setDebugEnabled(!AppState.debug);
      toggleDebugBtn.blur();
    });

    debugCloseBtn.addEventListener("click", () => {
      DebugPanelController.hide();
      debugCloseBtn.blur();
    });

    recordModeBtn.addEventListener("click", () => {
      setRecordingMode(!AppState.recordingMode);
      recordModeBtn.blur();
    });

    recordExitBtn.addEventListener("click", () => {
      setRecordingMode(false);
      recordExitBtn.blur();
    });

    resetVisualBtn.addEventListener("click", () => {
      resetVisualElements();
      resetVisualBtn.blur();
    });

    grayscaleToggleBtn.addEventListener("click", () => {
      CameraStylePipeline.setGrayscale(!AppState.grayscaleEnabled);
      grayscaleToggleBtn.blur();
    });

    performanceModeBtn.addEventListener("click", () => {
      PerformanceManager.cycleMode();
      performanceModeBtn.blur();
    });

    flipCameraBtn.addEventListener("click", async () => {
      flipCameraBtn.disabled = true;
      flipCameraBtn.textContent = "切换中...";
      await SourceManager.switchCamera();
      flipCameraBtn.textContent = "切换镜头";
      flipCameraBtn.disabled = false;
      flipCameraBtn.blur();
    });

    restartBtn.addEventListener("click", () => {
      resetVisualElements();
      restartBtn.blur();
    });

    mediaUpload.addEventListener("change", async () => {
      const file = mediaUpload.files && mediaUpload.files[0];
      await SourceManager.handleUpload(file);
      mediaUpload.value = "";
    });

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", resizeCanvas);
    window.addEventListener("keydown", (event) => {
      if (event.repeat || event.target instanceof HTMLInputElement) return;
      const key = event.key.toLowerCase();
      if (key === "h") {
        setUiHidden(!AppState.uiHidden);
      } else if (key === "d") {
        setDebugEnabled(!AppState.debug);
      } else if (key === "r") {
        resetVisualElements();
      } else if (key === "escape") {
        if (AppState.recordingMode) {
          setRecordingMode(false);
        } else if (AppState.debug) {
          DebugPanelController.hide();
        }
      }
    });
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);

    // =====================================================
    // 10. DEBUG PANEL
    // =====================================================
    function formatBool(value) {
      return value ? "是" : "否";
    }

    function updateDebugPanel() {
      if (!AppState.debug) {
        debugPanel.hidden = true;
        debugPanelText.textContent = "";
        return;
      }
      debugPanel.hidden = false;

      const uptime = ((performance.now() - AppState.startedAt) / 1000).toFixed(1);
      const latestError = AppState.errors.length
        ? AppState.errors[AppState.errors.length - 1]
        : "无";

      debugPanelText.textContent = [
        "灵视档案馆 V0.6",
        `阶段: ${AppState.phase}`,
        `体验阶段: ${AppState.experiencePhase}`,
        `幕布事件: ${AppState.lastCurtainEvent || "无"}`,
        `帧率: ${AppState.fps.toFixed(1)}`,
        `画布: ${AppState.canvasWidth} x ${AppState.canvasHeight}`,
        `DPR: ${AppState.dpr.toFixed(2)}`,
        `性能模式: ${AppState.performanceMode}`,
        `录屏模式: ${formatBool(AppState.recordingMode)}`,
        `黑白滤镜: ${formatBool(AppState.grayscaleEnabled)}`,
        `界面隐藏: ${formatBool(AppState.uiHidden)}`,
        `输入模式: ${AppState.inputMode}`,
        `摄像头: ${formatBool(AppState.cameraReady)}`,
        `镜像: ${formatBool(AppState.mirrored)}`,
        `上传素材: ${formatBool(AppState.mediaReady)}`,
        `渲染层: ${AppState.lastRenderLayers.join(" + ") || "无"}`,
        `手势模型: ${formatBool(AppState.handReady)}`,
        `检测手数: ${AppState.detectedHands}`,
        `pinch 数: ${AppState.activePinches}`,
        `最近手势: ${AppState.lastPinchEvent}`,
        `手掌姿态: ${AppState.lastHandPose}`,
        `脸部模型: ${formatBool(AppState.faceReady)}`,
        `检测脸数: ${AppState.detectedFaces}`,
        `眨眼状态: ${AppState.blinkState}`,
        `睁眼比例: ${AppState.eyeOpenRatio.toFixed(3)}`,
        `眨眼连击: ${AppState.blinkComboCount}/${CONFIG.blinkCombo.requiredCount}`,
        `切片数量: ${EyeSliceManager.slices.length}`,
        `脸部碎片: ${AppState.faceShardCount}`,
        `碎片冻结: ${formatBool(AppState.faceShardsFrozen)}`,
        `待揭示牌: ${TarotCardManager.getCurrentCard()?.zh || "无"}`,
        `塔罗状态: ${AppState.cardState}`,
        `塔罗图片: ${AppState.tarotAssetsReady ? "真实资产" : (AppState.tarotAssetsFailed ? "程序化回退" : "加载中")}`,
        `仪式碎片: ${RitualState.selectedShardId || "无"}`,
        `证据类型: ${AppState.selectedRegionType}`,
        `身份档案: ${AppState.archiveVerdictTitle || "未生成"}`,
        `愚者彩蛋: ${formatBool(FoolEasterEgg.enabled)}`,
        `BGM: ${AppState.audioEnabled ? (AppState.audioReady ? "播放中" : "待启动") : "关闭"}`,
        `入槽停留: ${RitualState.hoverStartAt ? `${Math.max(0, performance.now() - RitualState.hoverStartAt).toFixed(0)}ms` : "0ms"}`,
        `结束态: ${formatBool(AppState.gameEnded)}`,
        `粒子数量: ${ParticleManager.particles.length}`,
        `正在抓取: ${formatBool(Boolean(EyeSliceManager.grabbedSlice || FaceShardManager.grabbedShard))}`,
        `运行: ${uptime}s`,
        `最近错误: ${latestError}`
      ].join("\n");
    }

    resizeCanvas();
    EyeSliceManager.init();
    AudioManager.init();
    TriggerHintPanel.init();
    ControlDockController.applySafeAreaLayout();
    CameraStylePipeline.setGrayscale(CONFIG.visualStyle.grayscaleEnabled);
    TarotCardManager.reset();
    TarotCardManager.preloadTarotAssets();
    setPhase("ready");
    requestAnimationFrame(animationLoop);
  </script>
</body>
</html>
